document.getElementById("formSave").onclick=()=>{const title=document.getElementById("fTitle").value.trim();if(!title)return;const now=new Date().toISOString();const bd={title,author:document.getElementById("fAuthor").value.trim(),category:document.getElementById("fCategory").value,status:document.getElementById("fStatus").value,pages:parseInt(document.getElementById("fPages").value)||null,currentPage:0,startDate:document.getElementById("fStart").value,endDate:document.getElementById("fEnd").value,notes:document.getElementById("fNotes").value.trim(),updatedAt:now};if(isEdit)Object.assign(book,bd);else{bd.id=uid();bd.addedAt=now;bd.rating=0;bd.themes=_selectedThemes||[];bd.quotes=[];bd.connections=[];bd.coreArgument="";bd.impact="";bd.sessions=[];bd.recommendedBy="";bd.recommendationNote="";bd.recommendationSource="";bd.priority=0;data.books.push(bd);_selectedThemes=[]}save();document.getElementById("formModal").classList.remove("open");renderAll()}}

document.getElementById("settingsClose").onclick=()=>document.getElementById("settingsModal").classList.remove("open");
document.getElementById("sGoal").onchange=e=>{data.settings.goals.annual=parseInt(e.target.value)||50;data.settings.goal=data.settings.goals.annual;save();renderAll()};
document.querySelectorAll(".cat-goal-input").forEach(inp=>inp.onchange=()=>{const cat=inp.dataset.cat,val=parseInt(inp.value)||0;if(!data.settings.goals.categories)data.settings.goals.categories={};if(val>0)data.settings.goals.categories[cat]=val;else delete data.settings.goals.categories[cat];save()});
// Add Challenge
document.getElementById("sAddChallenge").onclick=()=>{const area=document.getElementById("challengeFormArea");if(area.innerHTML){area.innerHTML="";return}area.innerHTML=`<div style="background:var(--bg);border:1px solid var(--borderL);border-radius:10px;padding:14px;margin-top:8px"><div style="margin-bottom:8px"><p class="form-label">Label</p><input class="form-input" id="chLabel" placeholder="Read 3 books over 400 pages"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><p class="form-label">Type</p><select class="form-input" id="chType"><option value="count">Book Count</option><option value="pages">Total Pages</option><option value="category">Category Count</option><option value="diversity">Category Diversity</option></select></div><div><p class="form-label">Target</p><input class="form-input" type="number" id="chTarget" placeholder="10" min="1"></div></div><button class="rbtn save" id="chSave">Create</button></div>`;document.getElementById("chSave").onclick=()=>{const label=document.getElementById("chLabel").value.trim();if(!label)return;data.settings.goals.challenges.push({id:uid(),label,type:document.getElementById("chType").value,target:parseInt(document.getElementById("chTarget").value)||1,categoryFilter:null,minPages:null,deadline:null});save();openSettings()}};
document.querySelectorAll(".challenge-del").forEach(b=>b.onclick=()=>{data.settings.goals.challenges=data.settings.goals.challenges.filter(c=>c.id!==b.dataset.chid);save();openSettings()});
document.getElementById("sExport").onclick=()=>{const j=JSON.stringify(data,null,2),b=new Blob([j],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`reading-ledger-${new Date().toISOString().slice(0,10)}.json`;a.click();data.settings.lastExport=new Date().toISOString();save();openSettings()};
document.getElementById("sExportCSV").onclick=()=>{exportCSV();openSettings()};
document.getElementById("sImport").onclick=()=>{document.getElementById("importFile").click()};
document.getElementById("sReset").onclick=()=>{data=makeDemoData();save();document.getElementById("settingsModal").classList.remove("open");pickRandomQuote();renderAll()};
document.getElementById("sClear").onclick=()=>{showConfirm("Clear All","Delete everything?",()=>{data={books:[],settings:{goal:50,lastExport:null,goals:{annual:50,categories:{},challenges:[]}}};save();document.getElementById("settingsModal").classList.remove("open");renderAll()})};
}

// ══════ CONFIRM / IMPORT ══════
function showConfirm(t,m,cb){document.getElementById("confirmTitle").textContent=t;document.getElementById("confirmMsg").textContent=m;confirmCb=cb;document.getElementById("confirmOverlay").classList.add("open")}
document.getElementById("confirmOk").onclick=()=>{document.getElementById("confirmOverlay").classList.remove("open");if(confirmCb){confirmCb();confirmCb=null}};
document.getElementById("confirmCancel").onclick=()=>{document.getElementById("confirmOverlay").classList.remove("open");confirmCb=null};
// Import
document.getElementById("importFile").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{pendingImport=JSON.parse(r.result);if(!pendingImport.books)throw 0;document.getElementById("importOverlay").classList.add("open")}catch(e){alert("Invalid backup file.")}};r.readAsText(f);e.target.value=""});
document.getElementById("importReplace").onclick=()=>{document.getElementById("importOverlay").classList.remove("open");if(pendingImport){data=pendingImport;if(!data.settings.goals)data.settings.goals={annual:50,categories:{},challenges:[]};data.books.forEach(b=>{if(!b.sessions)b.sessions=[];if(!b.themes)b.themes=[];if(!b.quotes)b.quotes=[];if(!b.connections)b.connections=[]});save();pendingImport=null;renderAll()}};
document.getElementById("importMerge").onclick=()=>{document.getElementById("importOverlay").classList.remove("open");if(pendingImport){const ex=new Set(data.books.map(b=>`${(b.title||"").toLowerCase()}|${(b.author||"").toLowerCase()}`));pendingImport.books.forEach(b=>{const k=`${(b.title||"").toLowerCase()}|${(b.author||"").toLowerCase()}`;if(!ex.has(k)){if(!b.sessions)b.sessions=[];if(!b.themes)b.themes=[];if(!b.quotes)b.quotes=[];if(!b.connections)b.connections=[];data.books.push(b);ex.add(k)}});save();pendingImport=null;renderAll()}};
function onImportData(json){try{pendingImport=JSON.parse(json);if(!pendingImport.books)throw 0;document.getElementById("importOverlay").classList.add("open")}catch(e){alert("Invalid backup file.")}}

// ══════ WIRING ══════
function switchTab(t){if(t===currentTab)return;const map={shelf:"viewShelf",timeline:"viewTimeline",analytics:"viewAnalytics",review:"viewReview"};document.getElementById(map[currentTab]).classList.remove("active");currentTab=t;document.querySelectorAll("#bottomNav button,#navTabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));document.getElementById(map[t]).classList.add("active");renderAll()}
document.querySelectorAll("#bottomNav button,#navTabs button").forEach(tab=>tab.onclick=()=>switchTab(tab.dataset.tab));
document.getElementById("btnSearch").onclick=()=>{searchOpen=!searchOpen;document.getElementById("searchBar").style.display=searchOpen?"block":"none";document.getElementById("btnSearch").classList.toggle("active",searchOpen);if(searchOpen)document.getElementById("searchInput").focus();else{searchQuery="";renderShelf()}};
let _st;document.getElementById("searchInput").oninput=e=>{clearTimeout(_st);const v=e.target.value;_st=setTimeout(()=>{searchQuery=v;renderShelf()},250)};
document.getElementById("fab").onclick=()=>openForm(null);document.getElementById("btnSettings").onclick=openSettings;
["formModal","settingsModal"].forEach(id=>document.getElementById(id).onclick=function(e){if(e.target===this)this.classList.remove("open")});
function renderAll(){updateHeader();renderShelf();if(currentTab==="timeline")renderTimeline();if(currentTab==="analytics")renderAnalytics();if(currentTab==="review")renderReview()}
renderAll();
checkOnboarding();

if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");
</script></body></html>
