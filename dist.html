<html lang="en">
<head>

<meta name="apple-mobile-web-app-title" content="Reading Ledger">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>The Reading Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
body{font-family:'Cormorant Garamond',Georgia,serif;background:#0E0C0A;color:#EDE6D8;overflow-x:hidden}
:root{--bg:#0E0C0A;--surface:#17140F;--surfaceH:#1E1A14;--border:#2A2419;--borderL:#352E24;--accent:#C4956A;--accentDim:#9B7550;--accentGlow:#C4956A35;--text:#EDE6D8;--textM:#A09888;--textD:#7D7568;--textDD:#5E5852;--danger:#C45B5B;--gold:#D4A85A;--green:#7D8B6E;--blue:#5B8AB0;--ui:'Outfit',sans-serif;--serif:'Cormorant Garamond',Georgia,serif;--max:960px}
.container{max-width:var(--max);margin:0 auto;padding:0 28px}
header{padding:28px 0 0;position:sticky;top:0;z-index:40;background:var(--bg)}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}.hdr-label{font-family:var(--ui);font-size:11px;color:var(--textD);margin:0 0 4px;letter-spacing:0.12em;text-transform:uppercase;font-weight:500}.hdr-title{font-size:40px;font-weight:600;letter-spacing:-0.02em;line-height:1;margin:0}.hdr-pills{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
.goal-pill{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:100px;padding:5px 14px 5px 6px;border:1px solid var(--border)}.goal-pill-text{font-family:var(--ui);font-size:13px;font-weight:500}.goal-pill-text span{color:var(--textD)}
.streak-pill{display:flex;align-items:center;gap:5px;font-family:var(--ui);font-size:12px;color:var(--gold)}
.hdr-right{display:flex;gap:8px;align-items:center;margin-top:8px}
.btn-search,.btn-settings{background:none;border:1px solid transparent;border-radius:8px;padding:9px 10px;cursor:pointer;color:var(--textM);font-size:16px;transition:all 0.2s}.btn-search.active{background:var(--surfaceH);border-color:var(--borderL)}.btn-settings:hover{background:var(--surfaceH);color:var(--text)}
.search-bar{margin-top:16px}.search-bar input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-family:var(--ui);font-size:14px;outline:none}.search-bar input:focus{border-color:var(--accent)}.search-bar input::placeholder{color:var(--textD)}
nav.tabs{display:flex;gap:0;margin-top:24px;border-bottom:1px solid var(--border)}nav.tabs button{background:none;border:none;font-family:var(--ui);font-size:13px;font-weight:500;cursor:pointer;padding:11px 16px;display:flex;align-items:center;gap:7px;color:var(--textD);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}nav.tabs button:hover:not(.active){color:var(--textM)}nav.tabs button svg{width:15px;height:15px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;padding-bottom:env(safe-area-inset-bottom);background:rgba(23,20,15,0.92);backdrop-filter:blur(12px);border-top:1px solid var(--borderL);z-index:50;display:flex;align-items:center;justify-content:center}.bottom-nav button{background:none;border:none;color:var(--textD);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;border-radius:12px;transition:all 0.2s;min-width:56px}.bottom-nav button svg{width:20px;height:20px}.bottom-nav button span{font-family:var(--ui);font-size:11px;font-weight:500}.bottom-nav button.active{color:var(--accent);background:var(--accentGlow)}.bottom-nav button:hover:not(.active){color:var(--textM)}.bottom-nav.hidden{display:none}
.content{padding:24px 20px 140px;max-width:var(--max);margin:0 auto}.view{display:none;opacity:0;transform:translateY(6px);transition:opacity 200ms,transform 200ms}.view.active{display:block;opacity:1;transform:translateY(0)}

/* Shelf */
.shelf-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.shelf-count{font-family:var(--ui);font-size:12px;color:var(--textD)}
.sort-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}.sort-bar::-webkit-scrollbar{display:none}.sort-pill{background:none;border:1px solid var(--border);border-radius:100px;padding:4px 12px;font-family:var(--ui);font-size:11px;color:var(--textD);cursor:pointer;font-weight:500;white-space:nowrap;transition:all 0.15s}.sort-pill.active{background:var(--surfaceH);border-color:var(--borderL);color:var(--text)}
.shelf-row-wrap{position:relative}.shelf-spines{display:flex;align-items:flex-end;gap:4px;padding:10px 6px 0;min-height:100px;flex-wrap:wrap}
.spine{position:relative;border-radius:3px 4px 2px 2px;cursor:pointer;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s}.spine:hover{transform:translateY(-6px);box-shadow:2px 6px 14px rgba(0,0,0,0.5);filter:brightness(1.12)}
@keyframes spineUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}.spine{animation:spineUp 350ms cubic-bezier(0.23,1,0.32,1) backwards}.spine:nth-child(1){animation-delay:0ms}.spine:nth-child(2){animation-delay:50ms}.spine:nth-child(3){animation-delay:100ms}.spine:nth-child(4){animation-delay:150ms}.spine:nth-child(5){animation-delay:200ms}.spine:nth-child(6){animation-delay:250ms}
.spine .sheen{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 40%,transparent 60%,rgba(0,0,0,0.1) 100%);pointer-events:none}.spine .gold-top{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#D4A85A,#F0D060,#D4A85A);border-radius:3px 3px 0 0;z-index:2}.spine .reading-dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#7D8B6E;z-index:2;animation:dotPulse 2s ease-in-out infinite}@keyframes dotPulse{0%,100%{box-shadow:0 0 2px #7D8B6E}50%{box-shadow:0 0 6px #7D8B6E,0 0 10px rgba(125,139,110,0.4)}}.spine .want-mark{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;border:1px solid rgba(255,255,255,0.35);z-index:2}
.spine-title{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:0.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,0.8);padding:3px 0}
.shelf-board{height:10px;background:linear-gradient(180deg,#2E2820,#241F18,#1C1812,#15120E);border-radius:0 0 2px 2px;box-shadow:0 4px 10px rgba(0,0,0,0.4);margin:0 4px}
.shelf-footer{text-align:center;padding:20px 0;font-family:var(--ui);font-size:12px;color:var(--textD)}.shelf-footer-legend{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:4px}.shelf-footer-legend-item{display:flex;align-items:center;gap:4px}.shelf-footer-legend-dot{width:8px;height:8px;border-radius:2px}

/* Tooltip */

/* Now Reading */
.nr-section{margin-top:20px}.nr-section-title{font-family:var(--ui);font-size:11px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;margin-bottom:10px}.nr-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}.nr-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}.nr-card-accent{width:5px;height:32px;border-radius:3px;flex-shrink:0}.nr-card-info{flex:1;min-width:0}.nr-card-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}.nr-card-title:hover{color:var(--accent)}.nr-card-author{font-family:var(--ui);font-size:11px;color:var(--textD)}.nr-card-pct{font-size:18px;font-weight:700;flex-shrink:0}.nr-bar{height:24px;background:var(--border);border-radius:8px;position:relative;cursor:pointer;overflow:hidden;margin-bottom:8px}.nr-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:8px;transition:width 0.3s}.nr-bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ui);font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.6)}

@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Quote Banner */
.quote-banner{background:linear-gradient(135deg,var(--surface),var(--bg));border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:24px;display:flex;gap:14px;align-items:flex-start}.quote-banner-text{flex:1;font-size:17px;font-style:italic;line-height:1.6;color:var(--textM)}.quote-banner-src{font-family:var(--ui);font-size:12px;color:var(--textD);margin-top:8px;font-style:normal}.quote-refresh{background:none;border:none;color:var(--textD);cursor:pointer;padding:4px}.quote-refresh:hover{color:var(--accent)}
.milestones{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}.milestone{font-family:var(--ui);font-size:12px;padding:5px 12px;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--textM);display:flex;align-items:center;gap:6px}
.backup-banner{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-family:var(--ui);font-size:13px;color:var(--textM)}.backup-banner button{border-radius:8px;padding:6px 14px;font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;border:none;flex-shrink:0}.backup-banner .bb-export{background:var(--accentDim);color:var(--bg)}.backup-banner .bb-dismiss{background:none;color:var(--textD);border:1px solid var(--border)}

/* FAB */
.fab{position:fixed;bottom:76px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:51;display:flex;align-items:center;justify-content:center;transition:transform 0.2s}.fab:hover{transform:scale(1.08)}.fab:active{transform:scale(0.95)}.fab svg{width:24px;height:24px}.fab.hidden{display:none}

/* Timeline */
.tl-section-title{font-size:18px;font-weight:600;color:var(--text);margin:0 0 18px}.tl-empty{font-family:var(--ui);font-size:13px;color:var(--textD);text-align:center;padding:48px 20px;font-style:italic;border:1px dashed var(--border);border-radius:12px}.tl-divider{border:none;border-top:1px solid var(--border);margin:40px 0}
/* Focus Hero */
.tlf-wrap{text-align:center;padding:10px 0 0}.tlf-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}.tlf-nav-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--textM);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}.tlf-nav-btn:hover{border-color:var(--accent);color:var(--accent)}.tlf-nav-count{font-family:var(--ui);font-size:12px;color:var(--textD)}
.tlf-ring{position:relative;display:inline-block;margin:0 auto 16px}.tlf-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}.tlf-ring-pct{font-size:36px;font-weight:700;line-height:1}.tlf-ring-pages{font-family:var(--ui);font-size:13px;color:var(--textD);margin-top:2px}.tlf-title{font-size:22px;font-weight:600;margin:0 0 4px;cursor:pointer}.tlf-title:hover{color:var(--accent)}.tlf-author{font-family:var(--ui);font-size:14px;color:var(--textM);margin:0 0 16px}
.tlf-last{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin:0 auto 16px;max-width:340px;display:flex;align-items:center;gap:14px;text-align:left}.tlf-last-icon{font-size:20px;flex-shrink:0}.tlf-last-body{flex:1}.tlf-last-label{font-family:var(--ui);font-size:11px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500}.tlf-last-detail{font-family:var(--ui);font-size:14px;color:var(--text);font-weight:500;margin-top:2px}.tlf-last-sub{font-family:var(--ui);font-size:11px;color:var(--textD);margin-top:1px}

.tlf-timer{margin:20px auto 0;max-width:300px}.tlf-timer-display{display:block;font-family:var(--ui);font-size:48px;font-weight:600;color:var(--accent);letter-spacing:0.05em;line-height:1;margin-bottom:12px;font-variant-numeric:tabular-nums}.tlf-timer-btns{display:flex;gap:8px;justify-content:center}.tlf-tbtn{border:none;border-radius:8px;padding:10px 24px;font-family:var(--ui);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}.tlf-tbtn.start{background:var(--green);color:#EDE6D8}.tlf-tbtn.pause{background:var(--gold);color:var(--bg)}.tlf-tbtn.resume{background:var(--green);color:#EDE6D8}.tlf-tbtn.stop{background:var(--danger);color:#fff}
.tlf-session-form{max-width:320px;margin:16px auto 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:left}

/* Progress Lanes */

/* Streak Ring */
.streak-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.streak-section-title{font-family:var(--ui);font-size:13px;font-weight:600;margin-bottom:16px}
.sr-row{display:flex;align-items:center;gap:20px}
.sr-ring-wrap{position:relative;flex-shrink:0}
.sr-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sr-ring-num{font-family:var(--ui);font-size:28px;font-weight:700;color:var(--accent);line-height:1}
.sr-ring-label{font-family:var(--ui);font-size:11px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}
.sr-details{flex:1}
.sr-detail{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.sr-detail:last-child{border-bottom:none}
.sr-detail-label{font-family:var(--ui);font-size:12px;color:var(--textM)}
.sr-detail-val{font-family:var(--ui);font-size:14px;font-weight:600;color:var(--text)}
.sr-detail-val.accent{color:var(--accent)}
.sr-this-week{display:flex;gap:4px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.sr-tw-day{flex:1;height:8px;border-radius:4px;background:var(--bg);border:1px solid var(--border)}
.sr-tw-day.read{background:var(--accent);border-color:var(--accent)}
.sr-tw-day.today{box-shadow:0 0 0 1px var(--text)}
.sr-tw-labels{display:flex;gap:4px;margin-top:4px}
.sr-tw-label{flex:1;text-align:center;font-family:var(--ui);font-size:11px;color:var(--textDD)}
/* Weekly Summary */

/* Feed */
.tl-feed-day{margin-bottom:24px}.tl-feed-day-label{font-family:var(--ui);font-size:11px;font-weight:500;color:var(--textDD);letter-spacing:0.04em;margin-bottom:10px}.tl-feed-day-label strong{color:var(--textD);font-weight:600}
.tl-fi{display:flex;align-items:flex-start;gap:10px;padding:8px 0 8px 14px;border-left:2px solid var(--border);margin-left:4px;cursor:pointer;position:relative;opacity:0;animation:fiIn 250ms ease forwards}@keyframes fiIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}.tl-fi:hover{border-left-color:var(--accent)}.tl-fi.session{border-left-color:var(--accentDim)}.tl-fi.finish{border-left-color:var(--green);background:var(--surface);border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:4px}.tl-fi.start{border-left-color:var(--blue)}.tl-fi.quote{border-left-color:var(--gold)}.tl-fi::before{content:'';position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--border);border:2px solid var(--bg)}.tl-fi.session::before{background:var(--accentDim)}.tl-fi.finish::before{background:var(--green)}.tl-fi.start::before{background:var(--blue)}.tl-fi.quote::before{background:var(--gold)}.tl-fi-body{flex:1;min-width:0}.tl-fi-text{font-family:var(--ui);font-size:13px;color:var(--textM);line-height:1.4;margin:0}.tl-fi-text strong{color:var(--text);font-weight:500}.tl-fi-text .pg{color:var(--accent);font-weight:600}.tl-fi-sub{font-family:var(--ui);font-size:11px;color:var(--textDD);margin-top:2px}.tl-fi-stars{color:var(--gold);font-size:12px;margin-top:2px}.tl-fi-quote{margin-top:6px;padding:8px 12px;border-left:2px solid rgba(212,168,90,0.4);font-size:14px;font-style:italic;color:var(--textD);line-height:1.5;background:rgba(212,168,90,0.03);border-radius:0 8px 8px 0}
/* Up Next */
.tl-next{background:linear-gradient(135deg,rgba(46,68,96,0.12),rgba(196,149,106,0.06));border:1px solid var(--border);border-radius:14px;padding:20px 24px}.tl-next-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}.tl-next-icon{font-size:20px}.tl-next-title{font-family:var(--ui);font-size:13px;font-weight:600}
.tl-next-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.2s}.tl-next-card:hover{border-color:var(--accent)}.tl-next-spine{width:10px;height:50px;border-radius:3px;flex-shrink:0}.tl-next-info{flex:1;min-width:0}.tl-next-book-title{font-family:var(--ui);font-size:14px;font-weight:500}.tl-next-author{font-family:var(--ui);font-size:11px;color:var(--textD);margin-top:2px}.tl-next-meta{font-family:var(--ui);font-size:11px;color:var(--textDD);margin-top:4px}.tl-next-meta .rec{color:var(--accent)}.tl-next-start{background:var(--blue);color:#EDE6D8;border:none;border-radius:8px;padding:8px 18px;font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
/* Gantt */

.tls-show-more{display:block;margin:12px auto 0;background:none;border:1px solid var(--border);border-radius:8px;padding:8px 24px;font-family:var(--ui);font-size:12px;color:var(--textD);cursor:pointer}

/* Analytics */
.mini-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:28px}.mini-stat{background:var(--surface);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}.mini-stat-label{font-family:var(--ui);font-size:11px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;margin-bottom:4px}.mini-stat-value{font-size:24px;font-weight:600;line-height:1}.mini-stat-sub{font-family:var(--ui);font-size:11px;color:var(--textD);margin-top:2px}
.panel{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);margin-bottom:28px}.panel-title{font-size:19px;font-weight:500;font-style:italic;margin:0 0 16px}.panel-empty{font-family:var(--ui);font-size:13px;color:var(--textD);text-align:center;padding:36px 20px;font-style:italic;border:1px dashed var(--border);border-radius:10px}
.progress-row{display:flex;align-items:center;gap:16px}.progress-track{flex:1;background:var(--border);border-radius:100px;height:12px;overflow:hidden}.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accentDim),var(--accent));transition:width 1s}.progress-pct{font-family:var(--ui);font-size:22px;font-weight:600;color:var(--accent);min-width:50px;text-align:right}
.pie-row{display:flex;align-items:center;gap:28px;flex-wrap:wrap}.pie-wrap{width:170px;height:170px;flex-shrink:0}.pie-wrap canvas{width:100%;height:100%}.cat-legend{display:flex;flex-direction:column;gap:6px;flex:1}.cat-legend-item{display:flex;align-items:center;gap:10px}.cat-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}.cat-legend-name{font-family:var(--ui);font-size:13px;color:var(--textM);flex:1}.cat-legend-count{font-family:var(--ui);font-size:13px;color:var(--textD);font-weight:500}.cat-legend-bar{width:60px;height:4px;border-radius:2px;background:var(--border);overflow:hidden}.cat-legend-bar-fill{height:100%;border-radius:2px}

.goal-panel-section{margin-top:20px}.goal-panel-section-title{font-family:var(--ui);font-size:12px;color:var(--textD);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:10px}

button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* Stepper strip */
.nr-stepper{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px}
.nr-stepper button{background:none;border:none;color:var(--accent);font-family:var(--ui);font-weight:600;padding:9px 0;cursor:pointer;flex:1;font-size:13px;-webkit-tap-highlight-color:transparent;transition:background 0.12s}
.nr-stepper button:active{background:var(--surfaceH)}
.nr-stepper button:not(:last-child){border-right:1px solid var(--border)}
.nr-stepper .nr-val{flex:1.6;text-align:center;font-family:var(--ui);font-size:15px;font-weight:700;color:var(--text);padding:9px 0;border-right:1px solid var(--border);border-left:1px solid var(--border);position:relative;cursor:text}
.nr-stepper .nr-val input{position:absolute;inset:0;width:100%;background:var(--surface);border:none;color:var(--text);font-family:var(--ui);font-size:15px;font-weight:700;text-align:center;outline:none;opacity:0;z-index:1}
.nr-stepper .nr-val input:focus{opacity:1}
.nr-stepper .nr-val input:focus+span{opacity:0}
.nr-stepper .nr-val span{transition:opacity 0.15s}
.nr-of{font-family:var(--ui);font-size:11px;color:var(--textDD);text-align:center;margin-top:4px}
.nr-pending{font-family:var(--ui);font-size:11px;text-align:center;margin-top:5px;min-height:18px}
.nr-pending .pos{color:var(--accent)}
.nr-pending .cancelled{color:var(--textDD);font-style:italic}
.nr-pending .countdown-bar{display:inline-block;width:40px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;vertical-align:middle;margin-left:6px}
.nr-pending .countdown-bar-inner{height:100%;background:var(--accent);border-radius:2px;transition:width 0.1s linear}

/* Onboarding overlay */
.onboarding-overlay{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;opacity:0;animation:fadeIn 400ms ease forwards}
@keyframes fadeIn{to{opacity:1}}
.onb-slide{text-align:center;max-width:360px;display:none}
.onb-slide.active{display:block;animation:slideUp 300ms ease}
.onb-icon{font-size:56px;margin-bottom:20px}
.onb-title{font-size:28px;font-weight:600;margin-bottom:12px}
.onb-desc{font-family:var(--ui);font-size:15px;color:var(--textM);line-height:1.6;margin-bottom:32px}
.onb-dots{display:flex;gap:8px;justify-content:center;margin-bottom:28px}
.onb-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.2s}
.onb-dot.active{background:var(--accent);width:24px;border-radius:4px}
.onb-btn{background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:14px 40px;font-family:var(--ui);font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.onb-btn:hover{opacity:0.88}
.onb-skip{background:none;border:none;color:var(--textD);font-family:var(--ui);font-size:13px;cursor:pointer;margin-top:16px;padding:8px}
.onb-skip:hover{color:var(--textM)}
.onb-demo{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 24px;font-family:var(--ui);font-size:14px;font-weight:600;color:var(--text);cursor:pointer;margin-top:12px;display:block;width:100%;text-align:center}

/* Nudge banner */
.nudge-banner{background:linear-gradient(135deg,rgba(46,68,96,0.15),rgba(125,139,110,0.1));border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color 0.2s}
.nudge-banner:hover{border-color:var(--borderL)}
.nudge-icon{font-size:28px;flex-shrink:0}
.nudge-body{flex:1;min-width:0}
.nudge-title{font-family:var(--ui);font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.nudge-sub{font-family:var(--ui);font-size:12px;color:var(--textD)}
.nudge-dismiss{background:none;border:none;color:var(--textDD);cursor:pointer;font-size:14px;padding:4px;flex-shrink:0}

@media(max-width:600px){nav.tabs{display:none}.hdr-title{font-size:30px}.mini-stats{grid-template-columns:repeat(2,1fr)}.form-row,.form-row.three{grid-template-columns:1fr}.pie-row{flex-direction:column}.detail-title{font-size:24px}.fab{bottom:72px;right:16px;width:50px;height:50px}}

/* Reading Patterns layout */
.patterns-top{display:flex;gap:20px;align-items:center;margin-bottom:16px}
/* Theme Cloud */
.theme-cloud{display:flex;flex-wrap:wrap;gap:8px}
.theme-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:100px;padding:6px 14px;cursor:pointer;transition:all 0.15s}
.theme-pill:hover{border-color:var(--accent);background:var(--surfaceH)}
.theme-pill.active{border-color:var(--accent);background:rgba(196,149,106,0.08)}
.theme-pill-name{font-family:var(--ui);font-size:12px;color:var(--textM);font-weight:500}
.theme-pill-count{font-family:var(--ui);font-size:11px;color:var(--textDD);background:var(--border);border-radius:100px;padding:1px 7px;font-weight:600}
.theme-pill.lg .theme-pill-name{font-size:14px;color:var(--text)}
.theme-pill.md .theme-pill-name{font-size:13px;color:var(--textM)}
.theme-pill.sm .theme-pill-name{font-size:11px}
.theme-books{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.theme-books.show{display:block}
.theme-active-label{font-family:var(--ui);font-size:11px;color:var(--accent);font-weight:500;margin-bottom:8px}
.theme-book-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer}
.theme-book-item:last-child{border-bottom:none}
.theme-book-item:hover{background:rgba(255,255,255,0.02)}
.theme-book-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.theme-book-title{font-family:var(--ui);font-size:13px;color:var(--textM);font-weight:500;flex:1}
.theme-book-cat{font-family:var(--ui);font-size:11px;color:var(--textDD)}
.theme-auto-note{font-family:var(--ui);font-size:11px;color:var(--textDD);margin-top:12px;font-style:italic}

/* Year in Review — Monthly timeline */
.yr-months{display:flex;gap:2px;padding:0 20px;margin-bottom:24px;overflow-x:auto}
.yr-month{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;gap:4px}
.yr-month-label{font-family:var(--ui);font-size:11px;color:var(--textDD);text-transform:uppercase;letter-spacing:0.04em}
.yr-month-dots{display:flex;flex-direction:column;gap:3px;align-items:center;min-height:20px;justify-content:center}
.yr-month-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.3)}
.yr-month-empty{width:10px;height:2px;border-radius:1px;background:var(--border)}
/* Narrative */
.yr-narrative{font-family:var(--ui);font-size:13px;color:var(--textM);line-height:1.7}
.yr-narrative strong{color:var(--text);font-weight:500}
.yr-narrative em{color:var(--accent);font-style:normal;font-weight:600}
/* Identity card */
.yr-identity{position:relative;overflow:hidden;margin:0 20px 20px;border-radius:14px;border:1px solid var(--borderL)}
.yr-id-bg{position:absolute;inset:0;background:linear-gradient(145deg,#1a1610,#17140F 40%,rgba(196,149,106,0.05) 100%)}
.yr-id-accent-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.yr-id-content{position:relative;padding:28px 24px 24px}
.yr-id-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:16px}
.yr-id-icon{width:52px;height:52px;border-radius:12px;background:rgba(196,149,106,0.1);border:1px solid rgba(196,149,106,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yr-id-icon svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:1.5}
.yr-id-text{flex:1}
.yr-id-label{font-family:var(--ui);font-size:11px;color:var(--textDD);text-transform:uppercase;letter-spacing:0.08em;font-weight:500}
.yr-id-title{font-size:22px;font-weight:700;color:var(--accent);margin:3px 0 4px;line-height:1.15}
.yr-id-desc{font-family:var(--ui);font-size:11px;color:var(--textM);line-height:1.5}
.yr-id-stats{display:flex;gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.yr-id-stat{flex:1;background:var(--bg);padding:10px 8px;text-align:center}
.yr-id-stat-val{font-family:var(--ui);font-size:16px;font-weight:700;color:var(--text);line-height:1}
.yr-gold{color:var(--gold)}
.yr-id-stat-label{font-family:var(--ui);font-size:11px;color:var(--textDD);text-transform:uppercase;letter-spacing:0.04em;margin-top:3px}
.yr-id-ratings{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg);border-radius:8px}
.yr-id-rat-visual{display:flex;align-items:flex-end;gap:2px;height:20px}
.yr-id-rat-bar{width:8px;border-radius:2px 2px 0 0;min-height:2px}
.yr-id-rat-labels{display:flex;gap:2px}
.yr-id-rat-lbl{width:8px;text-align:center;font-family:var(--ui);font-size:11px;color:var(--textDD)}
.yr-id-rat-text{font-family:var(--ui);font-size:11px;color:var(--textD);flex:1}
.yr-id-rat-text strong{color:var(--gold);font-weight:600}
.yr-evo{padding-top:16px;border-top:1px solid var(--border)}
.yr-evo-title{font-family:var(--ui);font-size:11px;color:var(--textDD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;margin-bottom:10px}
.yr-evo-flow{display:flex;align-items:center;gap:0;flex-wrap:wrap}
.yr-evo-chip{font-family:var(--ui);font-size:11px;padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:var(--bg);color:var(--textD);white-space:nowrap}
.yr-evo-now{border-color:var(--accent);color:var(--accent);background:rgba(196,149,106,0.08);font-weight:600}
.yr-evo-arrow{color:var(--textDD);padding:0 8px;font-family:var(--ui);font-size:11px}
.yr-evo-period{font-family:var(--ui);font-size:11px;color:var(--textDD);display:block;text-align:center;margin-top:2px}
/* Favorite passage */
.yr-quote{position:relative;padding:20px 20px 20px 24px;margin:0 20px 20px;background:linear-gradient(135deg,var(--surface),rgba(196,149,106,0.04));border:1px solid var(--border);border-radius:14px;border-left:3px solid var(--accent)}
.yr-quote-text{font-size:16px;font-style:italic;line-height:1.5;color:var(--text);margin-bottom:8px}
.yr-quote-src{font-family:var(--ui);font-size:11px;color:var(--textD)}
.yr-quote-src strong{color:var(--textM);font-weight:500}
/* Milestones */
.yr-ms-list{display:flex;flex-direction:column;gap:8px}
.yr-ms-item{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px}
.yr-ms-next{opacity:0.5;border-style:dashed}
.yr-ms-icon-wrap{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yr-ms-icon-wrap svg{width:18px;height:18px}
.yr-ms-info{flex:1}
.yr-ms-label{font-family:var(--ui);font-size:12px;color:var(--text);font-weight:500}
.yr-ms-next .yr-ms-label{color:var(--textM)}
.yr-ms-detail{font-family:var(--ui);font-size:11px;color:var(--textD);margin-top:1px}
.yr-ms-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;max-width:140px}
.yr-ms-fill{height:100%;border-radius:2px;background:var(--accent)}

/* ═══ USABILITY OVERRIDES ═══ */

/* 2. Touch targets — minimum 36px hit area */
.sort-pill{min-height:36px;padding:6px 14px !important}
.nr-stepper button{min-width:36px;min-height:36px;font-size:13px}
.theme-tag button{min-width:28px;min-height:28px;display:inline-flex;align-items:center;justify-content:center}
.session-del,.quote-del{min-width:32px;min-height:32px;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
.dbtn{min-height:40px;padding:10px 18px}
.timer-btn{min-height:40px;padding:8px 18px}
.rbtn{min-height:36px;padding:8px 16px}

/* 3. Spine spacing */
.shelf-spines{gap:6px}
.spine{width:48px;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* 4. Section label hierarchy — differentiate detail sections */
.detail-section-label{font-size:12px;font-weight:600;color:var(--textM);letter-spacing:0.04em;margin-bottom:10px;display:block}
.panel-title{font-size:15px}

/* 5. Textarea affordance — visible borders */
.refl-ta{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:var(--ui);font-size:13px;width:100%;resize:vertical;outline:none;transition:border-color 0.15s;min-height:60px}
.refl-ta:focus{border-color:var(--accent)}
.refl-ta.tall{min-height:100px}
.refl-ta::placeholder{color:var(--textDD)}

/* 6. Bottom nav — bigger labels and icons */
.bottom-nav button svg{width:22px;height:22px}
.bottom-nav button span{font-size:11px;font-weight:500}
.bottom-nav{height:68px}

/* 7. Activity feed breathing room */
.tl-feed-day{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tl-feed-day:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tl-feed-day-label{margin-bottom:10px}
.tl-fi{padding:8px 0 8px 14px;margin-bottom:2px}

/* 9. Modal form spacing */
.form-stack>div{margin-bottom:16px}
.form-label{margin-bottom:6px;font-size:12px}
.form-input{padding:10px 12px;font-size:14px;min-height:42px}
.modal{padding:24px}
.modal-header{margin-bottom:20px}
.form-submit{min-height:48px;font-size:15px;margin-top:8px}

/* 10. Visual feedback on actions */
@keyframes savePulse{0%{box-shadow:0 0 0 0 rgba(196,149,106,0.4)}50%{box-shadow:0 0 0 6px rgba(196,149,106,0)}100%{box-shadow:none}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.save-flash{animation:savePulse 0.4s ease-out}
.theme-tag{animation:fadeIn 0.2s ease-out}
.quote-item{animation:fadeIn 0.2s ease-out}
.detail-star-tap{transition:transform 0.1s,color 0.15s}.detail-star-tap:active{transform:scale(1.3)}

/* Adjust for taller bottom nav */
.content{padding-bottom:148px !important}
.fab{bottom:80px}
.detail-body{padding-bottom:148px !important}

const CAT_SPINE={"Self-Awareness":"#8B6540","Current America":"#556B4A","Economics & Money":"#2E4460","Technology":"#8B4B3B","American History":"#8B3B4E","Science":"#5E4570","World History":"#3B7080","Philosophy & Ethics":"#408060","Religion":"#6B5090","Fiction":"#8B7530","Other":"#5A5650"};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function fmtDate(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
function fmtShort(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function daysBetween(a,b){if(!a||!b)return null;return Math.max(1,Math.round((new Date(b)-new Date(a))/86400000))}
function getGoal(){return(data.settings.goals&&data.settings.goals.annual)||data.settings.goal||50}
function getCompleted(){return data.books.filter(b=>b.status==="completed")}
function getReading(){return data.books.filter(b=>b.status==="reading")}
function load(){try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(d.books&&d.books.length>0)return d}}catch(e){}return null}
function save(){localStorage.setItem(SK,JSON.stringify(data))}

function getDayStreak(){
  const sessionDays={};data.books.forEach(b=>(b.sessions||[]).forEach(s=>{if(!s.date)return;const k=s.date.slice(0,10);sessionDays[k]=(sessionDays[k]||0)+1}));
  const today=new Date();today.setHours(0,0,0,0);
  let current=0;for(let d=new Date(today);;d.setDate(d.getDate()-1)){if(sessionDays[d.toISOString().slice(0,10)])current++;else break}
  let best=0,run=0;const keys=Object.keys(sessionDays).sort();keys.forEach((k,i)=>{if(i===0)run=1;else{const prev=new Date(keys[i-1]);prev.setDate(prev.getDate()+1);run=prev.toISOString().slice(0,10)===k?run+1:1}if(run>best)best=run});
  // This week (Mon-Sun)
  const dow=today.getDay()===0?6:today.getDay()-1;const weekStart=new Date(today);weekStart.setDate(weekStart.getDate()-dow);let weekRead=0;
  for(let i=0;i<7;i++){const wd=new Date(weekStart);wd.setDate(wd.getDate()+i);if(sessionDays[wd.toISOString().slice(0,10)])weekRead++}
  // This month
  const cm=today.getMonth(),cy=today.getFullYear(),dim=new Date(cy,cm+1,0).getDate();let monthRead=0;
  for(let d=1;d<=dim;d++){const dk=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;if(sessionDays[dk])monthRead++}
  return{current,best,weekRead,monthRead,monthDays:dim,sessionDays};
}

// ═══ AUTO-MILESTONE ENGINE (50 rules) ═══
// Returns {earned:[], next:{}} — earned milestones + next upcoming
function autoMilestones(){
const comp=getCompleted().sort((a,b)=>new Date(a.endDate)-new Date(b.endDate));
const all=data.books;const ab=all.filter(b=>b.status==="abandoned");const reading=getReading();
if(!comp.length)return{earned:[],next:{icon:"book",color:"var(--accent)",label:"Finish Your First Book",detail:"Start reading!",pct:0}};
const totalPages=comp.reduce((s,b)=>s+(b.pages||0),0);
const cats=new Set(comp.map(b=>b.category));
const durs=comp.filter(b=>b.startDate&&b.endDate).map(b=>({...b,days:Math.max(1,Math.round((new Date(b.endDate)-new Date(b.startDate))/86400000))}));
const ratings=comp.filter(b=>b.rating>0);
const annotated=all.filter(b=>b.notes||b.coreArgument||b.impact||(b.quotes&&b.quotes.length)).length;
const totalQuotes=all.reduce((s,b)=>s+(b.quotes||[]).length,0);
const monthMap={};comp.forEach(b=>{if(b.endDate){const k=b.endDate.slice(0,7);monthMap[k]=(monthMap[k]||0)+1}});
const monthNames={"01":"Jan","02":"Feb","03":"Mar","04":"Apr","05":"May","06":"Jun","07":"Jul","08":"Aug","09":"Sep","10":"Oct","11":"Nov","12":"Dec"};
const allSessions=[];all.forEach(b=>(b.sessions||[]).forEach(s=>allSessions.push({...s,book:b})));
const earned=[];

// ── COUNT MILESTONES (1-9) ──
if(comp.length>=1)earned.push({icon:"book",color:"var(--accent)",label:"First Book",detail:comp[0].title});
[5,10,15,20,25,30,40,50].forEach(n=>{if(comp.length>=n)earned.push({icon:n>=25?"star":"books",color:n>=25?"var(--gold)":"var(--accent)",label:`${n} Books`,detail:`Reached with ${comp[n-1].title}`})});

// ── PAGE MILESTONES (10-12) ──
if(totalPages>=10000)earned.push({icon:"ruler",color:"#8B6AAC",label:"10,000 Pages",detail:`${totalPages.toLocaleString()} total`});
else if(totalPages>=5000)earned.push({icon:"ruler",color:"#8B6AAC",label:"5,000 Pages",detail:`${totalPages.toLocaleString()} total`});
else if(totalPages>=2000)earned.push({icon:"ruler",color:"#8B6AAC",label:"2,000 Pages",detail:`${totalPages.toLocaleString()} total`});

// ── RATING MILESTONES (13-16) ──
const fiveStars=ratings.filter(b=>b.rating===5);
if(fiveStars.length>=1)earned.push({icon:"star",color:"var(--gold)",label:"First 5-Star",detail:fiveStars[0].title});
if(fiveStars.length>=5)earned.push({icon:"star",color:"var(--gold)",label:"5 Five-Star Books",detail:"Discerning taste"});
if(ratings.length>=5&&ratings.every(b=>b.rating>=4))earned.push({icon:"star",color:"var(--gold)",label:"No Book Below 4★",detail:"High standards"});
if(ratings.length>=3&&ratings.every(b=>b.rating===5))earned.push({icon:"star",color:"var(--gold)",label:"Perfect Streak",detail:"All 5 stars"});

// ── PACE MILESTONES (17-22) ──
if(durs.length){
  const fastest=durs.reduce((a,b)=>a.days<b.days?a:b);
  if(fastest.days<=3)earned.push({icon:"bolt",color:"#C46B5B",label:"Lightning Read",detail:`${fastest.title} in ${fastest.days}d`});
  else if(fastest.days<=7)earned.push({icon:"bolt",color:"#C46B5B",label:"Speed Reader",detail:`${fastest.title} in ${fastest.days}d`});
  else if(fastest.days<=14)earned.push({icon:"bolt",color:"#C46B5B",label:"Quick Finish",detail:`${fastest.title} in ${fastest.days}d`});
  const slowest=durs.reduce((a,b)=>a.days>b.days?a:b);
  if(slowest.days>=90)earned.push({icon:"clock",color:"var(--textD)",label:"The Long Haul",detail:`${slowest.title} — ${slowest.days} days`});
}
const biggest=comp.reduce((a,b)=>(a.pages||0)>(b.pages||0)?a:b,comp[0]);
if(biggest.pages>=1000)earned.push({icon:"brick",color:"var(--blue)",label:"Thousand-Pager",detail:`${biggest.title} — ${biggest.pages.toLocaleString()}p`});
else if(biggest.pages>=500)earned.push({icon:"brick",color:"var(--blue)",label:"Marathon Read",detail:`${biggest.title} — ${biggest.pages}p`});

// ── CATEGORY MILESTONES (23-28) ──
if(cats.size>=8)earned.push({icon:"rainbow",color:"var(--green)",label:"Renaissance Reader",detail:`${cats.size} categories`});
else if(cats.size>=5)earned.push({icon:"rainbow",color:"var(--green)",label:`${cats.size} Categories`,detail:"Wide-ranging taste"});
if(cats.size===1&&comp.length>=3)earned.push({icon:"target",color:"var(--accent)",label:"Specialist",detail:`All ${[...cats][0]}`});
const catCounts={};comp.forEach(b=>catCounts[b.category]=(catCounts[b.category]||0)+1);
const topCatEntry=Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0];
if(topCatEntry&&topCatEntry[1]>=5)earned.push({icon:"target",color:"var(--accent)",label:`${topCatEntry[0]} Expert`,detail:`${topCatEntry[1]} books`});
if(comp.length>=3){let maxS=1,curS=1,sCat=comp[0].category;for(let i=1;i<comp.length;i++){if(comp[i].category===comp[i-1].category){curS++;if(curS>maxS){maxS=curS;sCat=comp[i].category}}else curS=1}if(maxS>=3)earned.push({icon:"target",color:"var(--accent)",label:`${sCat} Deep Dive`,detail:`${maxS} in a row`})}

// ── MONTH/TEMPORAL MILESTONES (29-34) ──
const bestMonth=Object.entries(monthMap).sort((a,b)=>b[1]-a[1])[0];
if(bestMonth&&bestMonth[1]>=3)earned.push({icon:"flame",color:"#C45B5B",label:`${bestMonth[1]} in One Month`,detail:monthNames[bestMonth[0].split("-")[1]]||bestMonth[0]});
else if(bestMonth&&bestMonth[1]>=2)earned.push({icon:"flame",color:"#C45B5B",label:"Double Month",detail:monthNames[bestMonth[0].split("-")[1]]||bestMonth[0]});
const activeMonths=Object.keys(monthMap).length;
if(activeMonths>=10)earned.push({icon:"calendar",color:"var(--green)",label:"Year-Round Reader",detail:`${activeMonths} months active`});
else if(activeMonths>=6)earned.push({icon:"calendar",color:"var(--green)",label:"Steady Habit",detail:`${activeMonths} months active`});
for(let i=1;i<comp.length;i++){const gap=Math.round((new Date(comp[i].endDate)-new Date(comp[i-1].endDate))/86400000);if(gap<=3){earned.push({icon:"bolt",color:"#C46B5B",label:"Back to Back",detail:`${comp[i-1].title} → ${comp[i].title}`});break}}

// ── CONTENT MILESTONES (35-42) ──
if(annotated>=10)earned.push({icon:"pencil",color:"var(--accent)",label:"Deep Annotator",detail:`${annotated} books with notes`});
else if(annotated>=5)earned.push({icon:"pencil",color:"var(--accent)",label:"Active Reader",detail:`${annotated} books annotated`});
if(totalQuotes>=20)earned.push({icon:"quote",color:"var(--accentDim)",label:"Quote Collector",detail:`${totalQuotes} passages saved`});
else if(totalQuotes>=10)earned.push({icon:"quote",color:"var(--accentDim)",label:"Passage Hunter",detail:`${totalQuotes} saved`});
else if(totalQuotes>=5)earned.push({icon:"quote",color:"var(--accentDim)",label:"First Passages",detail:`${totalQuotes} saved`});
const allThemes={};all.forEach(b=>(b.themes||[]).forEach(t=>{const k=t.toLowerCase();allThemes[k]=(allThemes[k]||0)+1}));
if(Object.keys(allThemes).length>=20)earned.push({icon:"grid",color:"#5B9EAD",label:"Theme Mapper",detail:`${Object.keys(allThemes).length} unique themes`});
const themeMax=Object.entries(allThemes).sort((a,b)=>b[1]-a[1])[0];
if(themeMax&&themeMax[1]>=4)earned.push({icon:"grid",color:"#5B9EAD",label:`"${themeMax[0]}" Thread`,detail:`Appears in ${themeMax[1]} books`});
if(ab.length===0&&comp.length>=5)earned.push({icon:"check",color:"var(--green)",label:"Completionist",detail:"Zero abandoned books"});

// ── BEHAVIORAL MILESTONES (43-47) ──
if(allSessions.length>=50)earned.push({icon:"clock",color:"var(--blue)",label:"50 Sessions",detail:"Dedicated tracker"});
else if(allSessions.length>=20)earned.push({icon:"clock",color:"var(--blue)",label:"20 Sessions",detail:"Building the habit"});
const totalMin=allSessions.reduce((s,x)=>s+(x.duration||0),0);
if(totalMin>=1200)earned.push({icon:"clock",color:"var(--blue)",label:"20+ Hours Reading",detail:`${Math.round(totalMin/60)}h tracked`});
if(reading.length>=3)earned.push({icon:"books",color:"var(--accent)",label:"Parallel Reader",detail:`${reading.length} books at once`});
const recs=all.filter(b=>b.recommendedBy);
if(recs.length>=3)earned.push({icon:"heart",color:"#C45B72",label:"Trust Your People",detail:`${recs.length} recommended books`});

// ── IDENTITY MILESTONES (48-50) ──
if(comp.length>=4){const fc=comp[0].category,lc=comp[comp.length-1].category;if(fc!==lc)earned.push({icon:"compass",color:"#6EC4A7",label:"Evolving Taste",detail:`${fc} → ${lc}`})}
const fiction=comp.filter(b=>b.category==="Fiction").length;
if(fiction===0&&comp.length>=5)earned.push({icon:"book",color:"var(--accent)",label:"All Nonfiction",detail:"Not a single novel"});
if(comp.length>=10&&cats.size>=5){const balanced=Object.values(catCounts).every(c=>c<=comp.length*0.3);if(balanced)earned.push({icon:"rainbow",color:"var(--green)",label:"Balanced Reader",detail:"No category over 30%"})}

// ── NEXT MILESTONE ──
let next=null;
const nextCount=[5,10,15,20,25,30,40,50].find(n=>n>comp.length);
if(nextCount){const rem=nextCount-comp.length;next={icon:"target",color:"var(--textD)",label:`${rem} to ${nextCount} Books`,detail:`${comp.length} of ${nextCount}`,pct:Math.round(comp.length/nextCount*100)}}
else if(totalPages<5000)next={icon:"ruler",color:"var(--textD)",label:`${(5000-totalPages).toLocaleString()} to 5,000 Pages`,detail:`${totalPages.toLocaleString()} so far`,pct:Math.round(totalPages/5000*100)};

return{earned,next};
}

// Backward compat wrapper for shelf banner
function getMilestones(){return autoMilestones().earned.slice(-4).map(m=>({label:m.label,icon:""}))}

function getCategoryProgress(cat){const target=(data.settings.goals.categories||{})[cat]||0;if(!target)return null;const count=getCompleted().filter(b=>b.category===cat).length;return{target,count,pct:Math.min(100,Math.round(count/target*100))}}
function getChallengeProgress(ch){const completed=getCompleted();let current=0;if(ch.type==="count"){let pool=completed;if(ch.categoryFilter)pool=pool.filter(b=>b.category===ch.categoryFilter);if(ch.minPages)pool=pool.filter(b=>(b.pages||0)>=ch.minPages);current=pool.length}else if(ch.type==="pages"){let pool=completed;if(ch.categoryFilter)pool=pool.filter(b=>b.category===ch.categoryFilter);current=pool.reduce((s,b)=>s+(b.pages||0),0)}else if(ch.type==="category"){current=completed.filter(b=>b.category===ch.categoryFilter).length}else if(ch.type==="diversity"){current=new Set(completed.map(b=>b.category)).size}return{current,target:ch.target,pct:Math.min(100,Math.round(current/ch.target*100)),done:current>=ch.target}}

function exportCSV(){
  const headers=["Title","Author","Category","Status","Rating","Pages","Start Date","End Date","Themes","Notes"];
  const rows=data.books.map(b=>[b.title||"",b.author||"",b.category||"",b.status||"",b.rating||"",b.pages||"",b.startDate||"",b.endDate||"",(b.themes||[]).join("; "),(b.notes||"").slice(0,200)]);
  const csvEsc=v=>{const s=String(v);return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=[headers.map(csvEsc).join(","),...rows.map(r=>r.map(csvEsc).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`reading-ledger-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href);data.settings.lastExport=new Date().toISOString();save();
}

function showToast(msg,type){const t=document.getElementById("qaToast");t.textContent=msg;t.classList.add("show");if(type)t.style.background=type==="gold"?"var(--gold)":type==="dim"?"var(--border)":"";else t.style.background="";setTimeout(()=>{t.classList.remove("show");t.style.background=""},2000)}

// ─── Debounce Session Engine ───
const DEBOUNCE_MS=30000; // 30 seconds
let _pendingSessions={}; // keyed by bookId: {startPage, endPage, timer, countdownInterval, countdownLeft}

function _updateNRDisplay(bk){
  const pg=bk.pages||1,cur=bk.currentPage||0,pct=Math.min(100,Math.round(cur/pg*100));
  const col=CAT_COLORS[bk.category]||CAT_COLORS.Other;
  const pctEl=document.getElementById("nrPct_"+bk.id);if(pctEl)pctEl.textContent=pct+"%";
  const fillEl=document.getElementById("nrFill_"+bk.id);if(fillEl)fillEl.style.width=pct+"%";
  const stepper=document.querySelector(`.nr-stepper[data-book="${bk.id}"]`);
  if(stepper){const lbl=stepper.querySelector(".nr-val span");if(lbl)lbl.textContent=cur;const inp=stepper.querySelector(".nr-val input");if(inp)inp.value=cur}
}

function _updatePendingUI(bookId){
  const el=document.getElementById("nrPending_"+bookId);if(!el)return;
  const ps=_pendingSessions[bookId];
  if(!ps){el.innerHTML="";return}
  const pages=ps.endPage-ps.startPage;
  const pctLeft=Math.round((ps.countdownLeft/DEBOUNCE_MS)*100);
  if(pages>0)el.innerHTML=`<span class="pos">+${pages}p pending</span> <span class="countdown-bar"><span class="countdown-bar-inner" style="width:${pctLeft}%"></span></span>`;
  else el.innerHTML=`<span class="cancelled">back to start \u2014 will cancel</span> <span class="countdown-bar"><span class="countdown-bar-inner" style="width:${pctLeft}%"></span></span>`;
}

function _commitPending(bookId){
  const ps=_pendingSessions[bookId];if(!ps)return;
  clearTimeout(ps.timer);clearInterval(ps.countdownInterval);
  const pages=ps.endPage-ps.startPage;
  const bk=data.books.find(b=>b.id===bookId);
  if(pages>0&&bk){
    if(!bk.sessions)bk.sessions=[];
    bk.sessions.push({id:uid(),date:new Date().toISOString(),startPage:ps.startPage,endPage:ps.endPage,duration:0,notes:""});
    bk.updatedAt=new Date().toISOString();save();
    showToast(`Logged: pg ${ps.startPage} \u2192 ${ps.endPage}  (+${pages}p)`);
  }else if(pages<=0){
    showToast("Session cancelled","dim");
  }
  delete _pendingSessions[bookId];
  _updatePendingUI(bookId);
}

function _resetPendingTimer(bookId){
  const ps=_pendingSessions[bookId];if(!ps)return;
  clearTimeout(ps.timer);clearInterval(ps.countdownInterval);
  ps.countdownLeft=DEBOUNCE_MS;
  ps.countdownInterval=setInterval(()=>{ps.countdownLeft=Math.max(0,ps.countdownLeft-100);_updatePendingUI(bookId)},100);
  ps.timer=setTimeout(()=>_commitPending(bookId),DEBOUNCE_MS);
}

function nrMovePage(bookId,newPage){
  const bk=data.books.find(b=>b.id===bookId);if(!bk)return;
  const pg=bk.pages||9999;newPage=Math.max(0,Math.min(pg,newPage));
  if(newPage===bk.currentPage)return;
  const ps=_pendingSessions[bookId];
  if(!ps){
    if(newPage>bk.currentPage){
      _pendingSessions[bookId]={startPage:bk.currentPage,endPage:newPage,timer:null,countdownInterval:null,countdownLeft:DEBOUNCE_MS};
      bk.currentPage=newPage;bk.updatedAt=new Date().toISOString();save();
      _updateNRDisplay(bk);_resetPendingTimer(bookId);_updatePendingUI(bookId);
    }else{
      bk.currentPage=newPage;bk.updatedAt=new Date().toISOString();save();_updateNRDisplay(bk);
    }
  }else{
    bk.currentPage=newPage;bk.updatedAt=new Date().toISOString();save();_updateNRDisplay(bk);
    if(bk.currentPage<=ps.startPage){ps.endPage=ps.startPage}
    else{ps.endPage=bk.currentPage}
    _resetPendingTimer(bookId);_updatePendingUI(bookId);
  }
  // Book completion
  if(bk.currentPage>=pg){bk.status="completed";bk.endDate=new Date().toISOString().slice(0,10);bk.updatedAt=new Date().toISOString();save();_commitPending(bookId);showToast(`Finished "${bk.title}"! \u{1F389}`,"gold");setTimeout(()=>{renderShelf();updateHeader()},500);return}
  updateHeader();
}

// ─── Nudge Banner ───
function getNudge(){
  if(nudgeDismissed)return null;
  const reading=getReading();if(!reading.length)return null;
  const b=reading[0],pages=b.pages||1,cur=b.currentPage||0,remaining=pages-cur,pct=Math.min(100,Math.round(cur/pages*100));
  if(pct<5)return null; // don't nudge if barely started
  const sesPages=(b.sessions||[]).reduce((s,se)=>s+Math.max(0,(se.endPage||0)-(se.startPage||0)),0);
  const daysReading=b.startDate?daysBetween(b.startDate,new Date().toISOString()):0;
  const pgDay=daysReading>0?sesPages/daysReading:0;
  const estDays=pgDay>0?Math.ceil(remaining/pgDay):0;
  let sub="";
  if(remaining<=50)sub=`Only ${remaining} pages left \u2014 finish it today?`;
  else if(estDays>0)sub=`At your pace, ~${estDays} day${estDays!==1?"s":""} to finish`;
  else sub=`${remaining} pages remaining`;
  return{bookId:b.id,title:b.title,pct,sub,icon:pct>=75?"\u{1F525}":pct>=50?"\u{1F4D6}":"\u2615"};
}

}else{
  html+=`<div class="tlf-timer"><span class="tlf-timer-display timer-live">${timeStr}</span><div class="tlf-timer-btns">`;
  if(isRunning)html+=`<button class="tlf-tbtn pause" data-book="${book.id}">Pause</button><button class="tlf-tbtn stop" data-book="${book.id}">Stop</button>`;
  else if(isPaused)html+=`<button class="tlf-tbtn resume" data-book="${book.id}">Resume</button><button class="tlf-tbtn stop" data-book="${book.id}">Stop</button>`;
  else html+=`<button class="tlf-tbtn start" data-book="${book.id}">Start Reading</button>`;
  html+=`</div></div>`;
}
html+=`</div>`}else{html+=`<p class="tl-empty">No books in progress. Add a book with status \u201CReading\u201D to get started.</p>`}

// ═══ Activity Feed (plain, no weekly summaries) ═══
const today=new Date();today.setHours(0,0,0,0);const todayKey=today.toISOString().slice(0,10);
const events=[];data.books.forEach(b=>{if(b.startDate)events.push({type:'start',date:b.startDate,book:b});if(b.endDate&&b.status==="completed")events.push({type:'finish',date:b.endDate,book:b});(b.sessions||[]).forEach(s=>events.push({type:'session',date:s.date,book:b,session:s}));(b.quotes||[]).forEach(q=>{if(q.addedAt)events.push({type:'quote',date:q.addedAt,book:b,quote:q})})});events.sort((a,b)=>new Date(b.date)-new Date(a.date));
html+=`<hr class="tl-divider"><p class="tl-section-title">Activity</p>`;
if(events.length){const shown=events.slice(0,window._tlStreamCount||20);
const dayGroups=[];let lastDay='';shown.forEach(ev=>{const dk=new Date(ev.date).toISOString().slice(0,10);if(dk!==lastDay){dayGroups.push({key:dk,events:[]});lastDay=dk}dayGroups[dayGroups.length-1].events.push(ev)});
const yestD=new Date(today);yestD.setDate(yestD.getDate()-1);const yestKey=yestD.toISOString().slice(0,10);
dayGroups.forEach(g=>{
  let label=fmtShort(g.key);if(g.key===todayKey)label='<strong>Today</strong> \u00B7 '+label;else if(g.key===yestKey)label='<strong>Yesterday</strong> \u00B7 '+label;else label='<strong>'+label+'</strong>';
  html+=`<div class="tl-feed-day"><div class="tl-feed-day-label">${label}</div>`;g.events.forEach(ev=>{if(ev.type==='session'){const pages=Math.max(0,(ev.session.endPage||0)-(ev.session.startPage||0));let sub=[];if(ev.session.startPage!=null&&ev.session.endPage!=null)sub.push(`p.${ev.session.startPage} \u2192 ${ev.session.endPage}`);if(ev.session.duration)sub.push(ev.session.duration+'min');if(pages>0&&ev.session.duration>0)sub.push((pages/ev.session.duration).toFixed(1)+' pg/min');
  html+=`<div class="tl-fi session" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Read <strong>${esc(ev.book.title)}</strong>${pages>0?' \u2014 <span class="pg">'+pages+' pages</span>':''}</p>${sub.length?'<p class="tl-fi-sub">'+sub.join(' \u00B7 ')+'</p>':''}</div></div>`}
  else if(ev.type==='finish'){const dur=daysBetween(ev.book.startDate,ev.book.endDate);let meta=[];if(ev.book.pages)meta.push(ev.book.pages+' pages');if(dur)meta.push(dur+' days');html+=`<div class="tl-fi finish" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Finished <strong>${esc(ev.book.title)}</strong>${meta.length?' \u2014 '+meta.join(' in '):''}</p>${ev.book.rating?'<p class="tl-fi-stars">'+'\u2605'.repeat(ev.book.rating)+'</p>':''}</div></div>`}
  else if(ev.type==='start'){html+=`<div class="tl-fi start" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Started <strong>${esc(ev.book.title)}</strong>${ev.book.pages?' \u00B7 '+ev.book.pages+' pages':''}</p></div></div>`}
  else if(ev.type==='quote'){html+=`<div class="tl-fi quote" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Saved quote from <strong>${esc(ev.book.title)}</strong></p><p class="tl-fi-quote">\u201C${esc(ev.quote.text||'')}\u201D</p></div></div>`}});html+=`</div>`});
if(events.length>(window._tlStreamCount||20))html+=`<button class="tls-show-more" id="tlShowMore">Show more</button>`}else{html+=`<p class="tl-empty">No reading activity yet.</p>`}

// ═══ Up Next ═══
const wantToRead=data.books.filter(b=>b.status==='want-to-read').sort((a,b)=>{if(a.recommendedBy&&!b.recommendedBy)return -1;if(!a.recommendedBy&&b.recommendedBy)return 1;if((b.priority||0)!==(a.priority||0))return(b.priority||0)-(a.priority||0);return new Date(a.addedAt)-new Date(b.addedAt)});
if(wantToRead.length){const nx=wantToRead[0];const nxCol=CAT_COLORS[nx.category]||CAT_COLORS.Other;
html+=`<hr class="tl-divider"><div class="tl-next"><div class="tl-next-header"><span class="tl-next-icon">\u{1F4DA}</span><span class="tl-next-title">Up Next</span></div>`;

el.innerHTML=html;
bindTimelineEvents(el);
}

function bindTimelineEvents(el){
  const prevBtn=el.querySelector('.tlf-prev');if(prevBtn)prevBtn.onclick=e=>{e.stopPropagation();window._focusIdx=((window._focusIdx||0)-1+getReading().length)%getReading().length;renderTimeline()};
  const nextBtn=el.querySelector('.tlf-next');if(nextBtn)nextBtn.onclick=e=>{e.stopPropagation();window._focusIdx=(window._focusIdx||0)+1;renderTimeline()};
  el.querySelectorAll('.tlf-title[data-id]').forEach(t=>t.onclick=()=>openDetail(t.dataset.id));
  // Timer: start
  el.querySelectorAll('.tlf-tbtn.start:not(.nr-st-save)').forEach(btn=>btn.onclick=e=>{e.stopPropagation();const bid=btn.dataset.book;window._lastTimerBookId=bid;if(timerState.intervalId)clearInterval(timerState.intervalId);timerState={running:true,paused:false,startTime:Date.now(),elapsed:0,intervalId:null,bookId:bid,_pauseAccum:0};timerState.intervalId=setInterval(()=>{timerState.elapsed=Math.floor((Date.now()-timerState.startTime)/1000)+(timerState._pauseAccum||0);document.querySelectorAll('.timer-live').forEach(e2=>{const m=Math.floor(timerState.elapsed/60),s=timerState.elapsed%60;e2.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")})},1000);renderTimeline()});
  // Timer: pause
  el.querySelectorAll('.tlf-tbtn.pause').forEach(btn=>btn.onclick=e=>{e.stopPropagation();if(timerState.intervalId)clearInterval(timerState.intervalId);timerState._pauseAccum=timerState.elapsed;timerState.paused=true;timerState.running=true;timerState.intervalId=null;renderTimeline()});
  // Timer: resume
  el.querySelectorAll('.tlf-tbtn.resume').forEach(btn=>btn.onclick=e=>{e.stopPropagation();if(timerState.intervalId)clearInterval(timerState.intervalId);timerState.startTime=Date.now();timerState.paused=false;timerState.intervalId=setInterval(()=>{timerState.elapsed=Math.floor((Date.now()-timerState.startTime)/1000)+(timerState._pauseAccum||0);document.querySelectorAll('.timer-live').forEach(e2=>{const m=Math.floor(timerState.elapsed/60),s=timerState.elapsed%60;e2.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")})},1000);renderTimeline()});
  // Timer: stop
  el.querySelectorAll('.tlf-tbtn.stop:not(.nr-st-skip)').forEach(btn=>btn.onclick=e=>{e.stopPropagation();if(timerState.intervalId)clearInterval(timerState.intervalId);pendingSessionDur=Math.max(1,Math.round(timerState.elapsed/60));window._lastTimerBookId=btn.dataset.book;timerState={running:false,paused:false,startTime:null,elapsed:0,intervalId:null,bookId:null,_pauseAccum:0};renderTimeline()});
  // Session save
  el.querySelectorAll('.nr-st-save').forEach(btn=>btn.onclick=e=>{e.stopPropagation();const bk=data.books.find(b=>b.id===btn.dataset.book);if(!bk)return;if(!bk.sessions)bk.sessions=[];const form=btn.closest('.tlf-session-form');let sp=parseInt(form.querySelector('.nr-st-start')?.value);sp=(isNaN(sp)||sp<0)?null:sp;let ep=parseInt(form.querySelector('.nr-st-end')?.value);ep=(isNaN(ep)||ep<0)?null:ep;if(sp!=null&&ep!=null&&ep<sp){const tmp=sp;sp=ep;ep=tmp}if(ep!=null&&bk.pages&&ep>bk.pages)ep=bk.pages;const notes=(form.querySelector('.nr-st-notes')?.value||'').trim();bk.sessions.push({id:uid(),date:new Date().toISOString().slice(0,10),startPage:sp,endPage:ep,duration:pendingSessionDur,notes});if(ep)bk.currentPage=ep;bk.updatedAt=new Date().toISOString();pendingSessionDur=0;window._lastTimerBookId=null;save();renderTimeline();updateHeader()});
  // Session skip
  el.querySelectorAll('.nr-st-skip').forEach(btn=>btn.onclick=e=>{e.stopPropagation();pendingSessionDur=0;window._lastTimerBookId=null;renderTimeline()});
  // Feed clicks
  el.querySelectorAll('.tl-fi[data-id]').forEach(item=>item.onclick=()=>openDetail(item.dataset.id));
  const showMore=document.getElementById('tlShowMore');if(showMore)showMore.onclick=()=>{window._tlStreamCount=(window._tlStreamCount||20)+20;renderTimeline()};
  // Up Next: Start button
  el.querySelectorAll('.tl-next-start').forEach(btn=>btn.onclick=e=>{e.stopPropagation();const bk=data.books.find(b=>b.id===btn.dataset.id);if(!bk)return;bk.status='reading';bk.startDate=new Date().toISOString().slice(0,10);bk.updatedAt=new Date().toISOString();save();showToast(`Started "${bk.title}"`);renderTimeline();renderShelf();updateHeader()});
  el.querySelectorAll('.tl-next-card').forEach(card=>card.onclick=()=>openDetail(card.dataset.id));
}

/* ═══ ANALYTICS — DNA summary, stats, streak ring, categories, theme cloud, goals ═══ */
// ══════ ANALYTICS ══════
function renderAnalytics(){
const comp=getCompleted(),goal=getGoal(),pct=Math.min(100,Math.round(comp.length/goal*100)),totalPages=comp.reduce((s,b)=>s+(b.pages||0),0);
const avgDays=(()=>{const ds=comp.filter(b=>b.startDate&&b.endDate).map(b=>daysBetween(b.startDate,b.endDate));return ds.length?Math.round(ds.reduce((a,c)=>a+c,0)/ds.length):0})();
const allQuotes=[];data.books.forEach(b=>(b.quotes||[]).forEach(q=>allQuotes.push(q)));
const annotated=data.books.filter(b=>b.notes||b.coreArgument||b.impact||(b.quotes&&b.quotes.length>0)).length;
const sk=getDayStreak();

// Build theme data (used by DNA and theme cloud)
const allThemes={};data.books.forEach(b=>(b.themes||[]).forEach(t=>{const key=t.toLowerCase();if(!allThemes[key])allThemes[key]={name:t,books:[]};allThemes[key].books.push(b)}));
const themeEntries=Object.values(allThemes).sort((a,b)=>b.books.length-a.books.length);

// Category data
const catData=CATEGORIES.map(c=>({name:c,value:comp.filter(b=>b.category===c).length})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);

let html='';

// ═══ Reading DNA ═══
if(comp.length){
  const topCats=catData.slice(0,2).map(c=>c.name);
  const topThemeNames=themeEntries.slice(0,3).map(t=>t.name);
  let dna=`You\u2019ve completed <strong>${comp.length}</strong> book${comp.length!==1?'s':''} this year`;
  if(topCats.length)dna+=`, mostly <span class="dna-accent">${topCats.join('</span> and <span class="dna-accent">')}</span>`;
  dna+='.';
  if(sk.current>0)dna+=` You\u2019re on a <span class="dna-accent">${sk.current}-day streak</span>`;
  if(sk.best>sk.current)dna+=` \u2014 your best was ${sk.best}`;
  if(sk.current>0)dna+='.';
  if(topThemeNames.length)dna+=` Top themes: ${topThemeNames.map(t=>`<span class="dna-accent">${esc(t)}</span>`).join(', ')}.`;
  html+=`<div class="dna"><p class="dna-text">${dna}</p></div>`;
}

// ═══ Stat Cards ═══
html+=`<div class="mini-stats"><div class="mini-stat"><p class="mini-stat-label">Completed</p><p class="mini-stat-value">${comp.length}</p><p class="mini-stat-sub">of ${goal}</p></div><div class="mini-stat"><p class="mini-stat-label">Avg Pace</p><p class="mini-stat-value">${avgDays?avgDays+"d":"\u2014"}</p><p class="mini-stat-sub">per book</p></div><div class="mini-stat"><p class="mini-stat-label">Pages</p><p class="mini-stat-value">${totalPages.toLocaleString()}</p></div><div class="mini-stat"><p class="mini-stat-label">Annotated</p><p class="mini-stat-value">${annotated}</p></div><div class="mini-stat"><p class="mini-stat-label">Quotes</p><p class="mini-stat-value">${allQuotes.length}</p></div></div>`;

// ═══ Annual Progress ═══
html+=`<div class="panel"><div class="panel-title">Annual Progress</div><div class="progress-row"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-pct">${pct}%</span></div></div>`;

// ═══ Reading Patterns (streak ring + week strip only) ═══
const aRMax=Math.max(sk.best,7),aRPct=Math.min(100,Math.round(sk.current/aRMax*100)),aRR=50,aRC=2*Math.PI*aRR,aRO=aRC-(aRPct/100)*aRC;
html+=`<div class="panel"><div class="panel-title">Reading Patterns</div><div class="patterns-top"><div class="sr-ring-wrap"><svg viewBox="0 0 120 120" width="100" height="100"><circle cx="60" cy="60" r="${aRR}" fill="none" stroke="var(--border)" stroke-width="8"/><circle cx="60" cy="60" r="${aRR}" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="${aRC}" stroke-dashoffset="${aRO}" stroke-linecap="round" transform="rotate(-90 60 60)"/></svg><div class="sr-ring-inner"><span class="sr-ring-num">${sk.current}</span><span class="sr-ring-label">day${sk.current!==1?'s':''}</span></div></div><div class="sr-details"><div class="sr-detail"><span class="sr-detail-label">Current streak</span><span class="sr-detail-val accent">${sk.current} day${sk.current!==1?'s':''}</span></div><div class="sr-detail"><span class="sr-detail-label">Best streak</span><span class="sr-detail-val">${sk.best} day${sk.best!==1?'s':''}</span></div><div class="sr-detail"><span class="sr-detail-label">This month</span><span class="sr-detail-val">${sk.monthRead} / ${sk.monthDays} days</span></div><div class="sr-detail"><span class="sr-detail-label">This week</span><span class="sr-detail-val accent">${sk.weekRead} / 7 days</span></div></div></div>`;
const todayKey=new Date().toISOString().slice(0,10);const dowVal=new Date().getDay()===0?6:new Date().getDay()-1;const weekStart=new Date();weekStart.setHours(0,0,0,0);weekStart.setDate(weekStart.getDate()-dowVal);
const dayLabels=['M','T','W','T','F','S','S'];let twC='',twL='';for(let i=0;i<7;i++){const wd=new Date(weekStart);wd.setDate(wd.getDate()+i);const wk=wd.toISOString().slice(0,10);twC+=`<div class="sr-tw-day${sk.sessionDays[wk]?' read':''}${wk===todayKey?' today':''}"></div>`;twL+=`<span class="sr-tw-label">${dayLabels[i]}</span>`}
html+=`<div class="sr-this-week">${twC}</div><div class="sr-tw-labels">${twL}</div></div>`;

// ═══ Categories ═══
if(catData.length)html+=`<div class="panel"><div class="panel-title">Categories</div><div class="pie-row"><div class="pie-wrap"><canvas id="pieChart"></canvas></div><div class="cat-legend">${catData.map(c=>`<div class="cat-legend-item"><div class="cat-legend-dot" style="background:${CAT_COLORS[c.name]}"></div><span class="cat-legend-name">${c.name}</span><span class="cat-legend-count">${c.value}</span><div class="cat-legend-bar"><div class="cat-legend-bar-fill" style="width:${(c.value/comp.length)*100}%;background:${CAT_COLORS[c.name]}"></div></div></div>`).join("")}</div></div></div>`;

// ═══ Theme Cloud ═══
if(themeEntries.length){
  const maxT=Math.max(...themeEntries.map(t=>t.books.length));
  html+=`<div class="panel"><div class="panel-title">Themes</div><div class="theme-cloud" id="themeCloud">${themeEntries.map(t=>{
    const size=t.books.length>=maxT?'lg':t.books.length>1?'md':'sm';
    return`<div class="theme-pill ${size}" data-theme="${esc(t.name)}"><span class="theme-pill-name">${esc(t.name)}</span><span class="theme-pill-count">${t.books.length}</span></div>`;
  }).join('')}</div><div class="theme-books" id="themeBooks"></div><p class="theme-auto-note">Themes are auto-tagged from book metadata when you search and add.</p></div>`;
}

// ═══ Goals & Challenges ═══
const catGoals=data.settings.goals.categories||{},challenges=data.settings.goals.challenges||[];
if(Object.keys(catGoals).length||challenges.length){html+=`<div class="panel"><div class="panel-title">Goals &amp; Challenges</div>`;
if(Object.keys(catGoals).length){html+=`<div class="goal-panel-section"><p class="goal-panel-section-title">Category Goals</p>`;Object.entries(catGoals).forEach(([cat,target])=>{const prog=getCategoryProgress(cat);if(!prog)return;const color=CAT_COLORS[cat]||CAT_COLORS.Other;html+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-family:var(--ui);font-size:12px;margin-bottom:3px"><span style="color:var(--textM)">${cat}</span><span style="color:var(--textD)">${prog.count}/${prog.target}</span></div><div class="challenge-progress-bar"><div class="challenge-progress-fill" style="width:${prog.pct}%;background:${color}"></div></div></div>`});html+=`</div>`}
if(challenges.length){html+=`<div class="goal-panel-section"><p class="goal-panel-section-title">Challenges</p>`;challenges.forEach(ch=>{const prog=getChallengeProgress(ch);html+=`<div class="challenge-card${prog.done?" challenge-done":""}"><p class="challenge-label">${esc(ch.label)}</p><p class="challenge-meta">${ch.type} \u00B7 ${prog.current}/${ch.target}</p><div class="challenge-progress-bar"><div class="challenge-progress-fill" style="width:${prog.pct}%"></div></div><p class="challenge-pct">${prog.pct}%</p></div>`});html+=`</div>`}
html+=`</div>`}

document.getElementById("viewAnalytics").innerHTML=html;
requestAnimationFrame(()=>{
  if(catData.length)drawPie(catData,comp.length);
  // Theme cloud click handlers
  const tc=document.getElementById("themeCloud");const tb=document.getElementById("themeBooks");
  if(tc)tc.querySelectorAll(".theme-pill").forEach(pill=>pill.onclick=()=>{
    const name=pill.dataset.theme;const entry=themeEntries.find(t=>t.name===name);if(!entry)return;
    const wasActive=pill.classList.contains("active");
    tc.querySelectorAll(".theme-pill").forEach(p=>p.classList.remove("active"));
    if(wasActive){tb.classList.remove("show");tb.innerHTML="";return}
    pill.classList.add("active");tb.classList.add("show");
    tb.innerHTML=`<p class="theme-active-label">${entry.books.length} book${entry.books.length!==1?'s':''} tagged \u201C${esc(entry.name)}\u201D</p>${entry.books.map(b=>{
      const col=CAT_COLORS[b.category]||CAT_COLORS.Other;
      return`<div class="theme-book-item" data-id="${b.id}"><div class="theme-book-dot" style="background:${col}"></div><span class="theme-book-title">${esc(b.title)}</span><span class="theme-book-cat">${esc(b.category)}</span></div>`;
    }).join('')}`;
    tb.querySelectorAll(".theme-book-item").forEach(item=>item.onclick=()=>openDetail(item.dataset.id));
  });
});
}

// ═══ Reader identity ═══
const ID_LABELS={"Self-Awareness":"Seeker","Current America":"Citizen","Economics & Money":"Economist","Technology":"Technologist","American History":"Historian","Science":"Scientist","World History":"Historian","Philosophy & Ethics":"Philosopher","Religion":"Contemplative","Fiction":"Storyteller","Other":"Explorer"};
function getReaderIdentity(slice){
  const cc={};slice.forEach(b=>cc[b.category]=(cc[b.category]||0)+1);const s=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  const w1=ID_LABELS[s[0][0]]||"Reader",w2=s[1]?ID_LABELS[s[1][0]]||"Reader":null;
  return w2&&w2!==w1?`The ${w1}-${w2}`:`The ${w1}`;
}
function getIdentityEvolution(comp){
  const steps=[];const checks=[2,4,comp.length].filter((v,i,a)=>v<=comp.length&&a.indexOf(v)===i);
  const sorted=[...comp].sort((a,b)=>new Date(a.endDate)-new Date(b.endDate));
  checks.forEach(n=>{const id=getReaderIdentity(sorted.slice(0,n));const last=sorted[n-1];
    const period=n===comp.length?'Now':fmtShort(sorted[0].endDate)+' \u2013 '+fmtShort(last.endDate);
    if(!steps.length||steps[steps.length-1].id!==id)steps.push({id,period,current:n===comp.length})});
  return steps;
}

// ═══ Narrative engine (selects top 3 patterns) ═══
function composeNarrative(comp){
  if(comp.length<2)return'';const sorted=[...comp].sort((a,b)=>new Date(a.endDate)-new Date(b.endDate));
  const durs=sorted.filter(b=>b.startDate&&b.endDate).map(b=>({...b,days:Math.max(1,Math.round((new Date(b.endDate)-new Date(b.startDate))/86400000))}));
  const totalPages=comp.reduce((s,b)=>s+(b.pages||0),0);const cats=new Set(comp.map(b=>b.category));
  const catCounts={};comp.forEach(b=>catCounts[b.category]=(catCounts[b.category]||0)+1);const topCat=Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0];
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const r=[];

  // Opening
  const first=sorted[0];const fMonth=monthNames[new Date(first.endDate).getMonth()];
  r.push({s:5,t:`Your year started with <strong>${esc(first.title)}</strong> in ${fMonth}.`});

  // Category shift
  if(comp.length>=4){const half=Math.floor(comp.length/2);const fc={},sc={};sorted.slice(0,half).forEach(b=>fc[b.category]=(fc[b.category]||0)+1);sorted.slice(half).forEach(b=>sc[b.category]=(sc[b.category]||0)+1);const tf=Object.entries(fc).sort((a,b)=>b[1]-a[1])[0];const ts=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];if(tf&&ts&&tf[0]!==ts[0])r.push({s:7,t:`Your reading shifted from <em>${tf[0]}</em> to <em>${ts[0]}</em> as the year went on.`})}

  // Fastest
  if(durs.length){const fastest=durs.reduce((a,b)=>a.days<b.days?a:b);if(fastest.days<=14)r.push({s:6,t:`Your fastest was <em>${esc(fastest.title)}</em> at ${fastest.days} days.`})}

  // Longest book
  const longest=comp.reduce((a,b)=>(a.pages||0)>(b.pages||0)?a:b,comp[0]);if(longest.pages>=400)r.push({s:5,t:`The longest was <em>${esc(longest.title)}</em> at ${longest.pages.toLocaleString()} pages.`});

  // Pace trend
  if(durs.length>=4){const half=Math.floor(durs.length/2);const af=durs.slice(0,half).reduce((s,b)=>s+b.days,0)/half;const as=durs.slice(half).reduce((s,b)=>s+b.days,0)/(durs.length-half);if(as<af*0.7)r.push({s:6,t:`Your pace picked up \u2014 finishing books ${Math.round((1-as/af)*100)}% faster in the second half.`})}

  // Breadth
  if(cats.size>=5)r.push({s:4,t:`Across <em>${cats.size} categories</em>, you gravitated toward <em>${topCat[0]}</em>.`});
  else if(cats.size>=3)r.push({s:3,t:`You read across ${cats.size} categories, favoring <em>${topCat[0]}</em>.`});

  // Back to back
  for(let i=1;i<sorted.length;i++){const gap=Math.round((new Date(sorted[i].endDate)-new Date(sorted[i-1].endDate))/86400000);if(gap<=7){r.push({s:5,t:`You finished <strong>${esc(sorted[i-1].title)}</strong> and <strong>${esc(sorted[i].title)}</strong> within a week of each other.`});break}}

  r.sort((a,b)=>b.s-a.s);
  // Always include opening, then top 2 others
  const opening=r.find(x=>x.s===5&&x.t.includes('started'));
  const others=r.filter(x=>x!==opening).slice(0,2);
  return[opening,...others].filter(Boolean).map(x=>x.t).join(' ');
}

}

else if(bk.status==="completed"||bk.status==="abandoned"){

  // My Takeaway

}

html+=`</div>`;

}

function renderThemesSection(bk){

function renderQuotesSection(bk){
  const quotes=bk.quotes||[];const lc=CAT_COLORS[bk.category]||CAT_COLORS.Other;

// ══════ BOOK SEARCH API ══════
function mapCategory(apiCats){if(!apiCats||!apiCats.length)return"Other";const text=apiCats.join(" ").toLowerCase();const map=[["Self-Awareness",["self-help","psychology","mindfulness","habits","motivation","personal growth"]],["Current America",["american politics","current affairs","social justice","political science"]],["Economics & Money",["economics","finance","business","investing","money","entrepreneurship"]],["Technology",["technology","computer","programming","artificial intelligence","software","engineering"]],["American History",["american history","civil war","founding fathers","united states history"]],["Science",["science","physics","biology","mathematics","neuroscience","chemistry","astronomy"]],["World History",["world history","ancient","civilization","medieval","global history"]],["Philosophy & Ethics",["philosophy","ethics","stoic","existential","moral","logic"]],["Religion",["religion","theology","bible","christianity","buddhism","islam","spirituality"]],["Fiction",["fiction","novel","fantasy","sci-fi","mystery","thriller","literary","romance","horror"]]];for(const[cat,kw]of map)if(kw.some(k=>text.includes(k)))return cat;if(text.includes("history"))return"World History";return"Other"}
function extractThemes(apiSubjects){if(!apiSubjects||!apiSubjects.length)return[];const skip=new Set(["accessible book","protected daisy","in library","large type books","lending library","internet archive wishlist","long now","nyt","bestseller","new york times"]);return[...new Set(apiSubjects.map(s=>s.toLowerCase().trim()).filter(s=>s.length>2&&s.length<40&&!skip.has(s)))].slice(0,6)}
async function searchBooks(query){const q=encodeURIComponent(query.trim());const[gRes,olRes]=await Promise.allSettled([fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=5`).then(r=>r.json()),fetch(`https://openlibrary.org/search.json?q=${q}&limit=5&fields=title,author_name,number_of_pages_median,subject`).then(r=>r.json())]);const results=[];if(gRes.status==="fulfilled"&&gRes.value.items){for(const item of gRes.value.items){const v=item.volumeInfo||{};results.push({title:v.title||"",author:(v.authors||[]).join(", "),pages:v.pageCount||null,category:mapCategory(v.categories||[]),themes:extractThemes(v.categories||[]),source:"google"})}}if(olRes.status==="fulfilled"&&olRes.value.docs){for(const doc of olRes.value.docs){results.push({title:doc.title||"",author:(doc.author_name||[]).join(", "),pages:doc.number_of_pages_median||null,category:mapCategory(doc.subject||[]),themes:extractThemes(doc.subject||[]),source:"openlibrary"})}}if(!results.length&&gRes.status==="rejected"&&olRes.status==="rejected")throw new Error("Search failed.");const seen=new Set(),deduped=[];for(const r of results){const key=(r.title+"|"+r.author).toLowerCase().replace(/\s+/g," ");if(!seen.has(key)){seen.add(key);deduped.push(r)}}return deduped.slice(0,8)}

function openForm(book){const isEdit=!!book;

const lastCat=!isEdit?(data.books.length?data.books[data.books.length-1].category:"Self-Awareness"):"";
const today=new Date().toISOString().slice(0,10);
const defStart=!isEdit&&defaultStatus==="reading"?today:(book?.startDate||"");
const defCat=book?.category||lastCat;

brary"}</button>`;

// Book search
if(!isEdit){let lastSR=[];const si=document.getElementById("fSearchInput"),sb=document.getElementById("fSearchBtn"),sr=document.getElementById("fSearchResults");

sb.onclick=doSearch;si.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();doSearch()}};
let _selectedThemes=[];
sr.onclick=e=>{const item=e.target.closest(".book-search-item");if(!item)return;const r=lastSR[parseInt(item.dataset.idx)];if(!r)return;document.getElementById("fTitle").value=r.title;document.getElementById("fAuthor").value=r.author||"";if(r.pages)document.getElementById("fPages").value=r.pages;_selectedThemes=r.themes||[];const cs=document.getElementById("fCategory");for(let i=0;i<cs.options.length;i++)if(cs.options[i].value===r.category){cs.selectedIndex=i;break}sr.innerHTML="";document.getElementById("fTitle").focus()}}
