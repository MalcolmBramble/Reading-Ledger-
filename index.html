// ─── Timer Functions ───
function startTimer(bookId){
  if(timerState.intervalId)clearInterval(timerState.intervalId);
  timerState={running:true,paused:false,startTime:Date.now(),elapsed:0,intervalId:null,bookId,_pauseAccum:0};
  timerState.intervalId=setInterval(()=>{
    timerState.elapsed=Math.floor((Date.now()-timerState.startTime)/1000)+(timerState._pauseAccum||0);
    document.querySelectorAll('.timer-live').forEach(el=>{const m=Math.floor(timerState.elapsed/60),s=timerState.elapsed%60;el.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")})
  },1000);
  renderDetail();
}
function pauseTimer(){
  if(timerState.intervalId)clearInterval(timerState.intervalId);
  timerState._pauseAccum=timerState.elapsed;
  timerState.paused=true;timerState.running=true;timerState.intervalId=null;
  renderDetail();
}
function resumeTimer(){
  if(timerState.intervalId)clearInterval(timerState.intervalId);
  timerState.startTime=Date.now();timerState.paused=false;
  timerState.intervalId=setInterval(()=>{
    timerState.elapsed=Math.floor((Date.now()-timerState.startTime)/1000)+(timerState._pauseAccum||0);
    document.querySelectorAll('.timer-live').forEach(el=>{const m=Math.floor(timerState.elapsed/60),s=timerState.elapsed%60;el.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")})
  },1000);
  renderDetail();
}
let pendingSessionDur=0;
function stopTimer(book){
  if(timerState.intervalId)clearInterval(timerState.intervalId);
  pendingSessionDur=Math.max(1,Math.round(timerState.elapsed/60));
  timerState={running:false,paused:false,startTime:null,elapsed:0,intervalId:null,bookId:null,_pauseAccum:0};
  if(!book.sessions)book.sessions=[];
  // Re-render to update timer widget, then show save form
  renderDetail();
  // After render, inject save form into the timer area
  const timerArea=document.querySelector(".session-timer");
  if(timerArea){
    timerArea.innerHTML=`<p class="timer-label">Session Complete</p><p class="timer-display">${pendingSessionDur} min</p><div style="margin-top:12px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><p class="form-label">Start Page</p><input class="form-input" type="number" id="stStartP" placeholder="\u2014"></div><div><p class="form-label">End Page</p><input class="form-input" type="number" id="stEndP" placeholder="\u2014"></div></div><div style="margin-bottom:8px"><p class="form-label">Notes</p><input class="form-input" id="stNotes" placeholder="Session notes..."></div><div style="display:flex;gap:8px;justify-content:center"><button class="timer-btn start" id="stSave">Save Session</button><button class="timer-btn log" id="stSkip">Skip</button></div></div>`;
    document.getElementById("stSave").addEventListener("click",()=>{
      let sp=parseInt(document.getElementById("stStartP").value);sp=(isNaN(sp)||sp<0)?null:sp;
      let ep=parseInt(document.getElementById("stEndP").value);ep=(isNaN(ep)||ep<0)?null:ep;
      if(sp!=null&&ep!=null&&ep<sp){const tmp=sp;sp=ep;ep=tmp}
      if(ep!=null&&book.pages&&ep>book.pages)ep=book.pages;
      book.sessions.push({id:uid(),date:new Date().toISOString().slice(0,10),startPage:sp,endPage:ep,duration:pendingSessionDur,notes:document.getElementById("stNotes").value.trim()});
      if(ep)book.currentPage=ep;book.updatedAt=new Date().toISOString();pendingSessionDur=0;save();renderDetail();
    });
    document.getElementById("stSkip").addEventListener("click",()=>{pendingSessionDur=0;save();renderDetail()});
  }
}

// ─── Theme Graph ───
function renderThemeGraph(container){
  const allThemes={};
  data.books.forEach(b=>(b.themes||[]).forEach(t=>{if(!allThemes[t])allThemes[t]={name:t,books:[]};allThemes[t].books.push(b)}));
  const themeEntries=Object.values(allThemes).sort((a,b)=>b.books.length-a.books.length);
  if(!themeEntries.length){container.innerHTML=`<p class="panel-empty">Add themes to books to see the graph.</p>`;return}

  // Canvas graph
  let html=`<canvas class="graph-canvas" id="themeCanvas"></canvas>`;
  // Theme index
  html+=`<div class="theme-index">${themeEntries.map(t=>`<div class="theme-index-item"><div class="theme-index-header" data-theme="${esc(t.name)}"><span class="theme-index-name">${esc(t.name)}</span><span class="theme-index-count">${t.books.length}</span><span class="theme-index-chevron">&#9656;</span></div><div class="theme-index-books"><div class="theme-index-books-inner">${t.books.map(b=>{const lc=CAT_COLORS[b.category]||CAT_COLORS.Other;return`<div class="theme-book-mini" data-id="${b.id}"><p class="theme-book-mini-title">${esc(b.title)}</p><p class="theme-book-mini-author">${esc(b.author)}</p><span class="cat-pill" style="background:${lc}22;color:${lc}">${esc(b.category)}</span></div>`}).join("")}</div></div></div>`).join("")}</div>`;
  container.innerHTML=html;

  // Theme index toggle
  container.querySelectorAll(".theme-index-header").forEach(h=>h.addEventListener("click",()=>h.closest(".theme-index-item").classList.toggle("expanded")));
  container.querySelectorAll(".theme-book-mini").forEach(b=>b.addEventListener("click",()=>openDetail(b.dataset.id)));

  // Force-directed graph on canvas
  const canvas=document.getElementById("themeCanvas");if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;

  // Build nodes
  const nodes=[],edges=[];
  const bookNodeMap={},themeNodeMap={};
  themeEntries.forEach((t,i)=>{
    const n={id:"t_"+t.name,label:t.name,type:"theme",r:8+Math.min(t.books.length*2,16),color:"#5B9EAD",x:W/2+(Math.random()-0.5)*W*0.6,y:H/2+(Math.random()-0.5)*H*0.6,vx:0,vy:0};
    nodes.push(n);themeNodeMap[t.name]=n;
  });
  const seenBooks=new Set();
  themeEntries.forEach(t=>t.books.forEach(b=>{
    if(!seenBooks.has(b.id)){
      seenBooks.add(b.id);
      const lc=CAT_COLORS[b.category]||"#7A7670";
      const n={id:"b_"+b.id,label:b.title,type:"book",r:4,color:lc,x:W/2+(Math.random()-0.5)*W*0.6,y:H/2+(Math.random()-0.5)*H*0.6,vx:0,vy:0,bookId:b.id};
      nodes.push(n);bookNodeMap[b.id]=n;
    }
    edges.push({source:themeNodeMap[t.name],target:bookNodeMap[b.id],type:"theme"});
  }));
  // Book-book connections
  data.books.forEach(b=>(b.connections||[]).forEach(cid=>{
    if(bookNodeMap[b.id]&&bookNodeMap[cid])edges.push({source:bookNodeMap[b.id],target:bookNodeMap[cid],type:"conn"});
  }));

  let highlightId=null;
  function simulate(){
    for(let iter=0;iter<3;iter++){
      // Repulsion
      for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){
        let dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y;
        let dist=Math.sqrt(dx*dx+dy*dy)||1;
        const force=200/(dist*dist);
        const fx=dx/dist*force,fy=dy/dist*force;
        nodes[i].vx-=fx;nodes[i].vy-=fy;nodes[j].vx+=fx;nodes[j].vy+=fy;
      }}
      // Attraction
      edges.forEach(e=>{
        let dx=e.target.x-e.source.x,dy=e.target.y-e.source.y;
        let dist=Math.sqrt(dx*dx+dy*dy)||1;
        const force=(dist-60)*0.005;
        const fx=dx/dist*force,fy=dy/dist*force;
        e.source.vx+=fx;e.source.vy+=fy;e.target.vx-=fx;e.target.vy-=fy;
      });
      // Center gravity
      nodes.forEach(n=>{n.vx+=(W/2-n.x)*0.001;n.vy+=(H/2-n.y)*0.001});
      // Apply + dampen
      nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.vx*=0.85;n.vy*=0.85;n.x=Math.max(n.r,Math.min(W-n.r,n.x));n.y=Math.max(n.r,Math.min(H-n.r,n.y))});
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // Edges
    edges.forEach(e=>{
      ctx.beginPath();ctx.moveTo(e.source.x,e.source.y);ctx.lineTo(e.target.x,e.target.y);
      const isHL=highlightId&&(e.source.id===highlightId||e.target.id===highlightId);
      ctx.strokeStyle=isHL?"rgba(196,149,106,0.6)":e.type==="conn"?"rgba(196,91,91,0.2)":"rgba(91,158,173,0.15)";
      ctx.lineWidth=isHL?1.5:0.5;ctx.stroke();
    });
    // Nodes
    nodes.forEach(n=>{
      const isHL=highlightId===n.id||edges.some(e=>(e.source.id===highlightId||e.target.id===highlightId)&&(e.source.id===n.id||e.target.id===n.id));
      const alpha=highlightId?(isHL||highlightId===n.id?1:0.2):0.85;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=n.color;ctx.globalAlpha=alpha;ctx.fill();ctx.globalAlpha=1;
      if(n.type==="theme"){ctx.font="bold 9px Outfit,sans-serif";ctx.fillStyle="rgba(237,230,216,"+alpha+")";ctx.textAlign="center";ctx.fillText(n.label,n.x,n.y+n.r+12)}
    });
  }

  let frame=0;
  function tick(){
    simulate();draw();frame++;
    if(frame<120)requestAnimationFrame(tick);
  }
  tick();

  canvas.addEventListener("click",e=>{
    const cr=canvas.getBoundingClientRect();
    const mx=e.clientX-cr.left,my=e.clientY-cr.top;
    let hit=null;
    nodes.forEach(n=>{const dx=n.x-mx,dy=n.y-my;if(Math.sqrt(dx*dx+dy*dy)<=n.r+4)hit=n});
    if(hit){
      highlightId=highlightId===hit.id?null:hit.id;
      draw();
      if(hit.type==="book"&&hit.bookId){setTimeout(()=>openDetail(hit.bookId),300)}
    }else{highlightId=null;draw()}
  });
}


// ─── Render All ───
function renderAll(){updateHeader();renderShelf();if(currentTab==="timeline")renderTimeline();if(currentTab==="analytics")renderAnalytics();if(currentTab==="review")renderReview()}
renderAll();
</script>
</body>
