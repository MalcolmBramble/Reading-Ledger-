<script>
/* ═══════════════════════════════════════════
   THE READING LEDGER
   ═══════════════════════════════════════════ */
const CATEGORIES=["Self-Awareness","Current America","Economics & Money","Technology","American History","Science","World History","Philosophy & Ethics","Religion","Fiction","Other"];
const CAT_COLORS={"Self-Awareness":"#C4956A","Current America":"#7D8B6E","Economics & Money":"#3D5A80","Technology":"#C46B5B","American History":"#C45B72","Science":"#8B6AAC","World History":"#5B9EAD","Philosophy & Ethics":"#6EC4A7","Religion":"#9B7EC4","Fiction":"#BBA14F","Other":"#7A7670"};
const CAT_SPINE={"Self-Awareness":"#8B6540","Current America":"#556B4A","Economics & Money":"#2E4460","Technology":"#8B4B3B","American History":"#8B3B4E","Science":"#5E4570","World History":"#3B7080","Philosophy & Ethics":"#408060","Religion":"#6B5090","Fiction":"#8B7530","Other":"#5A5650"};
const STATUS_LABELS={"want-to-read":"To Read","reading":"Reading","completed":"Completed","abandoned":"Dropped"};
const STORAGE_KEY="reading-ledger-v1";
const YEAR_GOAL_DEFAULT=50;

let data=loadData();
let currentTab="shelf";
let currentSort="date";
let searchOpen=false;
let searchQuery="";
let confirmCb=null;
let pendingImport=null;
let randomQuote=null;
let detailEditMode=false;
let timerState={running:false,paused:false,startTime:null,elapsed:0,intervalId:null,bookId:null};
window._focusIdx=0;window._tlStreamCount=20;

function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r)}catch(e){}return{books:[],settings:{goal:YEAR_GOAL_DEFAULT,lastExport:null}}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function fmtDate(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
function fmtShort(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function daysBetween(a,b){if(!a||!b)return null;return Math.max(1,Math.round((new Date(b)-new Date(a))/86400000))}
function seededRand(seed){let x=Math.sin(seed)*10000;return x-Math.floor(x)}
function getGoal(){return(data.settings.goals&&data.settings.goals.annual)||data.settings.goal||YEAR_GOAL_DEFAULT}
function getCompleted(){return data.books.filter(b=>b.status==="completed")}
function getReading(){return data.books.filter(b=>b.status==="reading")}

// ─── Migration ───
(function migrate(){
  if(!data.settings.goals){data.settings.goals={annual:data.settings.goal||YEAR_GOAL_DEFAULT,categories:{},challenges:[]}}
  if(!data.settings.goals.challenges)data.settings.goals.challenges=[];
  if(!data.settings.goals.categories)data.settings.goals.categories={};
  data.books.forEach(b=>{
    if(!b.sessions)b.sessions=[];
    if(b.priority===undefined)b.priority=0;
    if(!b.recommendedBy)b.recommendedBy="";
    if(!b.recommendationNote)b.recommendationNote="";
    if(!b.recommendationSource)b.recommendationSource="";
  });
  save();
})();

// ─── Search Match Context ───
function getMatchContext(book,query){
  const q=query.toLowerCase(),m=[];
  if((book.title||"").toLowerCase().includes(q))m.push("Title");
  if((book.author||"").toLowerCase().includes(q))m.push("Author");
  if((book.category||"").toLowerCase().includes(q))m.push("Category");
  if((book.notes||"").toLowerCase().includes(q))m.push("Notes");
  if((book.coreArgument||"").toLowerCase().includes(q))m.push("Core Argument");
  if((book.impact||"").toLowerCase().includes(q))m.push("Impact");
  if((book.themes||[]).some(t=>t.toLowerCase().includes(q)))m.push("Themes");
  if((book.quotes||[]).some(qt=>(qt.text||"").toLowerCase().includes(q)))m.push("Quotes");
  return m;
}

// ─── Goals Progress ───
function getCategoryProgress(cat){
  const target=(data.settings.goals.categories||{})[cat]||0;
  if(!target)return null;
  const count=getCompleted().filter(b=>b.category===cat).length;
  return{target,count,pct:Math.min(100,Math.round(count/target*100))};
}

function getChallengeProgress(ch){
  const completed=getCompleted();
  let current=0;
  if(ch.type==="count"){
    let pool=completed;
    if(ch.categoryFilter)pool=pool.filter(b=>b.category===ch.categoryFilter);
    if(ch.minPages)pool=pool.filter(b=>(b.pages||0)>=ch.minPages);
    current=pool.length;
  }else if(ch.type==="pages"){
    let pool=completed;
    if(ch.categoryFilter)pool=pool.filter(b=>b.category===ch.categoryFilter);
    current=pool.reduce((s,b)=>s+(b.pages||0),0);
  }else if(ch.type==="category"){
    current=completed.filter(b=>b.category===ch.categoryFilter).length;
  }else if(ch.type==="diversity"){
    current=new Set(completed.map(b=>b.category)).size;
  }
  return{current,target:ch.target,pct:Math.min(100,Math.round(current/ch.target*100)),done:current>=ch.target};
}

// ─── Suggested Connections ───
function getSuggestedConnections(bookId){
  const book=data.books.find(b=>b.id===bookId);if(!book)return[];
  const existing=new Set(book.connections||[]);
  const scores=data.books.filter(b=>b.id!==bookId&&!existing.has(b.id)).map(b=>{
    let score=0;
    const sharedThemes=(book.themes||[]).filter(t=>(b.themes||[]).includes(t));
    score+=sharedThemes.length*3;
    if(b.category===book.category)score+=2;
    if(book.startDate&&b.startDate){
      const s1=new Date(book.startDate),e1=book.endDate?new Date(book.endDate):new Date();
      const s2=new Date(b.startDate),e2=b.endDate?new Date(b.endDate):new Date();
      if(s1<=e2&&s2<=e1)score+=1;
    }
    return{book:b,score,sharedThemes};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,5);
  return scores;
}

// ─── CSV Export ───
function exportCSV(){
  const headers=["Title","Author","Category","Status","Rating","Pages","Start Date","End Date","Themes","Core Argument","Notes","Quotes Count","Connections Count"];
  const rows=data.books.map(b=>[
    b.title||"",b.author||"",b.category||"",b.status||"",b.rating||"",b.pages||"",
    b.startDate||"",b.endDate||"",(b.themes||[]).join("; "),
    (b.coreArgument||"").slice(0,200),(b.notes||"").slice(0,200),
    (b.quotes||[]).length,(b.connections||[]).length
  ]);
  const csvEsc=v=>{const s=String(v);return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=[headers.map(csvEsc).join(","),...rows.map(r=>r.map(csvEsc).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`reading-ledger-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(a.href);
  data.settings.lastExport=new Date().toISOString();save();
}

// ─── Milestones ───
function getMilestones(){
  const c=getCompleted(),ms=[];
  [1,5,10,15,20,25,30,40,50].forEach(t=>{if(c.length>=t)ms.push({label:t===1?"First Book":t===50?"Goal Reached!":t+" Books",icon:t===50?"\u{1F3C6}":t>=25?"\u2B50":"\u{1F4D6}"})});
  const cats=new Set(c.map(b=>b.category));
  if(cats.size>=5)ms.push({label:cats.size+" Categories",icon:"\u{1F308}"});
  if(cats.size>=8)ms.push({label:"Renaissance Reader",icon:"\u{1F3AD}"});
  const ann=data.books.filter(b=>b.notes||b.coreArgument||b.impact||(b.quotes&&b.quotes.length>0)).length;
  if(ann>=10)ms.push({label:"Deep Annotator",icon:"\u270D\uFE0F"});
  const conn=data.books.filter(b=>b.connections&&b.connections.length>0).length;
  if(conn>=5)ms.push({label:"Web Weaver",icon:"\u{1F578}\uFE0F"});
  return ms;
}

// ─── Streak ───
function getStreak(){
  const reading=getReading(),completed=getCompleted().filter(b=>b.endDate);
  if(!reading.length&&!completed.length)return{weeks:0,active:false};
  const now=Date.now(),weeks=new Set();
  completed.forEach(b=>{if(b.endDate){const s=new Date(b.startDate||b.endDate).getTime(),e=new Date(b.endDate).getTime();for(let t=s;t<=e;t+=7*86400000)weeks.add(Math.floor(t/(7*86400000)))}});
  reading.forEach(b=>{if(b.startDate){const s=new Date(b.startDate).getTime();for(let t=s;t<=now;t+=7*86400000)weeks.add(Math.floor(t/(7*86400000)))}});
  const cw=Math.floor(now/(7*86400000));let streak=0;
  for(let w=cw;w>=cw-52;w--){if(weeks.has(w))streak++;else break}
  return{weeks:streak,active:reading.length>0};
}

// ─── Random Quote ───
function pickRandomQuote(){
  const qs=[];
  data.books.forEach(b=>(b.quotes||[]).forEach(q=>qs.push({text:q.text,page:q.page,bookTitle:b.title,bookAuthor:b.author,bookId:b.id})));
  randomQuote=qs.length?qs[Math.floor(Math.random()*qs.length)]:null;
}
pickRandomQuote();

// ─── Header ───
function updateHeader(){
  const c=getCompleted().length,g=getGoal(),pct=Math.min(100,Math.round(c/g*100)),streak=getStreak(),reading=getReading().length;
  const circR=11,circC=2*Math.PI*circR;
  let html=`<div class="goal-pill"><svg width="28" height="28" viewBox="0 0 28 28" style="transform:rotate(-90deg)"><circle cx="14" cy="14" r="${circR}" fill="none" stroke="#2A2419" stroke-width="3"/><circle cx="14" cy="14" r="${circR}" fill="none" stroke="#C4956A" stroke-width="3" stroke-dasharray="${(pct/100)*circC} ${circC}" stroke-linecap="round"/></svg><span class="goal-pill-text">${c}<span>/${g}</span></span></div>`;
  if(streak.weeks>0)html+=`<div class="streak-pill">\u{1F525} ${streak.weeks}w streak</div>`;
  if(reading>0)html+=`<span style="font-family:var(--ui);font-size:12px;color:var(--textD)">${reading} in progress</span>`;
  document.getElementById("hdrPills").innerHTML=html;
}

// ══════════════════ SHELF VIEW ══════════════════
function renderShelf(){
  const books=searchQuery?data.books.filter(b=>{const q=searchQuery.toLowerCase();return(b.title||"").toLowerCase().includes(q)||(b.author||"").toLowerCase().includes(q)||(b.category||"").toLowerCase().includes(q)||(b.notes||"").toLowerCase().includes(q)||(b.coreArgument||"").toLowerCase().includes(q)||(b.impact||"").toLowerCase().includes(q)||(b.themes||[]).some(t=>t.toLowerCase().includes(q))||(b.quotes||[]).some(qt=>(qt.text||"").toLowerCase().includes(q))}):data.books;
  const ms=getMilestones();

  let html="";
  // Backup reminder
  const lastExp=data.settings.lastExport?new Date(data.settings.lastExport):null;
  const daysSinceExport=lastExp?Math.floor((Date.now()-lastExp.getTime())/86400000):999;
  if(daysSinceExport>30&&data.books.length>0){
    html+=`<div class="backup-banner" id="backupBanner"><span style="font-size:16px">\u26A0</span><span style="flex:1">It\u2019s been ${lastExp?daysSinceExport+" days":"a while"} since your last backup. Export now?</span><button class="bb-export" id="bbExport">Export</button><button class="bb-dismiss" id="bbDismiss">\u2715</button></div>`;
  }
  // Search results summary
  if(searchQuery&&books.length){
    const matchCounts={Title:0,Author:0,Category:0,Notes:0,"Core Argument":0,Impact:0,Themes:0,Quotes:0};
    books.forEach(b=>{const ctx=getMatchContext(b,searchQuery);ctx.forEach(f=>matchCounts[f]++)});
    const parts=Object.entries(matchCounts).filter(([,v])=>v>0).map(([k,v])=>`${v} in ${k.toLowerCase()}`);
    html+=`<div class="search-results-summary"><strong>${books.length}</strong> result${books.length!==1?"s":""} for \u201C${esc(searchQuery)}\u201D \u2014 ${parts.join(", ")}</div>`;
  }
  // Quote banner
  if(randomQuote&&!searchQuery){
    html+=`<div class="quote-banner"><div style="flex-shrink:0;color:var(--accentDim);margin-top:2px">\u201C</div><div style="flex:1"><p class="quote-banner-text">${esc(randomQuote.text)}</p><p class="quote-banner-src">\u2014 ${esc(randomQuote.bookTitle)}${randomQuote.bookAuthor?", "+esc(randomQuote.bookAuthor):""}${randomQuote.page?" \u00B7 p. "+esc(randomQuote.page):""}</p></div><button class="quote-refresh" id="quoteRefresh" title="Another quote">\u21BB</button></div>`;
  }
  // Milestones
  if(ms.length){
    html+=`<div class="milestones">${ms.slice(-4).map(m=>`<div class="milestone"><span>${m.icon}</span> ${m.label}</div>`).join("")}</div>`;
  }
  // Sort bar
  const sorts=[["date","Date"],["category","Category"],["rating","Rating"],["length","Length"],["status","Status"],["title","Title"]];
  html+=`<div class="shelf-header"><p class="shelf-count">${books.length} book${books.length!==1?"s":""}</p><div class="sort-bar">${sorts.map(([k,l])=>`<button class="sort-pill${currentSort===k?" active":""}" data-sort="${k}">${l}</button>`).join("")}</div></div>`;

  if(!books.length){
    html+=`<div class="empty"><p class="title">Your shelves are empty.</p><p class="sub">Add your first book to begin.</p><button class="empty-cta" onclick="openForm(null)">+ Add a Book</button></div>`;
  }else{
    // Sort books as flat list
    const sorted=[...books].sort((a,b)=>{
      switch(currentSort){
        case"date":return new Date(b.addedAt||0)-new Date(a.addedAt||0);
        case"category":return(a.category||"Other").localeCompare(b.category||"Other")||(a.title||"").localeCompare(b.title||"");
        case"rating":return(b.rating||0)-(a.rating||0)||(a.title||"").localeCompare(b.title||"");
        case"length":return(b.pages||0)-(a.pages||0);
        case"status":{const o={reading:0,completed:1,"want-to-read":2,abandoned:3};return(o[a.status]??4)-(o[b.status]??4)||new Date(b.addedAt||0)-new Date(a.addedAt||0)}
        case"title":return(a.title||"").localeCompare(b.title||"");
        default:return 0;
      }
    });
    const SPINES_PER_ROW=6;
    for(let i=0;i<sorted.length;i+=SPINES_PER_ROW){
      const row=sorted.slice(i,i+SPINES_PER_ROW);
      html+=`<div class="shelf-row-wrap"><div class="shelf-spines">`;
      row.forEach(book=>{
        const pages=book.pages||250;
        const h=Math.min(150,Math.max(70,Math.round(pages/3.5)));
        const sc=CAT_SPINE[book.category]||CAT_SPINE.Other;
        const lc=CAT_COLORS[book.category]||CAT_COLORS.Other;
        html+=`<div class="spine" data-id="${book.id}" style="width:52px;height:${h}px;background:linear-gradient(145deg,${sc},${lc}80);border:1px solid ${lc}25;box-shadow:1px 2px 5px rgba(0,0,0,0.5);">`;
        html+=`<div class="sheen"></div>`;
        if(book.rating>=4)html+=`<div class="gold-top"></div>`;
        html+=`<span class="spine-title" style="color:rgba(255,255,255,0.92);max-height:${h-20}px">${esc(book.title)}</span>`;
        if(book.status==="reading")html+=`<div class="reading-dot"></div>`;
        if(book.status==="want-to-read")html+=`<div class="want-mark"></div>`;
        html+=`</div>`;
        if(searchQuery)html+=`<div class="search-match-label">${getMatchContext(book,searchQuery).join(", ")}</div>`;
      });
      html+=`</div><div class="shelf-board"></div></div>`;
    }
    // Footer stats
    const total=books.length;
    const readCount=books.filter(b=>b.status==="completed").length;
    const readingCount=books.filter(b=>b.status==="reading").length;
    const wantCount=books.filter(b=>b.status==="want-to-read").length;
    const usedCats=[...new Set(books.map(b=>b.category||"Other"))].sort();
    html+=`<div class="shelf-footer"><div class="shelf-footer-counts"><strong style="color:var(--text)">${total}</strong> books <span>\u00B7</span> <span style="color:var(--green)">${readCount}</span> read <span>\u00B7</span> <span style="color:var(--blue)">${readingCount}</span> reading <span>\u00B7</span> <span style="color:var(--textD)">${wantCount}</span> want</div>`;
    html+=`<div class="shelf-footer-legend">${usedCats.map(c=>`<span class="shelf-footer-legend-item"><span class="shelf-footer-legend-dot" style="background:${CAT_COLORS[c]||CAT_COLORS.Other}"></span>${c}</span>`).join("")}</div></div>`;
  }
  // Now Reading strip
  const nowReading=data.books.filter(b=>b.status==="reading");
  if(nowReading.length&&!searchQuery){
    html+=`<div class="nr-section"><p class="nr-section-title">Now Reading</p>`;
    nowReading.forEach(b=>{
      const col=CAT_COLORS[b.category]||CAT_COLORS.Other;
      const pages=b.pages||1,cur=b.currentPage||0;
      const pct=Math.min(100,Math.round(cur/pages*100));
      const stars=[1,2,3,4,5].map(s=>`<div class="nr-star${s<=(b.rating||0)?" filled":""}" data-book="${b.id}" data-star="${s}">${s<=(b.rating||0)?"\u2605":"\u2606"}</div>`).join('');
      html+=`<div class="nr-card" data-id="${b.id}">`;
      html+=`<div class="nr-card-header"><div class="nr-card-accent" style="background:linear-gradient(180deg,${col},${col}80)"></div>`;
      html+=`<div class="nr-card-info"><div class="nr-card-title" data-id="${b.id}">${esc(b.title)}</div><div class="nr-card-author">${esc(b.author||'')}</div></div>`;
      html+=`<span class="nr-card-pct" style="color:${col}" data-id="${b.id}">${pct}%</span></div>`;
      html+=`<div class="nr-bar" data-book="${b.id}" data-pages="${pages}"><div class="nr-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${col}90,${col})"></div><div class="nr-bar-label">pg ${cur} of ${pages} \u2014 tap to update</div></div>`;
      html+=`<div class="nr-actions">`;
      html+=`<div class="nr-status" data-book="${b.id}" style="background:rgba(125,139,110,0.12);border:1px solid rgba(125,139,110,0.25);color:var(--green)">Reading</div>`;
      html+=`<div style="flex:1"></div>`;
      html+=`<div class="nr-log-btn" data-book="${b.id}">\u{1F554} Log</div>`;
      html+=`<div class="nr-stars">${stars}</div>`;
      html+=`</div>`;
      html+=`<div class="nr-session-form" id="nrSession_${b.id}"><div class="nr-sf-row"><input class="nr-sf-input" type="number" inputmode="numeric" placeholder="min" data-field="dur" data-book="${b.id}"><input class="nr-sf-input" type="number" inputmode="numeric" placeholder="pages" data-field="pg" data-book="${b.id}"><button class="nr-sf-submit" data-book="${b.id}">Log</button><button class="nr-sf-close" data-book="${b.id}">\u2715</button></div><p class="nr-sf-hint">Pages read will advance your current page</p></div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  }
  // Tooltip container
  html+=`<div class="tooltip" id="shelfTooltip"><p class="tooltip-title" id="ttTitle"></p><p class="tooltip-author" id="ttAuthor"></p><div class="tooltip-meta" id="ttMeta"></div><button class="tooltip-open" id="ttOpen">Open \u2192</button></div>`;
  document.getElementById("viewShelf").innerHTML=html;
  bindShelfEvents();
}

function bindShelfEvents(){
  // Sort pills
  document.querySelectorAll("#viewShelf .sort-pill").forEach(b=>b.addEventListener("click",()=>{currentSort=b.dataset.sort;renderShelf()}));
  // Spine click → show tooltip
  const tooltip=document.getElementById("shelfTooltip");
  let activeSpineId=null;
  function dismissTooltip(){if(tooltip){tooltip.classList.remove("show");activeSpineId=null}}
  document.querySelectorAll("#viewShelf .spine").forEach(s=>{
    s.addEventListener("click",e=>{
      e.stopPropagation();
      const id=s.dataset.id;
      if(activeSpineId===id){dismissTooltip();return}
      const book=data.books.find(b=>b.id===id);
      if(!book)return;
      activeSpineId=id;
      document.getElementById("ttTitle").textContent=book.title||"Untitled";
      document.getElementById("ttAuthor").textContent=book.author||"Unknown author";
      const lc=CAT_COLORS[book.category]||CAT_COLORS.Other;
      let meta=`<span class="cat-dot" style="background:${lc}"></span><span>${book.category||"Other"}</span>`;
      if(book.pages)meta+=`<span>\u00B7 ${book.pages}p</span>`;
      if(book.rating){meta+=`<span class="tooltip-stars">${"\u2605".repeat(book.rating)+"<span style='color:var(--textDD)'>"+ "\u2605".repeat(5-book.rating)+"</span>"}</span>`}
      const sl=STATUS_LABELS[book.status]||book.status;
      meta+=`<span class="status-badge ${book.status}" style="font-size:10px;padding:2px 8px">${sl}</span>`;
      document.getElementById("ttMeta").innerHTML=meta;
      document.getElementById("ttOpen").onclick=()=>{dismissTooltip();openDetail(id)};
      tooltip.classList.add("show");
    });
  });
  // Dismiss tooltip on outside click or scroll (remove previous listeners to avoid stacking)
  if(window._shelfDismiss)document.removeEventListener("click",window._shelfDismiss);
  if(window._shelfScroll)window.removeEventListener("scroll",window._shelfScroll);
  window._shelfDismiss=dismissTooltip;
  window._shelfScroll=dismissTooltip;
  document.addEventListener("click",dismissTooltip);
  window.addEventListener("scroll",dismissTooltip,{passive:true});
  // Quote refresh
  const qr=document.getElementById("quoteRefresh");
  if(qr)qr.addEventListener("click",()=>{pickRandomQuote();renderShelf()});
  // Now Reading: tap progress bar to set page
  document.querySelectorAll("#viewShelf .nr-bar").forEach(bar=>bar.addEventListener("click",e=>{
    const bk=data.books.find(b=>b.id===bar.dataset.book);if(!bk)return;
    const rect=bar.getBoundingClientRect();
    const pct=Math.max(0,Math.min(100,Math.round((e.clientX-rect.left)/rect.width*100)));
    const pg=Math.round(pct/100*(bk.pages||1));
    bk.currentPage=pg;bk.updatedAt=new Date().toISOString();save();renderShelf();updateHeader();
  }));
  // Now Reading: title click opens detail
  document.querySelectorAll("#viewShelf .nr-card-title[data-id]").forEach(t=>t.addEventListener("click",()=>openDetail(t.dataset.id)));
  // Now Reading: status cycle
  document.querySelectorAll("#viewShelf .nr-status[data-book]").forEach(btn=>btn.addEventListener("click",()=>{
    const bk=data.books.find(b=>b.id===btn.dataset.book);if(!bk)return;
    const cycle=["reading","completed","want-to-read"];
    const ci=(cycle.indexOf(bk.status)+1)%cycle.length;
    bk.status=cycle[ci];
    if(cycle[ci]==="completed"){bk.endDate=bk.endDate||new Date().toISOString().slice(0,10);bk.currentPage=bk.pages||bk.currentPage}
    bk.updatedAt=new Date().toISOString();save();renderShelf();updateHeader();
  }));
  // Now Reading: star rating
  document.querySelectorAll("#viewShelf .nr-star").forEach(s=>s.addEventListener("click",()=>{
    const bk=data.books.find(b=>b.id===s.dataset.book);if(!bk)return;
    const star=parseInt(s.dataset.star)||0;
    bk.rating=bk.rating===star?0:star;bk.updatedAt=new Date().toISOString();save();renderShelf();
  }));
  // Now Reading: toggle session form
  document.querySelectorAll("#viewShelf .nr-log-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const form=document.getElementById("nrSession_"+btn.dataset.book);
    if(form)form.style.display=form.style.display==="none"||!form.style.display?"block":"none";
  }));
  // Now Reading: close session form
  document.querySelectorAll("#viewShelf .nr-sf-close").forEach(btn=>btn.addEventListener("click",()=>{
    const form=document.getElementById("nrSession_"+btn.dataset.book);
    if(form)form.style.display="none";
  }));
  // Now Reading: submit session
  document.querySelectorAll("#viewShelf .nr-sf-submit").forEach(btn=>btn.addEventListener("click",()=>{
    const bk=data.books.find(b=>b.id===btn.dataset.book);if(!bk)return;
    const form=document.getElementById("nrSession_"+btn.dataset.book);if(!form)return;
    const durInput=form.querySelector('[data-field="dur"]');
    const pgInput=form.querySelector('[data-field="pg"]');
    const dur=parseInt(durInput?.value)||0;
    const pagesRead=parseInt(pgInput?.value)||0;
    if(!dur&&!pagesRead)return;
    const startPg=bk.currentPage||0;
    const endPg=Math.min((bk.pages||9999),startPg+pagesRead);
    if(!bk.sessions)bk.sessions=[];
    bk.sessions.push({id:uid(),date:new Date().toISOString(),startPage:startPg,endPage:endPg,duration:dur,notes:""});
    if(pagesRead>0)bk.currentPage=endPg;
    bk.updatedAt=new Date().toISOString();save();renderShelf();updateHeader();
  }));
  // Backup banner
  const bbExp=document.getElementById("bbExport");
  if(bbExp)bbExp.addEventListener("click",()=>{const json=JSON.stringify(data,null,2);const b=new Blob([json],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`reading-ledger-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);data.settings.lastExport=new Date().toISOString();save();renderShelf()});
  const bbDis=document.getElementById("bbDismiss");
  if(bbDis)bbDis.addEventListener("click",()=>{document.getElementById("backupBanner").remove()});
}

// ══════════════════ TIMELINE VIEW ══════════════════
function renderTimeline(){
  const el=document.getElementById("viewTimeline");
  const reading=data.books.filter(b=>b.status==="reading");
  let html='';

  // ─── Section 1: Focus Hero ───
  if(reading.length){
    const idx=(window._focusIdx||0)%reading.length;
    const book=reading[idx];
    const pages=book.pages||1,current=book.currentPage||0;
    const pct=Math.min(100,Math.round(current/pages*100));
    const color=CAT_COLORS[book.category]||CAT_COLORS.Other;
    const r=90,circ=2*Math.PI*r,dashOff=circ-(pct/100)*circ;
    const isTimerBook=timerState.bookId===book.id;
    const isRunning=isTimerBook&&timerState.running&&!timerState.paused;
    const isPaused=isTimerBook&&timerState.paused;
    const elapsed=isTimerBook?timerState.elapsed:0;
    const mm=Math.floor(elapsed/60),ss=elapsed%60;
    const timeStr=String(mm).padStart(2,"0")+":"+String(ss).padStart(2,"0");

    html+=`<div class="tlf-wrap">`;
    if(reading.length>1)html+=`<div class="tlf-nav"><button class="tlf-nav-btn tlf-prev">\u2190</button><span class="tlf-nav-count">${idx+1} of ${reading.length}</span><button class="tlf-nav-btn tlf-next">\u2192</button></div>`;
    html+=`<div class="tlf-ring"><svg viewBox="0 0 200 200" width="200" height="200"><circle cx="100" cy="100" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/><circle cx="100" cy="100" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-dasharray="${circ}" stroke-dashoffset="${dashOff}" stroke-linecap="round" transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 0.8s"/></svg><div class="tlf-ring-inner"><p class="tlf-ring-pct" style="color:${color}">${pct}%</p><p class="tlf-ring-pages">${current} / ${pages}</p></div></div>`;
    html+=`<p class="tlf-title" data-id="${book.id}">${esc(book.title)}</p>`;
    html+=`<p class="tlf-author">${esc(book.author||"")}</p>`;
    html+=`<div class="tlf-page-row"><input class="tlf-page-input" type="number" min="0"${pages?` max="${pages}"`:""} value="${current}" data-book="${book.id}"><button class="tlf-page-btn" data-book="${book.id}">Update Page</button></div>`;

    // Pace stats
    const sesPages=(book.sessions||[]).reduce((s,se)=>s+Math.max(0,(se.endPage||0)-(se.startPage||0)),0);
    const daysReading=book.startDate?daysBetween(book.startDate,new Date().toISOString()):0;
    const pgDay=daysReading>0?sesPages/daysReading:(current>0&&daysReading>0?current/daysReading:0);
    const remaining=pages-current;
    const estDays=pgDay>0?Math.ceil(remaining/pgDay):0;
    let paceHtml=[];
    if(pgDay>0)paceHtml.push(`<strong>${pgDay.toFixed(1)}</strong> pg/day`);
    if(estDays>0&&remaining>0)paceHtml.push(`<strong>~${estDays}</strong> day${estDays!==1?'s':''} left`);
    if((book.sessions||[]).length)paceHtml.push(`<strong>${(book.sessions||[]).length}</strong> session${(book.sessions||[]).length!==1?'s':''}`);
    if(paceHtml.length)html+=`<p class="tlf-pace">${paceHtml.join(' <span class="sep">\u00B7</span> ')}</p>`;

    if(pendingSessionDur>0&&!timerState.running&&window._lastTimerBookId===book.id){
      html+=`<div class="tlf-session-form" data-book="${book.id}"><p style="font-family:var(--ui);font-size:14px;color:var(--accent);font-weight:600;margin-bottom:10px">Session Complete: ${pendingSessionDur} min</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><p style="font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;margin-bottom:3px">Start Page</p><input class="tlf-page-input nr-st-start" type="number" placeholder="\u2014" style="width:100%"></div><div><p style="font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;margin-bottom:3px">End Page</p><input class="tlf-page-input nr-st-end" type="number" placeholder="\u2014" style="width:100%"></div></div><div style="margin-bottom:8px"><p style="font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;margin-bottom:3px">Notes</p><input class="tlf-page-input nr-st-notes" placeholder="Session notes..." style="width:100%"></div><div style="display:flex;gap:8px;justify-content:center"><button class="tlf-tbtn start nr-st-save" data-book="${book.id}">Save Session</button><button class="tlf-tbtn nr-st-skip" data-book="${book.id}" style="background:var(--border);color:var(--textM)">Skip</button></div></div>`;
    }else{
      html+=`<div class="tlf-timer"><span class="tlf-timer-display timer-live">${timeStr}</span><div class="tlf-timer-btns">`;
      if(isRunning)html+=`<button class="tlf-tbtn pause" data-book="${book.id}">Pause</button><button class="tlf-tbtn stop" data-book="${book.id}">Stop</button>`;
      else if(isPaused)html+=`<button class="tlf-tbtn resume" data-book="${book.id}">Resume</button><button class="tlf-tbtn stop" data-book="${book.id}">Stop</button>`;
      else html+=`<button class="tlf-tbtn start" data-book="${book.id}">Start Reading</button>`;
      html+=`</div></div>`;
    }
    html+=`</div>`;
  }else{
    html+=`<p class="tl-empty">No books in progress. Add a book with status \u201CReading\u201D to get started.</p>`;
  }

  // ─── Section 2: Progress Lanes ───
  const recent=getCompleted().filter(b=>b.endDate).sort((a,b)=>new Date(b.endDate)-new Date(a.endDate)).slice(0,5);
  if(reading.length||recent.length){
    html+=`<hr class="tl-divider">`;
    const focusBook=reading.length?reading[(window._focusIdx||0)%reading.length]:null;
    if(reading.length){
      html+=`<p class="tl-section-title">Progress</p>`;
      reading.forEach(b=>{
        const pages=b.pages||1,current=b.currentPage||0;
        const pct=Math.min(100,Math.round(current/pages*100));
        const color=CAT_COLORS[b.category]||CAT_COLORS.Other;
        const ticks=(b.sessions||[]).filter(s=>s.endPage).map(s=>Math.min(100,Math.round((s.endPage/pages)*100)));
        const isActive=focusBook&&b.id===focusBook.id;
        html+=`<div class="tll-lane${isActive?' active':''}" data-id="${b.id}"><div class="tll-lane-info"><span class="tll-lane-title">${esc(b.title)}</span><span class="tll-lane-meta">${current}/${pages}p</span></div><div class="tll-lane-track"><div class="tll-lane-fill" style="width:${pct}%;background:linear-gradient(90deg,${color}DD,${color}88)"><span class="tll-lane-pct">${pct}%</span></div>${ticks.map(t=>`<div class="tll-lane-tick" style="left:${t}%;background:${color}"></div>`).join('')}<div class="tll-lane-marker" style="left:${pct}%"></div></div></div>`;
      });
    }
    if(recent.length){
      html+=`<p class="tl-section-title" style="margin-top:${reading.length?'20':'0'}px">Recently Completed</p>`;
      recent.forEach(b=>{
        const pages=b.pages||1;const color=CAT_COLORS[b.category]||CAT_COLORS.Other;
        const dur=daysBetween(b.startDate,b.endDate);
        const ticks=(b.sessions||[]).filter(s=>s.endPage).map(s=>Math.min(100,Math.round((s.endPage/pages)*100)));
        html+=`<div class="tll-lane" data-id="${b.id}"><div class="tll-lane-info"><span class="tll-lane-title">${esc(b.title)}</span><span class="tll-lane-meta">${pages}p${dur?' \u00B7 '+dur+'d':''}${b.rating?' \u00B7 '+'\u2605'.repeat(b.rating):''}</span></div><div class="tll-lane-track"><div class="tll-lane-fill" style="width:100%;background:linear-gradient(90deg,${color}DD,${color}88)"><span class="tll-lane-pct">Done</span></div>${ticks.map(t=>`<div class="tll-lane-tick" style="left:${t}%;background:${color}"></div>`).join('')}</div></div>`;
      });
    }
    const usedCats=[...new Set([...reading,...recent].map(b=>b.category||"Other"))];
    if(usedCats.length>1)html+=`<div class="tll-legend">${usedCats.map(c=>`<div class="tll-legend-item"><div class="tll-legend-dot" style="background:${CAT_COLORS[c]||CAT_COLORS.Other}"></div>${c}</div>`).join('')}</div>`;
  }

  // ─── Section 3: Heatmap + Activity Feed ───
  // Collect all events
  const events=[];
  data.books.forEach(b=>{
    if(b.startDate)events.push({type:'start',date:b.startDate,book:b});
    if(b.endDate&&b.status==="completed")events.push({type:'finish',date:b.endDate,book:b});
    (b.sessions||[]).forEach(s=>events.push({type:'session',date:s.date,book:b,session:s}));
    (b.quotes||[]).forEach(q=>{if(q.addedAt)events.push({type:'quote',date:q.addedAt,book:b,quote:q})});
  });
  events.sort((a,b)=>new Date(b.date)-new Date(a.date));

  // ── Heatmap (last 90 days) ──
  const today=new Date();today.setHours(0,0,0,0);
  const sessionDays={};
  data.books.forEach(b=>(b.sessions||[]).forEach(s=>{
    if(!s.date)return;const k=s.date.slice(0,10);sessionDays[k]=(sessionDays[k]||0)+1;
  }));
  // Streak calc
  let streak=0;for(let d=new Date(today);;d.setDate(d.getDate()-1)){
    const k=d.toISOString().slice(0,10);if(sessionDays[k])streak++;else break;
  }
  let bestStreak=0,cur=0;
  const allDayKeys=Object.keys(sessionDays).sort();
  allDayKeys.forEach((k,i)=>{
    if(i===0){cur=1}else{
      const prev=new Date(allDayKeys[i-1]);prev.setDate(prev.getDate()+1);
      cur=prev.toISOString().slice(0,10)===k?cur+1:1;
    }
    if(cur>bestStreak)bestStreak=cur;
  });
  // Total pages/day
  let totalPg=0,totalDays=0;
  data.books.forEach(b=>{
    if(!b.startDate)return;const sd=daysBetween(b.startDate,b.endDate||new Date().toISOString());
    if(sd)totalDays=Math.max(totalDays,sd);
    (b.sessions||[]).forEach(s=>{const p=Math.max(0,(s.endPage||0)-(s.startPage||0));totalPg+=p});
  });
  const avgPg=totalDays>0?Math.round(totalPg/totalDays):0;

  // Build 90-day grid
  const startDay=new Date(today);startDay.setDate(startDay.getDate()-89);
  while(startDay.getDay()!==1)startDay.setDate(startDay.getDate()-1);
  let hmCells='';
  const monthSpans=[];let curMonth='',curWeeks=0;
  for(let d=new Date(startDay);d<=today;d.setDate(d.getDate()+1)){
    const k=d.toISOString().slice(0,10);const c=sessionDays[k]||0;
    const lvl=c===0?'':c===1?' l1':c<=3?' l2':c<=5?' l3':' l4';
    const tip=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' \u00B7 '+c+' session'+(c!==1?'s':'');
    hmCells+=`<div class="tl-hm-cell${lvl}" data-tip="${tip}"></div>`;
    if(d.getDay()===1){
      const mn=d.toLocaleDateString('en-US',{month:'short'});
      if(mn!==curMonth){if(curMonth)monthSpans.push({name:curMonth,weeks:curWeeks});curMonth=mn;curWeeks=1}else{curWeeks++}
    }
  }
  if(curMonth)monthSpans.push({name:curMonth,weeks:curWeeks});
  const monthsHtml=monthSpans.map(m=>`<span class="tl-hm-month" style="width:${m.weeks*17}px">${m.name}</span>`).join('');
  html+=`<hr class="tl-divider">`;
  html+=`<p class="tl-section-title">Activity</p>`;
  html+=`<div class="tl-heatmap">`;
  html+=`<div class="tl-heatmap-title">Reading Activity <span>Last 90 days</span></div>`;
  html+=`<div class="tl-hm-wrap">`;
  html+=`<div class="tl-hm-days"><div class="tl-hm-day">Mon</div><div class="tl-hm-day"></div><div class="tl-hm-day">Wed</div><div class="tl-hm-day"></div><div class="tl-hm-day">Fri</div><div class="tl-hm-day"></div><div class="tl-hm-day">Sun</div></div>`;
  html+=`<div class="tl-hm-grid-wrap"><div class="tl-hm-months">${monthsHtml}</div><div class="tl-hm-grid">${hmCells}</div></div>`;
  html+=`</div>`;
  html+=`<div class="tl-hm-footer"><div class="tl-hm-streaks">`;
  html+=`<span class="tl-hm-streak">Current streak: <strong>${streak} day${streak!==1?'s':''}</strong></span>`;
  html+=`<span class="tl-hm-streak">Longest: <strong>${bestStreak} day${bestStreak!==1?'s':''}</strong></span>`;
  html+=`<span class="tl-hm-streak">Avg: <strong>${avgPg} pg/day</strong></span>`;
  html+=`</div><div class="tl-hm-legend">Less `;
  html+=`<div class="tl-hm-swatch" style="background:var(--border)"></div>`;
  html+=`<div class="tl-hm-swatch" style="background:#4A3D2E"></div>`;
  html+=`<div class="tl-hm-swatch" style="background:#7D6340"></div>`;
  html+=`<div class="tl-hm-swatch" style="background:#9B7550"></div>`;
  html+=`<div class="tl-hm-swatch" style="background:#C4956A"></div>`;
  html+=` More</div></div></div>`;

  // ── Inline Feed (grouped by day) ──
  if(events.length){
    const showCount=window._tlStreamCount||20;
    const shown=events.slice(0,showCount);
    // Group by day
    const dayGroups=[];let lastDay='';
    shown.forEach(ev=>{
      const d=new Date(ev.date);const dk=d.toISOString().slice(0,10);
      if(dk!==lastDay){dayGroups.push({key:dk,date:d,events:[]});lastDay=dk}
      dayGroups[dayGroups.length-1].events.push(ev);
    });
    const todayKey=today.toISOString().slice(0,10);
    const yesterdayD=new Date(today);yesterdayD.setDate(yesterdayD.getDate()-1);
    const yesterdayKey=yesterdayD.toISOString().slice(0,10);

    dayGroups.forEach(g=>{
      let label=fmtShort(g.key);
      if(g.key===todayKey)label='<strong>Today</strong> \u00B7 '+label;
      else if(g.key===yesterdayKey)label='<strong>Yesterday</strong> \u00B7 '+label;
      else label='<strong>'+label+'</strong>';
      html+=`<div class="tl-feed-day"><div class="tl-feed-day-label">${label}</div>`;
      g.events.forEach(ev=>{
        if(ev.type==='session'){
          const pages=Math.max(0,(ev.session.endPage||0)-(ev.session.startPage||0));
          const range=(ev.session.startPage&&ev.session.endPage)?`p.${ev.session.startPage} \u2192 ${ev.session.endPage}`:'';
          let sub=[];if(range)sub.push(range);if(ev.session.duration)sub.push(ev.session.duration+'min');
          if(pages>0&&ev.session.duration>0)sub.push((pages/ev.session.duration).toFixed(1)+' pg/min');
          html+=`<div class="tl-fi session" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Read <strong>${esc(ev.book.title)}</strong>${pages>0?' \u2014 <span class="pg">'+pages+' pages</span>':''}</p>${sub.length?'<p class="tl-fi-sub">'+sub.join(' \u00B7 ')+'</p>':''}</div></div>`;
        }else if(ev.type==='finish'){
          const dur=daysBetween(ev.book.startDate,ev.book.endDate);
          let meta=[];if(ev.book.pages)meta.push(ev.book.pages+' pages');if(dur)meta.push(dur+' days');
          html+=`<div class="tl-fi finish" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Finished <strong>${esc(ev.book.title)}</strong>${meta.length?' \u2014 '+meta.join(' in '):''}</p>${ev.book.rating?'<p class="tl-fi-stars">'+'\u2605'.repeat(ev.book.rating)+'</p>':''}</div></div>`;
        }else if(ev.type==='start'){
          html+=`<div class="tl-fi start" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Started <strong>${esc(ev.book.title)}</strong>${ev.book.pages?' \u00B7 '+ev.book.pages+' pages':''}</p></div></div>`;
        }else if(ev.type==='quote'){
          html+=`<div class="tl-fi quote" data-id="${ev.book.id}"><div class="tl-fi-body"><p class="tl-fi-text">Saved quote from <strong>${esc(ev.book.title)}</strong></p><p class="tl-fi-quote">\u201C${esc(ev.quote.text||'')}\u201D</p></div></div>`;
        }
      });
      html+=`</div>`;
    });
    if(events.length>showCount)html+=`<button class="tls-show-more" id="tlShowMore">Show more</button>`;
  }else{
    html+=`<p class="tl-empty">No reading activity yet. Start a session to see your feed here.</p>`;
  }

  // ─── Section 4: Collapsible Gantt Timeline ───
  const ganttBooks=data.books.filter(b=>b.startDate).sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  if(ganttBooks.length){
    const ganttOpen=window._ganttOpen||false;
    const dates=ganttBooks.map(b=>[new Date(b.startDate),new Date(b.endDate||new Date())]).flat();
    const minD=new Date(Math.min(...dates));const maxD=new Date(Math.max(...dates));
    const span=Math.max(1,(maxD-minD)/86400000);
    html+=`<hr class="tl-divider">`;
    html+=`<div class="tl-gantt">`;
    html+=`<button class="tl-gantt-toggle${ganttOpen?' open':''}" id="ganttToggle"><span class="tl-gantt-arrow">\u25B6</span><p class="tl-section-title">Timeline</p><span style="font-family:var(--ui);font-size:11px;color:var(--textDD);margin-left:auto">${ganttBooks.length} book${ganttBooks.length!==1?'s':''}</span></button>`;
    html+=`<div class="tl-gantt-body${ganttOpen?' open':''}" id="ganttBody">`;
    ganttBooks.forEach(b=>{
      const s=new Date(b.startDate),e=new Date(b.endDate||new Date());
      const left=((s-minD)/86400000)/span*100;
      const w=Math.max(1,((e-s)/86400000)/span*100);

      html+=`<div class="tl-row" data-id="${b.id}"><span class="tl-row-label">${esc(b.title)}</span><div class="tl-row-track"><div class="tl-row-bar" style="left:${left}%;width:${w}%;background:${color}88"></div></div><span class="tl-row-dates">${fmtShort(b.startDate)} \u2013 ${b.endDate?fmtShort(b.endDate):'now'}</span></div>`;
    });

  }

  el.innerHTML=html;

  const prevBtn=el.querySelector('.tlf-prev');if(prevBtn)prevBtn.addEventListener('click',e=>{e.stopPropagation();window._focusIdx=((window._focusIdx||0)-1+getReading().length)%getReading().length;renderTimeline()});
  const nextBtn=el.querySelector('.tlf-next');if(nextBtn)nextBtn.addEventListener('click',e=>{e.stopPropagation();window._focusIdx=(window._focusIdx||0)+1;renderTimeline()});
  // Focus: title click
  el.querySelectorAll('.tlf-title[data-id]').forEach(t=>t.addEventListener('click',()=>openDetail(t.dataset.id)));
  // Focus: page update
  el.querySelectorAll('.tlf-page-btn').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();const bk=data.books.find(b=>b.id===btn.dataset.book);if(!bk)return;
    const inp=el.querySelector('.tlf-page-input[data-book="'+btn.dataset.book+'"]');if(!inp)return;
    let val=parseInt(inp.value)||0;if(val<0)val=0;if(bk.pages&&val>bk.pages)val=bk.pages;
    bk.currentPage=val;bk.updatedAt=new Date().toISOString();save();renderTimeline();updateHeader();
  }));
  // Timer: start
  el.querySelectorAll('.tlf-tbtn.start:not(.nr-st-save)').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();const bid=btn.dataset.book;window._lastTimerBookId=bid;
    if(timerState.intervalId)clearInterval(timerState.intervalId);
    timerState={running:true,paused:false,startTime:Date.now(),elapsed:0,intervalId:null,bookId:bid,_pauseAccum:0};
    timerState.intervalId=setInterval(()=>{timerState.elapsed=Math.floor((Date.now()-timerState.startTime)/1000)+(timerState._pauseAccum||0);document.querySelectorAll('.timer-live').forEach(e2=>{const m=Math.floor(timerState.elapsed/60),s=timerState.elapsed%60;e2.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")})},1000);renderTimeline();
  }));
  // Timer: pause
  el.querySelectorAll('.tlf-tbtn.pause').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();if(timerState.intervalId)clearInterval(timerState.intervalId);
    timerState._pauseAccum=timerState.elapsed;timerState.paused=true;timerState.running=true;timerState.intervalId=null;renderTimeline();
  }));
  // Timer: resume
  el.querySelectorAll('.tlf-tbtn.resume').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();if(timerState.intervalId)clearInterval(timerState.intervalId);
    timerState.startTime=Date.now();timerState.paused=false;
    timerState.intervalId=setInterval(()=>{timerState.elapsed=Math.floor((Date.now()-timerState.startTime)/1000)+(timerState._pauseAccum||0);document.querySelectorAll('.timer-live').forEach(e2=>{const m=Math.floor(timerState.elapsed/60),s=timerState.elapsed%60;e2.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")})},1000);renderTimeline();
  }));
  // Timer: stop
  el.querySelectorAll('.tlf-tbtn.stop:not(.nr-st-skip)').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();if(timerState.intervalId)clearInterval(timerState.intervalId);
    pendingSessionDur=Math.max(1,Math.round(timerState.elapsed/60));window._lastTimerBookId=btn.dataset.book;
    timerState={running:false,paused:false,startTime:null,elapsed:0,intervalId:null,bookId:null,_pauseAccum:0};renderTimeline();
  }));
  // Session: save
  el.querySelectorAll('.nr-st-save').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();const bk=data.books.find(b=>b.id===btn.dataset.book);if(!bk)return;
    if(!bk.sessions)bk.sessions=[];const form=btn.closest('.tlf-session-form');
    let sp=parseInt(form.querySelector('.nr-st-start').value);sp=(isNaN(sp)||sp<0)?null:sp;
    let ep=parseInt(form.querySelector('.nr-st-end').value);ep=(isNaN(ep)||ep<0)?null:ep;
    if(sp!=null&&ep!=null&&ep<sp){const tmp=sp;sp=ep;ep=tmp}
    if(ep!=null&&bk.pages&&ep>bk.pages)ep=bk.pages;
    const notes=(form.querySelector('.nr-st-notes').value||'').trim();
    bk.sessions.push({id:uid(),date:new Date().toISOString().slice(0,10),startPage:sp,endPage:ep,duration:pendingSessionDur,notes});
    if(ep)bk.currentPage=ep;bk.updatedAt=new Date().toISOString();pendingSessionDur=0;window._lastTimerBookId=null;save();renderTimeline();updateHeader();
  }));
  // Session: skip
  el.querySelectorAll('.nr-st-skip').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();pendingSessionDur=0;window._lastTimerBookId=null;save();renderTimeline()}));
  // Feed: click to open detail
  el.querySelectorAll('.tl-fi[data-id]').forEach(item=>item.addEventListener('click',()=>openDetail(item.dataset.id)));
  // Feed: show more
  const showMore=document.getElementById('tlShowMore');
  if(showMore)showMore.addEventListener('click',()=>{window._tlStreamCount=(window._tlStreamCount||20)+20;renderTimeline()});
  // Gantt: toggle collapse
  const ganttToggle=document.getElementById('ganttToggle');
  if(ganttToggle)ganttToggle.addEventListener('click',()=>{window._ganttOpen=!window._ganttOpen;ganttToggle.classList.toggle('open');document.getElementById('ganttBody').classList.toggle('open')});
  // Gantt: row click to open detail
  el.querySelectorAll('.tl-row[data-id]').forEach(row=>row.addEventListener('click',()=>openDetail(row.dataset.id)));
}

function renderAnalytics(){
  const completed=getCompleted(),goal=getGoal(),pct=Math.min(100,Math.round(completed.length/goal*100));
  const totalPages=completed.reduce((s,b)=>s+(b.pages||0),0);
  const streak=getStreak();
  const avgDays=(()=>{const ds=completed.filter(b=>b.startDate&&b.endDate).map(b=>daysBetween(b.startDate,b.endDate));return ds.length?Math.round(ds.reduce((a,b)=>a+b,0)/ds.length):0})();
  const allQuotes=[];data.books.forEach(b=>(b.quotes||[]).forEach(q=>allQuotes.push(q)));
  const annotated=data.books.filter(b=>b.notes||b.coreArgument||b.impact||(b.quotes&&b.quotes.length>0)).length;
  const catData=CATEGORIES.map(c=>({name:c,value:completed.filter(b=>b.category===c).length})).filter(c=>c.value>0);

  // Pace data
  const mm={};completed.forEach(b=>{if(b.endDate){const d=new Date(b.endDate),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;mm[k]=(mm[k]||0)+1}});
  const sortedMonths=Object.keys(mm).sort();

  let html=`<div class="mini-stats">
    <div class="mini-stat"><p class="mini-stat-label">Completed</p><p class="mini-stat-value">${completed.length}</p><p class="mini-stat-sub">of ${goal}</p></div>
    <div class="mini-stat"><p class="mini-stat-label">Avg Pace</p><p class="mini-stat-value">${avgDays?avgDays+"d":"\u2014"}</p><p class="mini-stat-sub">per book</p></div>
    <div class="mini-stat"><p class="mini-stat-label">Pages</p><p class="mini-stat-value">${totalPages||"\u2014"}</p></div>
    <div class="mini-stat"><p class="mini-stat-label">Streak</p><p class="mini-stat-value">${streak.weeks?streak.weeks+"w":"\u2014"}</p>${streak.active?`<p class="mini-stat-sub">active</p>`:""}</div>
    <div class="mini-stat"><p class="mini-stat-label">Annotated</p><p class="mini-stat-value">${annotated}</p></div>
    <div class="mini-stat"><p class="mini-stat-label">Quotes</p><p class="mini-stat-value">${allQuotes.length}</p></div>
  </div>`;

  html+=`<div class="panel"><div class="panel-title" style="margin-bottom:12px">Annual Progress</div><div class="progress-row"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-pct">${pct}%</span></div></div>`;

  html+=`<div class="panel"><div class="panel-title">Category Breakdown</div>${catData.length===0?`<p class="panel-empty">Complete books to see categories.</p>`:`<div class="pie-row"><div class="pie-wrap"><canvas id="pieChart"></canvas></div><div class="cat-legend">${catData.sort((a,b)=>b.value-a.value).map(c=>`<div class="cat-legend-item"><div class="cat-legend-dot" style="background:${CAT_COLORS[c.name]}"></div><span class="cat-legend-name">${c.name}</span><span class="cat-legend-count">${c.value}</span><div class="cat-legend-bar"><div class="cat-legend-bar-fill" style="width:${(completed.length?(c.value/completed.length)*100:0)}%;background:${CAT_COLORS[c.name]}"></div></div></div>`).join("")}</div></div>`}</div>`;

  html+=`<div class="panel"><div class="panel-title">Reading Pace</div>${sortedMonths.length===0?`<p class="panel-empty">Finish books with dates to track pace.</p>`:`<canvas class="pace-chart" id="paceChart"></canvas>`}</div>`;

  // Goals & Challenges panel
  const catGoals=data.settings.goals.categories||{};
  const challenges=data.settings.goals.challenges||[];
  const hasCatGoals=Object.keys(catGoals).length>0;
  const hasChallenges=challenges.length>0;
  if(hasCatGoals||hasChallenges){
    html+=`<div class="panel"><div class="panel-title">Goals & Challenges</div>`;
    if(hasCatGoals){
      html+=`<div class="goal-panel-section"><p class="goal-panel-section-title">Category Goals</p>`;
      Object.entries(catGoals).forEach(([cat,target])=>{
        const prog=getCategoryProgress(cat);if(!prog)return;
        const color=CAT_COLORS[cat]||CAT_COLORS.Other;
        html+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-family:var(--ui);font-size:12px;margin-bottom:3px"><span style="color:var(--textM)">${cat}</span><span style="color:var(--textD)">${prog.count}/${prog.target}</span></div><div class="challenge-progress-bar"><div class="challenge-progress-fill" style="width:${prog.pct}%;background:${color}"></div></div></div>`;
      });
      html+=`</div>`;
    }
    if(hasChallenges){
      html+=`<div class="goal-panel-section"><p class="goal-panel-section-title">Challenges</p>`;
      challenges.forEach(ch=>{
        const prog=getChallengeProgress(ch);
        html+=`<div class="challenge-card${prog.done?" challenge-done":""}"><p class="challenge-label">${esc(ch.label)}</p><p class="challenge-meta">${ch.type} \u00B7 ${prog.current}/${ch.target}${ch.deadline?" \u00B7 due "+fmtDate(ch.deadline):""}</p><div class="challenge-progress-bar"><div class="challenge-progress-fill" style="width:${prog.pct}%"></div></div><p class="challenge-pct">${prog.pct}%</p></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  // Reading Habits panel (from sessions)
  const allSessions=[];data.books.forEach(b=>(b.sessions||[]).forEach(s=>allSessions.push(s)));
  if(allSessions.length){
    const totalMins=allSessions.reduce((s,x)=>s+x.duration,0);
    const avgMins=Math.round(totalMins/allSessions.length);
    const totalSessionPages=allSessions.reduce((s,x)=>s+((x.endPage||0)-(x.startPage||0)),0);
    const pagesPerHour=totalMins>0?Math.round(totalSessionPages/(totalMins/60)):0;
    // Day of week distribution
    const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const dayCounts=[0,0,0,0,0,0,0];
    allSessions.forEach(s=>{if(s.date){const d=new Date(s.date).getDay();dayCounts[d]++}});
    const maxDay=Math.max(...dayCounts)||1;
    // This week vs last week
    const now=Date.now(),weekMs=7*86400000;
    const thisWeek=allSessions.filter(s=>{const t=new Date(s.date).getTime();return t>=now-weekMs}).length;
    const lastWeek=allSessions.filter(s=>{const t=new Date(s.date).getTime();return t>=now-2*weekMs&&t<now-weekMs}).length;

    html+=`<div class="panel"><div class="panel-title">Reading Habits</div>
      <div class="mini-stats" style="margin-bottom:16px">
        <div class="mini-stat"><p class="mini-stat-label">Total Time</p><p class="mini-stat-value">${totalMins>=60?Math.round(totalMins/60)+"h":totalMins+"m"}</p></div>
        <div class="mini-stat"><p class="mini-stat-label">Avg Session</p><p class="mini-stat-value">${avgMins}m</p></div>
        ${pagesPerHour?`<div class="mini-stat"><p class="mini-stat-label">Pages/Hour</p><p class="mini-stat-value">${pagesPerHour}</p></div>`:""}
        <div class="mini-stat"><p class="mini-stat-label">This Week</p><p class="mini-stat-value">${thisWeek}</p><p class="mini-stat-sub">vs ${lastWeek} last week</p></div>
      </div>
      <p style="font-family:var(--ui);font-size:11px;color:var(--textD);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:8px">Reading Days</p>
      <div class="reading-habits">${dayNames.map((d,i)=>`<div class="habit-row"><span class="habit-label">${d}</span><div class="habit-bar"><div class="habit-fill" style="width:${(dayCounts[i]/maxDay)*100}%"></div></div><span class="habit-val">${dayCounts[i]}</span></div>`).join("")}</div>
    </div>`;
  }

  // Theme Graph panel
  html+=`<div class="panel"><div class="panel-title">Theme & Connection Graph</div><div id="themeGraphContainer"></div></div>`;

  document.getElementById("viewAnalytics").innerHTML=html;
  requestAnimationFrame(()=>{
    if(catData.length)drawPie(catData,completed.length);
    if(sortedMonths.length)drawPace(mm,sortedMonths);
    const tgc=document.getElementById("themeGraphContainer");
    if(tgc)renderThemeGraph(tgc);
  });
}

function drawPie(catData,total){
  const c=document.getElementById("pieChart");if(!c)return;
  const dpr=window.devicePixelRatio||1;c.width=170*dpr;c.height=170*dpr;
  const ctx=c.getContext("2d");ctx.scale(dpr,dpr);
  const cx=85,cy=85,outer=75,inner=42;let start=-Math.PI/2;
  catData.forEach(d=>{const sweep=(d.value/total)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,outer,start,start+sweep);ctx.arc(cx,cy,inner,start+sweep,start,true);ctx.closePath();ctx.fillStyle=CAT_COLORS[d.name]||"#7A7670";ctx.fill();start+=sweep});
}

function drawPace(mm,sortedMonths){
  const c=document.getElementById("paceChart");if(!c)return;
  const dpr=window.devicePixelRatio||1;const rect=c.getBoundingClientRect();c.width=rect.width*dpr;c.height=rect.height*dpr;
  const ctx=c.getContext("2d");ctx.scale(dpr,dpr);const w=rect.width,h=rect.height;
  let cum=0;const pts=sortedMonths.map(k=>{cum+=mm[k];const[y,m]=k.split("-");return{label:new Date(parseInt(y),parseInt(m)-1).toLocaleDateString("en-US",{month:"short",year:"2-digit"}),books:mm[k],cum}});
  const maxC=Math.max(...pts.map(p=>p.cum),1);
  const pL=36,pR=20,pT=20,pB=30,cw=w-pL-pR,ch=h-pT-pB;

  ctx.strokeStyle="#2A2419";ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pT+(ch/4)*i;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke()}

  const grad=ctx.createLinearGradient(0,pT,0,h-pB);grad.addColorStop(0,"rgba(196,149,106,0.25)");grad.addColorStop(1,"rgba(196,149,106,0)");
  ctx.beginPath();pts.forEach((p,i)=>{const x=pL+(i/(pts.length-1||1))*cw,y=pT+ch-(p.cum/maxC)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.lineTo(pL+cw,pT+ch);ctx.lineTo(pL,pT+ch);ctx.closePath();ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();pts.forEach((p,i)=>{const x=pL+(i/(pts.length-1||1))*cw,y=pT+ch-(p.cum/maxC)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.strokeStyle="#C4956A";ctx.lineWidth=2;ctx.stroke();

  pts.forEach((p,i)=>{const x=pL+(i/(pts.length-1||1))*cw,y=pT+ch-(p.cum/maxC)*ch;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle="#C4956A";ctx.fill()});

  ctx.setLineDash([4,4]);ctx.beginPath();pts.forEach((p,i)=>{const x=pL+(i/(pts.length-1||1))*cw,y=pT+ch-(p.books/maxC)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.strokeStyle="#5B9EAD";ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);

  ctx.font="11px Outfit,sans-serif";ctx.fillStyle="#6A6258";ctx.textAlign="center";
  pts.forEach((p,i)=>{ctx.fillText(p.label,pL+(i/(pts.length-1||1))*cw,h-6)});
  ctx.textAlign="right";for(let i=0;i<=4;i++){ctx.fillText(Math.round((maxC/4)*(4-i)),pL-8,pT+(ch/4)*i+4)}
}

function renderReview(){
  const completed=getCompleted(),books=data.books;
  if(completed.length<3){document.getElementById("viewReview").innerHTML=`<div class="empty"><p class="title">Complete at least 3 books to unlock your Year in Review.</p></div>`;return}

  const totalPages=completed.reduce((s,b)=>s+(b.pages||0),0);
  const catCounts={};completed.forEach(b=>{catCounts[b.category]=(catCounts[b.category]||0)+1});
  const topCat=Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0];
  const rated=completed.filter(b=>b.rating);
  const avgRating=rated.length?(rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1):null;
  const durations=completed.filter(b=>b.startDate&&b.endDate).map(b=>({...b,days:daysBetween(b.startDate,b.endDate)}));
  const fastest=durations.length?durations.reduce((a,b)=>a.days<b.days?a:b):null;
  const longest=completed.reduce((a,b)=>(b.pages||0)>(a.pages||0)?b:a,completed[0]);
  const topRated=[...completed].filter(b=>b.rating).sort((a,b)=>b.rating-a.rating)[0];
  const allThemes={};books.forEach(b=>(b.themes||[]).forEach(t=>{allThemes[t]=(allThemes[t]||0)+1}));
  const topThemes=Object.entries(allThemes).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totalQuotes=books.reduce((s,b)=>s+(b.quotes?.length||0),0);
  const ms=getMilestones();
  const pct=Math.min(100,Math.round(completed.length/getGoal()*100));

  let html=`<div class="yr-hero"><div class="yr-hero-glow"></div><p class="yr-hero-label">Year in Review</p><p class="yr-hero-num">${completed.length}</p><p class="yr-hero-sub">books completed \u00B7 ${pct}% of goal</p>${totalPages?`<p class="yr-hero-pages">${totalPages.toLocaleString()} pages read</p>`:""}</div>`;

  html+=`<div class="yr-grid">`;
  if(topCat)html+=`<div class="yr-card"><p class="yr-card-label">Top Category</p><p class="yr-card-value">${topCat[0]}</p><p class="yr-card-sub">${topCat[1]} books</p></div>`;
  if(avgRating)html+=`<div class="yr-card"><p class="yr-card-label">Avg Rating</p><p class="yr-card-value">${avgRating} / 5</p></div>`;
  if(fastest)html+=`<div class="yr-card"><p class="yr-card-label">Fastest Read</p><p class="yr-card-value sm">${esc(fastest.title)}</p><p class="yr-card-sub">${fastest.days} days</p></div>`;
  if(longest&&longest.pages)html+=`<div class="yr-card"><p class="yr-card-label">Longest Book</p><p class="yr-card-value sm">${esc(longest.title)}</p><p class="yr-card-sub">${longest.pages} pages</p></div>`;
  if(topRated)html+=`<div class="yr-card"><p class="yr-card-label">Highest Rated</p><p class="yr-card-value sm">${esc(topRated.title)}</p><p class="yr-card-sub">${topRated.rating}/5</p></div>`;
  html+=`</div>`;

  if(topThemes.length)html+=`<div class="panel"><div class="panel-title">Recurring Themes</div><div class="yr-themes">${topThemes.map(([t,c])=>`<div class="yr-theme">${esc(t)} <span>\u00D7${c}</span></div>`).join("")}</div></div>`;
  if(ms.length)html+=`<div class="panel"><div class="panel-title">Milestones Unlocked</div><div class="yr-milestones">${ms.map(m=>`<div class="yr-milestone"><span class="yr-milestone-icon">${m.icon}</span><p class="yr-milestone-label">${m.label}</p></div>`).join("")}</div></div>`;
  if(totalQuotes)html+=`<div class="yr-quote-stat"><span style="color:var(--accentDim);font-size:20px">\u201C</span><p>You saved <strong>${totalQuotes}</strong> passage${totalQuotes!==1?"s":""} across your readings.</p></div>`;

  document.getElementById("viewReview").innerHTML=html;
}

  const themes=book.themes||[];
  const connections=(book.connections||[]).map(id=>data.books.find(b=>b.id===id)).filter(Boolean);
  const sessions=book.sessions||[];
  const others=data.books.filter(b=>b.id!==book.id);

  // Stars display
  const starsHTML=[1,2,3,4,5].map(s=>
    `<span class="detail-star ${s<=(book.rating||0)?"filled":"empty"}">${s<=(book.rating||0)?"\u2605":"\u2606"}</span>`

    const elapsed=isThisBook?timerState.elapsed:0;

  // ── Sessions Section ──

    }
    const miniSpinesHTML=connections.length?`<div class="connected-scroll">${connections.map(cb=>{
      const csc=CAT_SPINE[cb.category]||CAT_SPINE.Other;
      const clc=CAT_COLORS[cb.category]||CAT_COLORS.Other;
      return`<div class="mini-spine-card" data-id="${cb.id}"><div class="mini-spine" style="background:linear-gradient(135deg,${clc}20 0%,${csc} 15%,${csc} 85%,${clc}10 100%);border:1px solid ${clc}25;box-shadow:1px 1px 4px rgba(0,0,0,0.4)"></div><div class="mini-spine-title">${esc(cb.title)}</div></div>`;

        <button class="detail-back" id="detailBack"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg> Back</button>
      </div>
      <div class="detail-banner-content">
        <div class="detail-pills">
          <span class="cat-pill" style="background:${lc}22;color:${lc}">${esc(book.category)}</span>
          <span class="status-badge ${book.status}">${STATUS_LABELS[book.status]}</span>
        </div>
        <h1 class="detail-title">${esc(book.title)}</h1>
        <p class="detail-author" style="font-family:var(--ui)">${esc(book.author)}</p>
        <div class="detail-meta-row">${metaHTML}${book.rating?`<span class="detail-meta-item">${starsHTML}</span>`:""}</div>

function bindDetailEvents(){
  const book=detailBook;
  document.getElementById("detailBack").addEventListener("click",closeDetail);

  // Actions
  document.querySelectorAll("#detailActions .dbtn").forEach(btn=>btn.addEventListener("click",()=>{
    const a=btn.dataset.action;
    if(a==="complete"){book.status="completed";book.endDate=new Date().toISOString().slice(0,10);book.currentPage=book.pages||book.currentPage;book.updatedAt=new Date().toISOString();save();renderDetail()}
    else if(a==="start"){book.status="reading";book.startDate=book.startDate||new Date().toISOString().slice(0,10);book.endDate="";book.updatedAt=new Date().toISOString();save();renderDetail()}
    else if(a==="reread"){book.status="reading";book.startDate=new Date().toISOString().slice(0,10);book.endDate="";book.currentPage=0;book.updatedAt=new Date().toISOString();save();renderDetail()}
    else if(a==="delete"){showConfirm("Delete Book","This book will be permanently removed.",()=>{data.books=data.books.filter(b=>b.id!==book.id);save();closeDetail()})}
  }));

  // Per-section edit buttons
  document.querySelectorAll('.detail-section-edit-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const section=btn.closest('.detail-section');
      if(section.classList.contains('editing')){
        renderDetail();
      }else{
        section.classList.add('editing');
        btn.textContent='[cancel]';
      }
    });
  });

  // Per-section save buttons
  document.querySelectorAll('.dsec-save').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const sectionName=btn.dataset.save;
      if(sectionName==='argument'){
        const ta=document.getElementById('argTA');
        if(ta)book.coreArgument=ta.value.trim();
      }else if(sectionName==='impact'){
        const ta=document.getElementById('impactTA');
        if(ta)book.impact=ta.value.trim();
      }else if(sectionName==='notes'){
        const ta=document.getElementById('notesTA');
        if(ta)book.notes=ta.value.trim();
      }
      book.updatedAt=new Date().toISOString();
      save();
      renderDetail();
    });
  });

  // Per-section cancel buttons
  document.querySelectorAll('.dsec-cancel').forEach(btn=>{
    btn.addEventListener('click',()=>{
      renderDetail();
    });
  });

  // Rating box clicks
  document.querySelectorAll("#detailRating .rbox").forEach(b=>b.addEventListener("click",()=>{book.rating=parseInt(b.dataset.star);book.updatedAt=new Date().toISOString();save();renderDetail()}));

  // Theme tag remove buttons
  document.querySelectorAll("#detailThemes .theme-tag button").forEach(b=>b.addEventListener("click",()=>{book.themes=(book.themes||[]).filter(t=>t!==b.dataset.theme);book.updatedAt=new Date().toISOString();save();renderDetail()}));

  // Theme input keydown
  const ti=document.getElementById("themeInput");
  if(ti)ti.addEventListener("keydown",e=>{if(e.key==="Enter"&&ti.value.trim()){if(!book.themes)book.themes=[];if(!book.themes.includes(ti.value.trim())){book.themes.push(ti.value.trim());book.updatedAt=new Date().toISOString();save();renderDetail()}}});

  // Quotes add/delete
  const aqb=document.getElementById("addQuoteBtn");
  if(aqb)aqb.addEventListener("click",()=>{
    const qf=document.getElementById("quoteForm");
    qf.style.display=qf.style.display==="none"?"block":"none";
    qf.innerHTML=`<div class="quote-form"><textarea id="qText" placeholder="Enter passage or quote\u2026"></textarea><div class="quote-form-row"><input id="qPage" placeholder="Page #"><button class="rbtn save" id="qSave">Save</button><button class="rbtn cancel" id="qCancel">Cancel</button></div></div>`;
    document.getElementById("qSave").addEventListener("click",()=>{const t=document.getElementById("qText").value.trim();if(!t)return;if(!book.quotes)book.quotes=[];book.quotes.push({id:uid(),text:t,page:document.getElementById("qPage").value.trim()||null});book.updatedAt=new Date().toISOString();save();renderDetail()});
    document.getElementById("qCancel").addEventListener("click",()=>{qf.style.display="none"});
  });
  document.querySelectorAll(".quote-del").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();book.quotes=(book.quotes||[]).filter(q=>q.id!==b.dataset.qid);book.updatedAt=new Date().toISOString();save();renderDetail()}));

  // Connection add/link
  const acb=document.getElementById("addConnBtn");
  if(acb)acb.addEventListener("click",()=>{
    const cp=document.getElementById("connPicker");
    cp.style.display=cp.style.display==="none"?"block":"none";
    const others=data.books.filter(b=>b.id!==book.id);
    cp.innerHTML=`<div class="conn-picker">${others.length?others.map(b=>{const linked=(book.connections||[]).includes(b.id);return`<div class="conn-picker-item${linked?" linked":""}" data-cid="${b.id}"><div class="conn-check${linked?" on":""}"></div><span style="font-family:var(--ui);font-size:13px;color:var(--textM)">${esc(b.title)}</span><span style="font-family:var(--ui);font-size:11px;color:var(--textD);margin-left:auto">${esc(b.category)}</span></div>`}).join(""):`<p style="font-family:var(--ui);font-size:12px;color:var(--textD);text-align:center;padding:12px">Add more books to create connections.</p>`}</div>`;
    cp.querySelectorAll(".conn-picker-item").forEach(item=>item.addEventListener("click",()=>{
      if(!book.connections)book.connections=[];
      const cid=item.dataset.cid;
      if(book.connections.includes(cid))book.connections=book.connections.filter(x=>x!==cid);
      else book.connections.push(cid);
      book.updatedAt=new Date().toISOString();save();renderDetail();
    }));
  });

  // Connected mini-spine clicks
  document.querySelectorAll(".mini-spine-card").forEach(b=>b.addEventListener("click",()=>{openDetail(b.dataset.id)}));

  // Suggested connection clicks
  document.querySelectorAll(".suggested-item").forEach(item=>item.addEventListener("click",()=>{
    if(!book.connections)book.connections=[];
    const sid=item.dataset.sid;
    if(!book.connections.includes(sid)){book.connections.push(sid);book.updatedAt=new Date().toISOString();save();renderDetail()}
  }));

  // Timer events
  const timerStartBtn=document.getElementById("timerStart");
  if(timerStartBtn)timerStartBtn.addEventListener("click",()=>{startTimer(book.id)});
  const timerPauseBtn=document.getElementById("timerPause");
  if(timerPauseBtn)timerPauseBtn.addEventListener("click",()=>{pauseTimer()});
  const timerResumeBtn=document.getElementById("timerResume");
  if(timerResumeBtn)timerResumeBtn.addEventListener("click",()=>{resumeTimer()});
  const timerStopBtn=document.getElementById("timerStop");
  if(timerStopBtn)timerStopBtn.addEventListener("click",()=>{stopTimer(book)});

  // Log session manually
  const logBtn=document.getElementById("logSessionBtn");
  if(logBtn)logBtn.addEventListener("click",()=>{
    const area=document.getElementById("sessionFormArea");
    if(area.innerHTML){area.innerHTML="";return}
    area.innerHTML=`<div class="session-form"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><p class="form-label">Date</p><input class="form-input" type="date" id="sfDate" value="${new Date().toISOString().slice(0,10)}"></div><div><p class="form-label">Duration (min)</p><input class="form-input" type="number" id="sfDur" placeholder="30"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><p class="form-label">Start Page</p><input class="form-input" type="number" id="sfStartP" placeholder="\u2014"></div><div><p class="form-label">End Page</p><input class="form-input" type="number" id="sfEndP" placeholder="\u2014"></div></div><div style="margin-bottom:8px"><p class="form-label">Notes (opt.)</p><input class="form-input" id="sfNotes" placeholder="Session notes..."></div><div style="display:flex;gap:8px"><button class="rbtn save" id="sfSave">Save Session</button><button class="rbtn cancel" id="sfCancel">Cancel</button></div></div>`;
    document.getElementById("sfSave").addEventListener("click",()=>{
      const dur=parseInt(document.getElementById("sfDur").value)||0;if(!dur)return;
      if(!book.sessions)book.sessions=[];
      book.sessions.push({id:uid(),date:document.getElementById("sfDate").value||new Date().toISOString().slice(0,10),startPage:parseInt(document.getElementById("sfStartP").value)||null,endPage:parseInt(document.getElementById("sfEndP").value)||null,duration:dur,notes:document.getElementById("sfNotes").value.trim()});
      book.updatedAt=new Date().toISOString();save();renderDetail();
    });
    document.getElementById("sfCancel").addEventListener("click",()=>{area.innerHTML=""});
  });

  // Delete sessions
  document.querySelectorAll(".session-del").forEach(b=>b.addEventListener("click",()=>{
    book.sessions=(book.sessions||[]).filter(s=>s.id!==b.dataset.sid);book.updatedAt=new Date().toISOString();save();renderDetail();
  }));
}

function mapCategory(apiCategories){
  if(!apiCategories||!apiCategories.length)return"Other";
  const text=apiCategories.join(" ").toLowerCase();
  const map=[
    ["Self-Awareness",["self-help","psychology","mindfulness","habits","motivation","personal growth","self-improvement"]],
    ["Current America",["american politics","current affairs","social justice","political science"]],
    ["Economics & Money",["economics","finance","business","investing","money","entrepreneurship"]],
    ["Technology",["technology","computer","programming","artificial intelligence","software","engineering"]],
    ["American History",["american history","civil war","founding fathers","united states history"]],
    ["Science",["science","physics","biology","mathematics","neuroscience","chemistry","astronomy"]],
    ["World History",["world history","ancient","civilization","medieval","global history"]],
    ["Philosophy & Ethics",["philosophy","ethics","stoic","existential","moral","logic"]],
    ["Religion",["religion","theology","bible","christianity","buddhism","islam","spirituality"]],
    ["Fiction",["fiction","novel","fantasy","sci-fi","mystery","thriller","literary","romance","horror"]]
  ];
  for(const[cat,keywords]of map){if(keywords.some(k=>text.includes(k)))return cat}
  if(text.includes("history"))return"World History";
  return"Other";
}

async function searchBooks(query){
  const q=encodeURIComponent(query.trim());
  const [gRes,olRes]=await Promise.allSettled([
    fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=5`).then(r=>r.json()),
    fetch(`https://openlibrary.org/search.json?q=${q}&limit=5&fields=title,author_name,number_of_pages_median,subject`).then(r=>r.json())
  ]);
  const results=[];
  if(gRes.status==="fulfilled"&&gRes.value.items){
    for(const item of gRes.value.items){
      const v=item.volumeInfo||{};
      results.push({title:v.title||"",author:(v.authors||[]).join(", "),pages:v.pageCount||null,category:mapCategory(v.categories||[]),source:"google"});
    }
  }
  if(olRes.status==="fulfilled"&&olRes.value.docs){
    for(const doc of olRes.value.docs){
      results.push({title:doc.title||"",author:(doc.author_name||[]).join(", "),pages:doc.number_of_pages_median||null,category:mapCategory(doc.subject||[]),source:"openlibrary"});
    }
  }
  if(!results.length&&gRes.status==="rejected"&&olRes.status==="rejected"){
    throw new Error("Search failed. Check your connection.");
  }
  // Deduplicate by normalized title+author
  const seen=new Set();
  const deduped=[];
  for(const r of results){
    const key=(r.title+"|"+r.author).toLowerCase().replace(/\s+/g," ");
    if(!seen.has(key)){seen.add(key);deduped.push(r)}
  }
  return deduped.slice(0,8);
}

function renderSearchResults(results,containerEl){
  if(!results.length){containerEl.innerHTML='<p class="book-search-empty">No results found.</p>';return}
  containerEl.innerHTML=results.map((r,i)=>`
    <div class="book-search-item" data-idx="${i}">
      <span class="book-search-item-title">${esc(r.title)}</span>
      <span class="book-search-item-author">${esc(r.author||"Unknown author")}</span>
      <div class="book-search-item-meta">
        ${r.pages?`<span>${r.pages} pages</span>`:""}
        <span>${esc(r.category)}</span>
        <span class="book-search-source ${r.source}">${r.source==="google"?"Google Books":"Open Library"}</span>
      </div>
    </div>`).join("");
}

  const outgoing=document.getElementById(map[currentTab]);

}
