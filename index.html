<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E0C0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reading Ledger">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>The Reading Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app"><div class="container">
<header><div class="hdr-row"><div><p class="hdr-label">Personal Library</p><h1 class="hdr-title">The Reading Ledger</h1><div class="hdr-pills" id="hdrPills"></div></div><div class="hdr-right"><button class="btn-search" id="btnSearch" title="Search"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button><button class="btn-settings" id="btnSettings" title="Settings">&#9881;</button></div></div>
<div class="search-bar" id="searchBar" style="display:none"><input id="searchInput" placeholder="Search titles, authors, themes, notes..."></div>
<nav class="tabs" id="navTabs">
<button class="active" data-tab="shelf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5h16v14H4z"/><path d="M4 15h16"/><path d="M8 5v10"/><path d="M12 5v10"/><path d="M16 5v10"/></svg> Shelf</button>
<button data-tab="timeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Timeline</button>
<button data-tab="analytics"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Analytics</button>
<button data-tab="review"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.09 6.26L21 9.27l-5 3.64L17.18 20 12 16.77 6.82 20 8 12.91l-5-3.64 6.91-1.01z"/></svg> Review</button>
</nav></header>
<div class="content"><div class="view active" id="viewShelf"></div><div class="view" id="viewTimeline"></div><div class="view" id="viewAnalytics"></div><div class="view" id="viewReview"></div></div>
</div></div>
<div class="detail-view" id="detailView"></div>
<div class="modal-overlay" id="formModal"><div class="modal" id="formPanel"></div></div>
<div class="modal-overlay" id="settingsModal"><div class="modal" id="settingsPanel"></div></div>
<div class="confirm-overlay" id="confirmOverlay"><div class="confirm-box"><h3 id="confirmTitle"></h3><p id="confirmMsg"></p><div class="confirm-btns"><button class="cbtn-cancel" id="confirmCancel">Cancel</button><button class="cbtn-ok" id="confirmOk">Delete</button></div></div></div>
<div class="confirm-overlay" id="importOverlay"><div class="confirm-box"><h3>Import Library</h3><p>How would you like to import?</p><div class="confirm-btns"><button class="cbtn-cancel" id="importMerge">Merge</button><button class="cbtn-ok" id="importReplace" style="background:var(--accent);color:#0E0C0A">Replace</button></div></div></div>
<input type="file" id="importFile" accept=".json" style="display:none">
<nav class="bottom-nav" id="bottomNav">
<button class="active" data-tab="shelf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5h16v14H4z"/><path d="M4 15h16"/><path d="M8 5v10"/><path d="M12 5v10"/><path d="M16 5v10"/></svg><span>Shelf</span></button>
<button data-tab="timeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg><span>Timeline</span></button>
<button data-tab="analytics"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Analytics</span></button>
<button data-tab="review"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.09 6.26L21 9.27l-5 3.64L17.18 20 12 16.77 6.82 20 8 12.91l-5-3.64 6.91-1.01z"/></svg><span>Review</span></button>
</nav>
<button class="fab" id="fab" title="Add Book"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
<div class="qa-toast" id="qaToast"></div>
<script>
// Global error handler — shows errors visually during development
window.onerror = function(msg, src, line, col, err) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:12px 16px;background:#C45B5B;color:#fff;font-family:Outfit,sans-serif;font-size:12px;z-index:9999;white-space:pre-wrap';
  el.textContent = `Error: ${msg}\n${src}:${line}:${col}`;
  document.body.prepend(el);
  setTimeout(() => el.remove(), 10000);
};
</script>
<script src="js/data.js"></script>
<script src="js/helpers.js"></script>
<script src="js/shelf.js"></script>
<script src="js/timeline.js"></script>
<script src="js/insights.js"></script>
<script src="js/analytics.js"></script>
<script src="js/detail.js"></script>
<script src="js/app.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js')</script>
</body>
</html>
