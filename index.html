<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Reading Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Cormorant Garamond',Georgia,serif;
  background:#0E0C0A;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color:#EDE6D8;
  overflow-x:hidden;
}
:root{
  --bg:#0E0C0A;--surface:#17140F;--surfaceH:#1E1A14;--border:#2A2419;--borderL:#352E24;
  --accent:#C4956A;--accentDim:#9B7550;--accentGlow:#C4956A35;
  --text:#EDE6D8;--textM:#A09888;--textD:#6A6258;--textDD:#4A4540;
  --danger:#C45B5B;--gold:#D4A85A;--green:#7D8B6E;--blue:#5B8AB0;
  --ui:'Outfit',sans-serif;--serif:'Cormorant Garamond',Georgia,serif;
  --max:960px;
}
.container{max-width:var(--max);margin:0 auto;padding:0 28px}

/* ─── Header ─── */
header{padding:28px 0 0;position:sticky;top:0;z-index:40;background:var(--bg);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-label{font-family:var(--ui);font-size:11px;color:var(--textD);margin:0 0 4px;letter-spacing:0.12em;text-transform:uppercase;font-weight:500}
.hdr-title{font-size:40px;font-weight:600;letter-spacing:-0.02em;line-height:1;margin:0}
.hdr-pills{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
.goal-pill{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:100px;padding:5px 14px 5px 6px;border:1px solid var(--border)}
.goal-pill-text{font-family:var(--ui);font-size:13px;font-weight:500}
.goal-pill-text span{color:var(--textD)}
.streak-pill{display:flex;align-items:center;gap:5px;font-family:var(--ui);font-size:12px;color:var(--gold)}
.hdr-right{display:flex;gap:8px;align-items:center;margin-top:8px}
.btn-search{background:none;border:1px solid transparent;border-radius:8px;padding:9px 10px;cursor:pointer;color:var(--textM);transition:all 0.2s}
.btn-search.active{background:var(--surfaceH);border-color:var(--borderL)}
.btn-settings{background:none;border:1px solid transparent;border-radius:8px;padding:9px 10px;cursor:pointer;color:var(--textM);font-size:16px}
.search-bar{margin-top:16px}
.search-bar input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-family:var(--ui);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--textD)}

/* Top Tabs */
nav.tabs{display:flex;gap:0;margin-top:24px;border-bottom:1px solid var(--border)}
nav.tabs button{background:none;border:none;font-family:var(--ui);font-size:13px;font-weight:500;cursor:pointer;padding:11px 16px;display:flex;align-items:center;gap:7px;color:var(--textD);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
nav.tabs button:hover:not(.active){color:var(--textM)}
nav.tabs button svg{width:15px;height:15px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;padding-bottom:env(safe-area-inset-bottom);background:rgba(23,20,15,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--borderL);z-index:50;display:flex;align-items:center;justify-content:center}
.bottom-nav button{background:none;border:none;color:var(--textD);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 16px;border-radius:12px;transition:all 0.2s;min-width:56px;min-height:48px}
.bottom-nav button svg{width:20px;height:20px}
.bottom-nav button span{font-family:var(--ui);font-size:10px;font-weight:500;letter-spacing:0.02em}
.bottom-nav button.active{color:var(--accent);background:var(--accentGlow)}
.bottom-nav button:hover:not(.active){color:var(--textM);background:rgba(255,255,255,0.04)}
.bottom-nav.hidden{display:none}

/* Content */
.content{padding:24px 0 140px}
.view{display:none;opacity:0;transform:translateY(6px);transition:opacity 200ms ease,transform 200ms ease}.view.active{display:block;opacity:1;transform:translateY(0)}.view.leaving{opacity:0;transform:translateY(-8px)}

/* ─── Shelf ─── */
.shelf-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.shelf-count{font-family:var(--ui);font-size:12px;color:var(--textD)}
.sort-bar{display:flex;gap:6px;overflow-x:auto;padding:2px 0;-ms-overflow-style:none;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-pill{background:none;border:1px solid var(--border);border-radius:100px;padding:4px 12px;font-family:var(--ui);font-size:11px;color:var(--textD);cursor:pointer;font-weight:500;white-space:nowrap;transition:all 0.15s}
.sort-pill.active{background:var(--surfaceH);border-color:var(--borderL);color:var(--text)}
.sort-pill:hover:not(.active){border-color:var(--borderL);color:var(--textM)}
.shelf-row-wrap{position:relative}
.shelf-spines{display:flex;align-items:flex-end;gap:4px;padding:10px 6px 0;min-height:100px;position:relative;z-index:1;flex-wrap:wrap}
.spine{position:relative;border-radius:3px 4px 2px 2px;cursor:pointer;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s ease,filter 0.2s ease}
.spine:hover{transform:translateY(-6px);box-shadow:2px 6px 14px rgba(0,0,0,0.5);filter:brightness(1.12)}
@media(hover:none){.spine:hover{transform:none;box-shadow:none;filter:none}.spine:active{transform:scale(0.96);opacity:0.85}}
@keyframes spineUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.spine{animation:spineUp 350ms cubic-bezier(0.23,1,0.32,1) backwards}
.spine:nth-child(1){animation-delay:0ms}.spine:nth-child(2){animation-delay:50ms}.spine:nth-child(3){animation-delay:100ms}.spine:nth-child(4){animation-delay:150ms}.spine:nth-child(5){animation-delay:200ms}.spine:nth-child(6){animation-delay:250ms}
.spine .sheen{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 40%,transparent 60%,rgba(0,0,0,0.1) 100%);pointer-events:none}
.spine .gold-top{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#D4A85A,#F0D060,#D4A85A);border-radius:3px 3px 0 0;z-index:2}
.spine .reading-dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#7D8B6E;z-index:2;animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 2px #7D8B6E}50%{box-shadow:0 0 6px #7D8B6E,0 0 10px rgba(125,139,110,0.4)}}
.spine .want-mark{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;border:1px solid rgba(255,255,255,0.35);z-index:2}
.spine-title{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-family:var(--ui);font-size:10px;font-weight:700;letter-spacing:0.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,0.8),0 0 6px rgba(0,0,0,0.5);padding:3px 0}
.shelf-board{height:10px;background:linear-gradient(180deg,#2E2820 0%,#241F18 40%,#1C1812 80%,#15120E 100%);border-radius:0 0 2px 2px;box-shadow:0 4px 10px rgba(0,0,0,0.4);margin:0 4px;position:relative;z-index:2}
.shelf-board::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,0.06);border-radius:2px 2px 0 0}
.shelf-board::after{content:'';position:absolute;bottom:-6px;left:8%;right:8%;height:6px;background:radial-gradient(ellipse at center top,rgba(0,0,0,0.2) 0%,transparent 70%);pointer-events:none}
.tooltip{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface);border:1px solid var(--borderL);border-radius:12px;padding:14px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:60;display:none;min-width:220px;max-width:320px;opacity:0;transition:opacity 0.2s ease,transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.tooltip.show{display:block;opacity:1;transform:translateX(-50%) translateY(0)}
.tooltip-title{font-size:16px;font-weight:600;line-height:1.2;margin:0 0 2px}
.tooltip-author{font-family:var(--ui);font-size:12px;color:var(--textM);margin:0 0 8px}
.tooltip-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.tooltip-meta .cat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tooltip-meta span{font-family:var(--ui);font-size:11px;color:var(--textD)}
.tooltip-stars{font-size:12px;color:var(--gold)}
.tooltip-open{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 14px;font-family:var(--ui);font-size:12px;color:var(--textM);cursor:pointer;font-weight:500;transition:all 0.15s;width:100%}
.tooltip-open:hover{border-color:var(--accent);color:var(--text)}
.shelf-footer{text-align:center;padding:20px 0 0;font-family:var(--ui);font-size:12px;color:var(--textD)}
.shelf-footer-counts{margin-bottom:6px}
.shelf-footer-counts span{margin:0 6px}
.shelf-footer-legend{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:4px}
.shelf-footer-legend-item{display:flex;align-items:center;gap:4px}
.shelf-footer-legend-dot{width:8px;height:8px;border-radius:2px}

/* Now Reading Strip */
.nr-section{margin-top:20px}
.nr-section-title{font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;margin-bottom:10px}
.nr-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;transition:border-color 0.2s}
.nr-card:hover{border-color:var(--borderL)}
.nr-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.nr-card-accent{width:5px;height:32px;border-radius:3px;flex-shrink:0}
.nr-card-info{flex:1;min-width:0}
.nr-card-title{font-family:var(--serif);font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color 0.2s}
.nr-card-title:hover{color:var(--accent)}
.nr-card-author{font-family:var(--ui);font-size:10px;color:var(--textD)}
.nr-card-pct{font-size:18px;font-weight:700;flex-shrink:0}
.nr-bar{height:24px;background:var(--border);border-radius:8px;position:relative;cursor:pointer;overflow:hidden;margin-bottom:8px}
.nr-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:8px;transition:width 0.2s}
.nr-bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ui);font-size:10px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.6)}
.nr-actions{display:flex;gap:6px;align-items:center}
.nr-status{padding:4px 10px;border-radius:100px;font-family:var(--ui);font-size:10px;font-weight:500;cursor:pointer;transition:all 0.15s}
.nr-status:active{transform:scale(0.95)}
.nr-log-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-family:var(--ui);font-size:10px;cursor:pointer;background:rgba(91,138,176,0.08);border:1px solid rgba(91,138,176,0.2);color:var(--blue);transition:all 0.15s}
.nr-log-btn:active{transform:scale(0.95)}
.nr-stars{display:flex;gap:2px}
.nr-star{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all 0.1s;background:rgba(42,36,25,0.3);border:1px solid var(--border)}
.nr-star:active{transform:scale(0.9)}
.nr-star.filled{background:rgba(212,168,90,0.12);border-color:rgba(212,168,90,0.25)}
.nr-session-form{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);animation:slideUp 0.15s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nr-session-form .nr-sf-row{display:flex;gap:6px;align-items:center}
.nr-sf-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--text);font-family:var(--ui);font-size:12px;text-align:center;outline:none;width:55px}
.nr-sf-input:focus{border-color:var(--accent)}
.nr-sf-submit{background:var(--green);color:var(--bg);border:none;border-radius:8px;padding:6px 12px;font-family:var(--ui);font-size:11px;font-weight:600;cursor:pointer;flex:1;transition:opacity 0.2s}
.nr-sf-submit:hover{opacity:0.85}
.nr-sf-close{background:none;color:var(--textD);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-family:var(--ui);font-size:11px;cursor:pointer}
.nr-sf-hint{font-family:var(--ui);font-size:10px;color:var(--textDD);margin-top:6px}

/* FAB */
.fab{position:fixed;bottom:76px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:51;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,opacity 0.2s}
.fab:hover{transform:scale(1.08)}.fab:active{transform:scale(0.95)}
.fab svg{width:24px;height:24px}
.fab.hidden{display:none}

/* ─── Milestones ─── */
.milestones{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.milestone{font-family:var(--ui);font-size:12px;padding:5px 12px;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--textM);display:flex;align-items:center;gap:6px}

/* ─── Quote Banner ─── */
.quote-banner{background:linear-gradient(135deg,var(--surface) 0%,var(--bg) 100%);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:24px;display:flex;gap:14px;align-items:flex-start}
.quote-banner-text{flex:1;font-size:17px;font-style:italic;line-height:1.6;color:var(--textM)}
.quote-banner-src{font-family:var(--ui);font-size:12px;color:var(--textD);margin-top:8px;font-style:normal}
.quote-refresh{background:none;border:none;color:var(--textD);cursor:pointer;padding:4px;flex-shrink:0}

/* ─── Timeline ─── */
.timeline-info{font-family:var(--ui);font-size:12px;color:var(--textD);margin-bottom:20px}
.tl-months{position:relative;height:24px;margin-bottom:4px}
.tl-month{position:absolute;transform:translateX(-50%);font-family:var(--ui);font-size:10px;color:var(--textD);font-weight:500}
.tl-row{display:flex;align-items:center;height:32px;cursor:pointer;margin-bottom:4px}
.tl-label{width:176px;flex-shrink:0;padding-right:12px;overflow:hidden}
.tl-label p{margin:0;font-family:var(--ui);font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-bar-area{flex:1;position:relative;height:100%}
.tl-grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:0.4}
.tl-bar{position:absolute;top:4px;bottom:4px;min-width:6px;border-radius:4px;transition:opacity 0.2s}
.tl-bar:hover{opacity:0.8!important}
.tl-bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ui);font-size:9px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);letter-spacing:0.02em}
.tl-legend{display:flex;gap:16px;margin-top:20px;flex-wrap:wrap}
.tl-legend-item{display:flex;align-items:center;gap:6px}
.tl-legend-color{width:12px;height:6px;border-radius:2px}
.tl-legend-label{font-family:var(--ui);font-size:11px;color:var(--textD)}

/* Timeline: Section titles & empty */
.tl-section-title{font-size:18px;font-weight:600;color:var(--text);margin:0 0 18px;letter-spacing:-0.01em}
.tl-empty{font-family:var(--ui);font-size:13px;color:var(--textD);text-align:center;padding:48px 20px;font-style:italic;border:1px dashed var(--border);border-radius:12px;background:rgba(0,0,0,0.12)}
.tl-divider{border:none;border-top:1px solid var(--border);margin:40px 0}
/* Focus Hero */
.tlf-wrap{text-align:center;padding:10px 0 0}
.tlf-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.tlf-nav-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--textM);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.tlf-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.tlf-nav-count{font-family:var(--ui);font-size:12px;color:var(--textD)}
.tlf-ring{position:relative;display:inline-block;margin:0 auto 16px}
.tlf-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tlf-ring-pct{font-size:36px;font-weight:700;line-height:1}
.tlf-ring-pages{font-family:var(--ui);font-size:13px;color:var(--textD);margin-top:2px}
.tlf-title{font-size:22px;font-weight:600;margin:0 0 4px;cursor:pointer;transition:color 0.2s}
.tlf-title:hover{color:var(--accent)}
.tlf-author{font-family:var(--ui);font-size:14px;color:var(--textM);margin:0 0 16px}
.tlf-page-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.tlf-page-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--text);font-family:var(--ui);font-size:18px;font-weight:600;outline:none;width:100px;text-align:center}
.tlf-page-input:focus{border-color:var(--accent)}
.tlf-page-btn{background:var(--accentDim);color:var(--bg);border:none;border-radius:8px;padding:10px 20px;font-family:var(--ui);font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.tlf-page-btn:hover{opacity:0.85}
.tlf-timer{margin:20px auto 0;max-width:300px}
.tlf-timer-display{display:block;font-family:var(--ui);font-size:48px;font-weight:600;color:var(--accent);letter-spacing:0.05em;line-height:1;margin-bottom:12px;font-variant-numeric:tabular-nums}
.tlf-timer-btns{display:flex;gap:8px;justify-content:center}
.tlf-tbtn{border:none;border-radius:8px;padding:10px 24px;font-family:var(--ui);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.tlf-tbtn.start{background:var(--green);color:#EDE6D8}
.tlf-tbtn.pause{background:var(--gold);color:var(--bg)}
.tlf-tbtn.resume{background:var(--green);color:#EDE6D8}
.tlf-tbtn.stop{background:var(--danger);color:#fff}
.tlf-session-form{max-width:320px;margin:16px auto 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:left}
/* Progress Lanes */
.tll-lane{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color 0.2s}
.tll-lane:hover{border-color:var(--borderL)}
.tll-lane.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.tll-lane-info{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.tll-lane-title{font-family:var(--ui);font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:10px}
.tll-lane-meta{font-family:var(--ui);font-size:11px;color:var(--textD);flex-shrink:0}
.tll-lane-track{height:28px;background:var(--bg);margin:0 14px 10px;border-radius:6px;position:relative;overflow:hidden}
.tll-lane-fill{height:100%;border-radius:6px;position:relative;transition:width 0.5s}
.tll-lane-tick{position:absolute;top:0;bottom:0;width:2px;border-radius:1px;opacity:0.6}
.tll-lane-marker{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text);border-radius:1px;z-index:2}
.tll-lane-pct{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--ui);font-size:11px;font-weight:700;color:rgba(255,255,255,0.9);text-shadow:0 1px 2px rgba(0,0,0,0.4)}
.tll-legend{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.tll-legend-item{display:flex;align-items:center;gap:6px;font-family:var(--ui);font-size:11px;color:var(--textD)}
.tll-legend-dot{width:10px;height:6px;border-radius:2px}
/* Activity Heatmap */
.tl-heatmap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px}
.tl-heatmap-title{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.tl-heatmap-title span{font-size:11px;color:var(--textD);font-weight:400}
.tl-hm-wrap{display:flex;gap:8px}
.tl-hm-days{display:flex;flex-direction:column;gap:3px;padding-top:20px}
.tl-hm-day{font-family:var(--ui);font-size:9px;color:var(--textDD);height:14px;display:flex;align-items:center}
.tl-hm-grid-wrap{flex:1;overflow-x:auto}
.tl-hm-months{display:flex;gap:0;margin-bottom:4px;height:16px}
.tl-hm-month{font-family:var(--ui);font-size:9px;color:var(--textD);font-weight:500}
.tl-hm-grid{display:grid;grid-template-rows:repeat(7,14px);grid-auto-flow:column;grid-auto-columns:14px;gap:3px}
.tl-hm-cell{width:14px;height:14px;border-radius:3px;background:var(--border);transition:all 0.15s;position:relative;cursor:pointer}
.tl-hm-cell:hover{transform:scale(1.3);z-index:2}
.tl-hm-cell.l1{background:#4A3D2E}.tl-hm-cell.l2{background:#7D6340}.tl-hm-cell.l3{background:#9B7550}.tl-hm-cell.l4{background:#C4956A}
.tl-hm-cell::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1E1A14;border:1px solid var(--borderL);border-radius:6px;padding:4px 8px;font-family:var(--ui);font-size:10px;color:var(--textM);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:10}
.tl-hm-cell:hover::after{opacity:1}
.tl-hm-footer{display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:8px}
.tl-hm-streaks{display:flex;gap:16px}
.tl-hm-streak{font-family:var(--ui);font-size:12px;color:var(--textD)}
.tl-hm-streak strong{color:var(--accent);font-weight:600}
.tl-hm-legend{display:flex;align-items:center;gap:4px;font-family:var(--ui);font-size:10px;color:var(--textD)}
.tl-hm-swatch{width:10px;height:10px;border-radius:2px}

/* Inline Feed */
.tl-feed-day{margin-bottom:24px}
.tl-feed-day-label{font-family:var(--ui);font-size:11px;font-weight:500;color:var(--textDD);letter-spacing:0.04em;margin-bottom:10px}
.tl-feed-day-label strong{color:var(--textD);font-weight:600}
.tl-fi{display:flex;align-items:flex-start;gap:10px;padding:8px 0 8px 14px;border-left:2px solid var(--border);margin-left:4px;cursor:pointer;transition:border-color 0.2s;position:relative}
.tl-fi:hover{border-left-color:var(--accent)}
.tl-fi.session{border-left-color:var(--accentDim)}
.tl-fi.finish{border-left-color:var(--green);background:var(--surface);border-radius:0 10px 10px 0;padding:12px 14px 12px 14px;margin-bottom:4px}
.tl-fi.start{border-left-color:var(--blue)}
.tl-fi.quote{border-left-color:var(--gold)}
.tl-fi.added{border-left-color:var(--textDD)}
.tl-fi::before{content:'';position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--border);border:2px solid var(--bg)}
.tl-fi.session::before{background:var(--accentDim)}
.tl-fi.finish::before{background:var(--green)}
.tl-fi.start::before{background:var(--blue)}
.tl-fi.quote::before{background:var(--gold)}
.tl-fi.added::before{background:var(--textDD)}
.tl-fi-body{flex:1;min-width:0}
.tl-fi-text{font-family:var(--ui);font-size:13px;color:var(--textM);line-height:1.4;margin:0}
.tl-fi-text strong{color:var(--text);font-weight:500}
.tl-fi-text .pg{color:var(--accent);font-weight:600}
.tl-fi-sub{font-family:var(--ui);font-size:11px;color:var(--textDD);margin-top:2px}
.tl-fi-stars{color:var(--gold);font-size:12px;margin-top:2px}
.tl-fi-quote{margin-top:6px;padding:8px 12px;border-left:2px solid rgba(212,168,90,0.4);font-size:14px;font-style:italic;color:var(--textD);line-height:1.5;background:rgba(212,168,90,0.03);border-radius:0 8px 8px 0}
.tl-fi-time{font-family:var(--ui);font-size:10px;color:var(--textDD);flex-shrink:0;margin-top:2px}
/* Pace stats */
.tlf-pace{font-family:var(--ui);font-size:12px;color:var(--textD);margin:-8px 0 14px;display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}
.tlf-pace strong{color:var(--accent);font-weight:600}
.tlf-pace .sep{color:var(--textDD)}
/* Collapsible Gantt */
.tl-gantt{margin-top:0}
.tl-gantt-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:0;background:none;border:none;width:100%;text-align:left;margin-bottom:16px}
.tl-gantt-toggle .tl-section-title{margin:0;cursor:pointer}
.tl-gantt-arrow{font-family:var(--ui);font-size:12px;color:var(--textD);transition:transform 0.25s;display:inline-block}
.tl-gantt-toggle.open .tl-gantt-arrow{transform:rotate(90deg)}
.tl-gantt-body{overflow:hidden;max-height:0;opacity:0;transition:max-height 0.35s ease,opacity 0.25s ease}
.tl-gantt-body.open{max-height:2000px;opacity:1}
.tl-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.15s}
.tl-row:hover{background:rgba(255,255,255,0.02)}
.tl-row-label{font-family:var(--ui);font-size:12px;color:var(--textM);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-row-track{flex:1;height:16px;position:relative;border-radius:4px}
.tl-row-bar{position:absolute;height:100%;border-radius:4px;min-width:6px;transition:width 0.4s}
.tl-row-dates{font-family:var(--ui);font-size:10px;color:var(--textDD);width:130px;flex-shrink:0;text-align:right;padding-left:8px}
/* Show more button */
.tls-show-more{display:block;margin:12px auto 0;background:none;border:1px solid var(--border);border-radius:8px;padding:8px 24px;font-family:var(--ui);font-size:12px;color:var(--textD);cursor:pointer;transition:all 0.2s}
.tls-show-more:hover{border-color:var(--borderL);color:var(--textM)}

/* Entrance animations: progress lanes stagger */
.tll-lane{opacity:0;animation:laneIn 350ms cubic-bezier(0.23,1,0.32,1) forwards}
@keyframes laneIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tll-lane:nth-child(1){animation-delay:0ms}.tll-lane:nth-child(2){animation-delay:60ms}.tll-lane:nth-child(3){animation-delay:120ms}.tll-lane:nth-child(4){animation-delay:180ms}.tll-lane:nth-child(5){animation-delay:240ms}.tll-lane:nth-child(6){animation-delay:300ms}

/* Entrance animations: inline feed stagger */
.tl-fi{opacity:0;animation:fiIn 250ms ease forwards}
@keyframes fiIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.tl-feed-day:nth-child(1) .tl-fi:nth-child(1){animation-delay:40ms}
.tl-feed-day:nth-child(1) .tl-fi:nth-child(2){animation-delay:80ms}
.tl-feed-day:nth-child(1) .tl-fi:nth-child(3){animation-delay:120ms}
.tl-feed-day:nth-child(2) .tl-fi:nth-child(1){animation-delay:160ms}
.tl-feed-day:nth-child(2) .tl-fi:nth-child(2){animation-delay:200ms}
.tl-feed-day:nth-child(3) .tl-fi:nth-child(1){animation-delay:240ms}
.tl-feed-day:nth-child(3) .tl-fi:nth-child(2){animation-delay:280ms}

/* ─── Analytics ─── */
.mini-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:28px}
.mini-stat{background:var(--surface);border-radius:10px;padding:14px 16px;border:1px solid var(--border);animation:laneIn 350ms cubic-bezier(0.23,1,0.32,1) backwards}
.mini-stat:nth-child(1){animation-delay:0ms}.mini-stat:nth-child(2){animation-delay:50ms}.mini-stat:nth-child(3){animation-delay:100ms}.mini-stat:nth-child(4){animation-delay:150ms}.mini-stat:nth-child(5){animation-delay:200ms}.mini-stat:nth-child(6){animation-delay:250ms}
.mini-stat-label{font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;margin-bottom:4px}
.mini-stat-value{font-size:24px;font-weight:600;line-height:1}
.mini-stat-value.sm{font-size:15px}
.mini-stat-sub{font-family:var(--ui);font-size:11px;color:var(--textD);margin-top:2px}
.panel{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);margin-bottom:28px}
.panel-title{font-size:19px;font-weight:500;font-style:italic;margin:0 0 16px}
.panel-empty{font-family:var(--ui);font-size:13px;color:var(--textD);text-align:center;padding:36px 20px;font-style:italic;border:1px dashed var(--border);border-radius:10px;background:rgba(0,0,0,0.1)}
.progress-row{display:flex;align-items:center;gap:16px}
.progress-track{flex:1;background:var(--border);border-radius:100px;height:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accentDim),var(--accent));transition:width 1s}
.progress-pct{font-family:var(--ui);font-size:22px;font-weight:600;color:var(--accent);min-width:50px;text-align:right}
.pie-row{display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.pie-wrap{width:170px;height:170px;flex-shrink:0}
.pie-wrap canvas{width:100%;height:100%}
.cat-legend{display:flex;flex-direction:column;gap:6px;flex:1}
.cat-legend-item{display:flex;align-items:center;gap:10px}
.cat-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cat-legend-name{font-family:var(--ui);font-size:13px;color:var(--textM);flex:1}
.cat-legend-count{font-family:var(--ui);font-size:13px;color:var(--textD);font-weight:500}
.cat-legend-bar{width:60px;height:4px;border-radius:2px;background:var(--border);overflow:hidden}
.cat-legend-bar-fill{height:100%;border-radius:2px}
canvas.pace-chart{width:100%;height:200px;display:block}

/* ─── Year in Review ─── */
.yr-hero{background:linear-gradient(135deg,var(--surface) 0%,#1A1510 100%);border:1px solid var(--border);border-radius:16px;padding:36px 32px;text-align:center;position:relative;overflow:hidden;margin-bottom:20px}
.yr-hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(196,149,106,0.25) 0%,transparent 65%);pointer-events:none;animation:heroGlow 4s ease-in-out infinite alternate}
@keyframes heroGlow{from{opacity:0.7}to{opacity:1}}
.yr-hero-label{font-family:var(--ui);font-size:11px;color:var(--textD);letter-spacing:0.12em;text-transform:uppercase;font-weight:500;position:relative}
.yr-hero-num{font-size:64px;font-weight:700;color:var(--accent);line-height:1;position:relative;margin-top:8px}
.yr-hero-sub{font-family:var(--ui);font-size:14px;color:var(--textM);margin-top:4px;position:relative}
.yr-hero-pages{font-family:var(--ui);font-size:13px;color:var(--textD);margin-top:8px;position:relative}
.yr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.yr-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.yr-card-label{font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500}
.yr-card-value{font-size:22px;font-weight:600;margin-top:6px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.yr-card-value.sm{font-size:16px}
.yr-card-sub{font-family:var(--ui);font-size:12px;color:var(--textD);margin-top:3px}
.yr-milestones{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.yr-milestone{background:var(--bg);border-radius:10px;padding:14px 12px;text-align:center;border:1px solid var(--border)}
.yr-milestone-icon{font-size:24px}
.yr-milestone-label{font-family:var(--ui);font-size:12px;font-weight:600;margin-top:6px}
.yr-themes{display:flex;gap:8px;flex-wrap:wrap}
.yr-theme{font-family:var(--ui);font-size:13px;padding:6px 14px;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--textM)}
.yr-theme span{color:var(--textD);font-size:11px}
.yr-quote-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 24px;display:flex;align-items:center;gap:14px}
.yr-quote-stat p{font-family:var(--ui);font-size:13px;color:var(--textM);margin:0}
.yr-quote-stat strong{color:var(--text);font-weight:600}

/* ─── Book Detail ─── */
.detail-view{display:none;min-height:100vh;background:var(--bg);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0;transform:translateY(40px)}
.detail-view.active{display:block;animation:detailIn 300ms cubic-bezier(0.23,1,0.32,1) forwards}
.detail-view.closing{animation:detailOut 250ms ease forwards}
@keyframes detailIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes detailOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(40px)}}
.detail-banner{position:relative;min-height:180px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.detail-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(14,12,10,0.7) 80%,var(--bg) 100%);z-index:0;pointer-events:none}
.detail-banner-bg{position:absolute;inset:0;z-index:-1}
.detail-banner-top{display:flex;justify-content:space-between;align-items:center;padding:16px 28px 0;position:relative;z-index:1}
.detail-back{background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;padding:8px;border-radius:8px;display:flex;align-items:center;gap:6px;font-family:var(--ui);font-size:13px;transition:color 0.2s}
.detail-back:hover{color:var(--text)}
.detail-banner-content{position:relative;z-index:1;padding:20px 28px 24px}
.detail-pills{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cat-pill{font-family:var(--ui);font-size:10px;padding:3px 10px;border-radius:100px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.status-badge{font-family:var(--ui);font-size:10px;padding:3px 10px;border-radius:100px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.status-badge.completed{background:rgba(85,107,74,0.13);color:#7D8B6E}
.status-badge.reading{background:rgba(46,68,96,0.13);color:#5B8AB0}
.status-badge.want-to-read{background:rgba(122,118,112,0.13);color:#7A7670}
.status-badge.abandoned{background:rgba(196,91,91,0.13);color:#C45B5B}
.detail-title{font-size:28px;font-weight:600;line-height:1.15;margin:0 0 4px}
.detail-author{font-family:var(--ui);font-size:15px;color:var(--textM);margin:0 0 12px}
.detail-meta-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.detail-meta-item{font-family:var(--ui);font-size:12px;color:var(--textD)}
.detail-meta-item strong{color:var(--textM);font-weight:500}
.detail-stars-static{display:flex;gap:2px;align-items:center}
.detail-star{font-size:14px}
.detail-star.filled{color:var(--gold)}
.detail-star.empty{color:var(--textDD)}
.detail-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.dbtn{border-radius:8px;padding:9px 16px;font-family:var(--ui);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;border:none}
.dbtn.green{background:#556B4A;color:#EDE6D8}
.dbtn.blue{background:#2E4460;color:#EDE6D8}
.dbtn.blue-o{background:none;border:1px solid var(--border);color:#5B8AB0}
.dbtn.ghost{background:none;border:none;color:var(--textD)}
.dbtn.danger{background:rgba(196,91,91,0.19);color:var(--danger);border:1px solid rgba(196,91,91,0.27)}
/* Detail Sections (per-section inline edit) */
.detail-body{max-width:var(--max);margin:0 auto;padding:0 28px 140px}
.detail-section{border-bottom:1px solid var(--border);padding:28px 0}
.detail-section:last-child{border-bottom:none}
.detail-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.detail-section-label{font-family:var(--ui);font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--textD);display:flex;align-items:center;gap:8px}
.detail-section-edit-btn{font-family:var(--ui);font-size:11px;font-weight:400;color:var(--textDD);background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:4px;transition:all 0.2s;letter-spacing:0.03em}
.detail-section-edit-btn:hover{color:var(--textD);background:var(--surfaceH)}
.detail-section.editing .detail-section-edit-btn{color:var(--accent)}
.detail-section .edit-view{display:none}
.detail-section.editing .read-view{display:none}
.detail-section.editing .edit-view{display:block}
.detail-section-actions{display:flex;gap:8px;margin-top:14px}
.dsec-save{font-family:var(--ui);font-size:11px;font-weight:500;color:var(--bg);background:var(--accent);border:none;padding:5px 16px;border-radius:5px;cursor:pointer;transition:all 0.2s}
.dsec-save:hover{background:var(--accentDim)}
.dsec-cancel{font-family:var(--ui);font-size:11px;font-weight:400;color:var(--textD);background:none;border:1px solid var(--border);padding:5px 14px;border-radius:5px;cursor:pointer;transition:all 0.2s}
.dsec-cancel:hover{color:var(--textM);border-color:var(--borderL)}
/* Themes */
.themes-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.theme-tag{font-family:var(--ui);font-size:12px;padding:4px 12px;border-radius:100px;background:var(--bg);border:1px solid var(--border);color:var(--textM);display:flex;align-items:center;gap:6px}
.theme-tag button{background:none;border:none;color:var(--textD);cursor:pointer;padding:0;line-height:1;font-size:11px}
.theme-input{background:none;border:1px solid var(--border);border-radius:100px;padding:4px 12px;color:var(--text);font-family:var(--ui);font-size:12px;outline:none;width:110px}
/* Reflections */
.refl-display{font-size:16px;line-height:1.7;color:var(--textM);white-space:pre-wrap}
.refl-empty{font-family:var(--ui);font-size:12px;color:var(--textD);font-style:italic}
.refl-ta{width:100%;min-height:100px;background:var(--bg);border:1px solid var(--borderL);border-radius:10px;padding:16px;color:var(--text);font-family:var(--serif);font-size:16px;line-height:1.7;resize:vertical;outline:none}
.refl-ta:focus{border-color:var(--accent)}
.refl-ta.tall{min-height:160px}
.refl-btns{display:flex;gap:8px;margin-top:8px}
.rbtn{border-radius:8px;font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;padding:6px 14px;border:none;transition:all 0.2s}
.rbtn.save{background:var(--accentDim);color:var(--bg)}
.rbtn.cancel{background:none;color:var(--textM);border:1px solid var(--border)}
/* Rating in detail */
.rating-row{display:flex;gap:5px}
.rbox{width:34px;height:34px;border-radius:6px;border:none;cursor:pointer;font-family:var(--ui);font-size:14px;font-weight:600;transition:all 0.15s}
.rbox.on{background:var(--accent);color:var(--bg)}
.rbox.off{background:var(--border);color:var(--textD)}
/* Quotes */
.quote-item{background:var(--bg);border-radius:10px;padding:14px 18px;border-left:3px solid var(--accentDim);margin-bottom:8px}
.quote-text{font-size:15px;font-style:italic;line-height:1.6;color:var(--textM);margin:0}
.quote-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.quote-page{font-family:var(--ui);font-size:11px;color:var(--textD)}
.quote-del{background:none;border:none;color:var(--textD);cursor:pointer;padding:0}
.quote-form{background:var(--bg);border:1px solid var(--borderL);border-radius:10px;padding:16px;margin-bottom:12px}
.quote-form textarea{width:100%;min-height:70px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:var(--serif);font-size:15px;line-height:1.6;resize:vertical;outline:none}
.quote-form-row{display:flex;gap:8px;margin-top:8px;align-items:center}
.quote-form-row input{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:var(--ui);font-size:13px;outline:none;width:70px}
/* Connected mini-spines */
.connected-scroll{display:flex;gap:12px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch}
.connected-scroll::-webkit-scrollbar{height:4px}
.connected-scroll::-webkit-scrollbar-track{background:transparent}
.connected-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mini-spine-card{flex-shrink:0;text-align:center;cursor:pointer;width:52px}
.mini-spine{width:40px;height:60px;border-radius:2px 3px 2px 2px;margin:0 auto;transition:transform 0.2s}
.mini-spine:hover{transform:translateY(-4px)}
.mini-spine-title{font-family:var(--ui);font-size:9px;color:var(--textD);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Connection picker */
.conn-picker{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;max-height:200px;overflow-y:auto}
.conn-picker-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;cursor:pointer}
.conn-picker-item.linked{background:rgba(196,149,106,0.07)}
.conn-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.conn-check.on{border-color:var(--accent);background:var(--accent)}
/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);backdrop-filter:blur(0px);display:none;align-items:center;justify-content:center;z-index:999;padding:20px;transition:background 250ms ease,backdrop-filter 250ms ease}
.modal-overlay.open{display:flex;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:460px;max-height:85vh;overflow-y:auto;animation:modalIn 300ms cubic-bezier(0.23,1,0.32,1) forwards}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-header h2{margin:0;font-size:24px}
.modal-close{background:none;border:none;color:var(--textD);cursor:pointer;font-size:20px}
.form-stack{display:flex;flex-direction:column;gap:14px}
.form-label{font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;margin:0 0 4px}
.form-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--ui);font-size:14px;outline:none;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-input.error{border-color:var(--danger);animation:shake 300ms ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.form-input::placeholder{color:var(--textD)}
select.form-input{appearance:auto}
textarea.form-input{font-family:var(--serif);min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-row.three .form-input{padding:10px 8px;font-size:13px}
.form-submit{width:100%;margin-top:24px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:13px;font-family:var(--ui);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.form-submit:disabled{background:var(--border);color:var(--textD);cursor:default}

/* Settings */
.settings-item{padding:16px 0;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-label{font-family:var(--ui);font-size:14px;font-weight:600;margin-bottom:4px}
.settings-desc{font-family:var(--ui);font-size:12px;color:var(--textD);margin-bottom:8px}
.settings-num{width:80px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--ui);font-size:15px;outline:none}
.settings-btn{display:block;width:100%;padding:12px;border-radius:10px;font-family:var(--ui);font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);text-align:center;transition:border-color 0.2s}
.settings-btn:hover{border-color:var(--textM)}
.settings-btn.danger{border-color:var(--danger);color:var(--danger)}

/* Confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:1000;display:none;justify-content:center;align-items:center;padding:20px;transition:background 200ms ease}
.confirm-overlay.open{display:flex;background:rgba(0,0,0,0.7)}
.confirm-box{background:#151310;border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center;border:1px solid var(--border);animation:modalIn 250ms cubic-bezier(0.23,1,0.32,1) forwards}
.confirm-box h3{font-size:18px;margin-bottom:8px}
.confirm-box p{font-family:var(--ui);font-size:14px;color:var(--textM);margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:10px;border-radius:8px;font-family:var(--ui);font-size:14px;font-weight:600;cursor:pointer}
.cbtn-cancel{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.cbtn-cancel:hover{background:var(--surfaceH);border-color:var(--borderL)}
.cbtn-ok{background:var(--danger);border:none;color:#fff}
.cbtn-ok:hover{opacity:0.85}

/* Focus & hover states */
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn-settings:hover{background:var(--surfaceH);border-color:var(--borderL);color:var(--text)}
.modal-close:hover{color:var(--text)}
.quote-refresh:hover{color:var(--accent)}
.challenge-del:hover{color:var(--danger)}
.session-del:hover{color:var(--danger)}
.form-submit:hover:not(:disabled){opacity:0.88}
.timer-btn:hover{opacity:0.85}
.backup-banner .bb-dismiss:hover{border-color:var(--borderL);color:var(--textM)}

/* Empty state */
.empty{text-align:center;padding:80px 20px}
.empty p.title{font-size:20px;font-style:italic;color:var(--textD)}
.empty p.sub{font-family:var(--ui);font-size:13px;color:var(--textDD);margin-top:6px}
.empty .empty-cta{margin-top:24px;display:inline-block;background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:12px 28px;font-family:var(--ui);font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.empty .empty-cta:hover{opacity:0.85}

/* Search Results */
.search-results-summary{font-family:var(--ui);font-size:13px;color:var(--textM);padding:8px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.search-results-summary strong{color:var(--accent)}
.search-match-label{font-family:var(--ui);font-size:9px;color:var(--accentDim);text-align:center;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}

/* Backup Banner */
.backup-banner{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-family:var(--ui);font-size:13px;color:var(--textM)}
.backup-banner button{border-radius:8px;padding:6px 14px;font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;border:none;flex-shrink:0;transition:all 0.2s}
.backup-banner .bb-export{background:var(--accentDim);color:var(--bg)}
.backup-banner .bb-dismiss{background:none;color:var(--textD);border:1px solid var(--border)}


/* Recommendation Context */
.rec-context{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-family:var(--ui);font-size:13px;color:var(--textM)}
.rec-context .rec-by{color:var(--accent);font-weight:600}
.rec-source-pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:100px;background:var(--border);color:var(--textM);margin-left:8px;font-weight:500;text-transform:capitalize}
.rec-note{margin-top:6px;font-style:italic;color:var(--textD);font-size:12px}

/* Goals & Challenges */
.goal-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.goal-cat-item{display:flex;align-items:center;gap:8px;font-family:var(--ui);font-size:12px;color:var(--textM)}
.goal-cat-item input{width:50px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--ui);font-size:12px;outline:none;text-align:center}
.challenge-list{margin-top:12px}
.challenge-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative}
.challenge-label{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.challenge-meta{font-family:var(--ui);font-size:11px;color:var(--textD);margin-bottom:6px}
.challenge-progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.challenge-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accentDim),var(--accent));transition:width 0.5s}
.challenge-pct{font-family:var(--ui);font-size:11px;color:var(--accent);margin-top:2px;text-align:right}
.challenge-del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--textD);cursor:pointer;font-size:14px}
.challenge-done{border-left:3px solid var(--green)}
.challenge-done .challenge-label::after{content:" \u2713";color:var(--green)}
.challenge-form{background:var(--bg);border:1px solid var(--borderL);border-radius:10px;padding:14px;margin-top:8px}
.goal-panel-section{margin-top:20px}
.goal-panel-section-title{font-family:var(--ui);font-size:12px;color:var(--textD);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:10px}

/* Session Tracking */
.session-timer{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;text-align:center}
.timer-display{font-family:var(--ui);font-size:36px;font-weight:600;color:var(--accent);letter-spacing:0.05em;margin:8px 0}
.timer-label{font-family:var(--ui);font-size:11px;color:var(--textD);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
.timer-btns{display:flex;gap:8px;justify-content:center;margin-top:10px}
.timer-btn{border-radius:8px;padding:8px 20px;font-family:var(--ui);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.timer-btn.start{background:var(--green);color:#EDE6D8}
.timer-btn.pause{background:var(--gold);color:var(--bg)}
.timer-btn.stop{background:var(--danger);color:#fff}
.timer-btn.log{background:var(--surface);border:1px solid var(--border);color:var(--textM)}
.session-list{margin-top:12px}
.session-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.session-info{flex:1}
.session-date{font-family:var(--ui);font-size:12px;font-weight:500;color:var(--text)}
.session-detail{font-family:var(--ui);font-size:11px;color:var(--textD);margin-top:2px}
.session-notes-preview{font-family:var(--ui);font-size:11px;color:var(--textD);font-style:italic;margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-del{background:none;border:none;color:var(--textD);cursor:pointer;font-size:12px;padding:4px}
.session-form{background:var(--bg);border:1px solid var(--borderL);border-radius:10px;padding:14px;margin-bottom:12px}
.reading-habits .habit-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.reading-habits .habit-label{font-family:var(--ui);font-size:12px;color:var(--textD);width:36px;text-align:right;flex-shrink:0}
.reading-habits .habit-bar{flex:1;height:16px;background:var(--border);border-radius:4px;overflow:hidden}
.reading-habits .habit-fill{height:100%;border-radius:4px;background:var(--accent);transition:width 0.5s}
.reading-habits .habit-val{font-family:var(--ui);font-size:11px;color:var(--textD);min-width:24px}

/* Theme Graph */
.theme-graph-panel{margin-top:20px}
.graph-canvas{width:100%;height:400px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:grab;display:block}
.graph-canvas:active{cursor:grabbing}
.theme-index{margin-top:16px}
.theme-index-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.theme-index-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background 0.15s}
.theme-index-header:hover{background:rgba(255,255,255,0.02)}
.theme-index-name{font-family:var(--ui);font-size:14px;font-weight:500;color:var(--text);flex:1}
.theme-index-count{font-family:var(--ui);font-size:12px;color:var(--textD);background:var(--bg);padding:2px 8px;border-radius:100px}
.theme-index-chevron{color:var(--textD);font-size:11px;font-family:var(--ui);transition:transform 0.25s}
.theme-index-item.expanded .theme-index-chevron{transform:rotate(90deg)}
.theme-index-books{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.theme-index-item.expanded .theme-index-books{max-height:600px}
.theme-index-books-inner{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:8px}
.theme-book-mini{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;transition:border-color 0.2s;max-width:200px}
.theme-book-mini:hover{border-color:var(--accent)}
.theme-book-mini-title{font-family:var(--ui);font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.theme-book-mini-author{font-family:var(--ui);font-size:10px;color:var(--textD)}
.theme-book-mini .cat-pill{font-size:9px;padding:1px 6px;margin-top:4px;display:inline-block}

/* Suggested Connections */
.suggested-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.suggested-label{font-family:var(--ui);font-size:10px;color:var(--textD);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:8px}
.suggested-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background 0.15s}
.suggested-item:hover{background:rgba(255,255,255,0.03)}
.suggested-score{font-family:var(--ui);font-size:10px;color:var(--accentDim);min-width:20px;text-align:center}

/* ─── Book Search Auto-fill ─── */
.book-search-section{border:1px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:8px;background:rgba(196,149,106,0.04)}
.book-search-row{display:flex;gap:8px}
.book-search-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--ui);font-size:14px;outline:none}
.book-search-row input:focus{border-color:var(--accent)}
.book-search-row input::placeholder{color:var(--textD)}
.book-search-btn{background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:10px 18px;font-family:var(--ui);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
.book-search-btn:disabled{opacity:0.5;cursor:default}
.book-search-results{max-height:280px;overflow-y:auto;margin-top:10px}
.book-search-item{display:flex;flex-direction:column;gap:2px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid var(--border)}
.book-search-item:last-child{border-bottom:none}
.book-search-item:hover{background:rgba(196,149,106,0.08)}
.book-search-item-title{font-family:var(--ui);font-size:14px;font-weight:500;color:var(--text)}
.book-search-item-author{font-family:var(--ui);font-size:12px;color:var(--textM)}
.book-search-item-meta{display:flex;align-items:center;gap:8px;margin-top:2px}
.book-search-item-meta span{font-family:var(--ui);font-size:11px;color:var(--textD)}
.book-search-source{font-family:var(--ui);font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.book-search-source.google{background:rgba(91,138,176,0.15);color:var(--blue)}
.book-search-source.openlibrary{background:rgba(125,139,110,0.15);color:var(--green)}
.book-search-loading{display:flex;align-items:center;gap:10px;padding:16px 0;font-family:var(--ui);font-size:13px;color:var(--textM)}
.book-search-loading::before{content:"";width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:searchSpin 0.6s linear infinite}
@keyframes searchSpin{to{transform:rotate(360deg)}}
.book-search-error{font-family:var(--ui);font-size:13px;color:var(--danger);padding:12px 0}
.book-search-empty{font-family:var(--ui);font-size:13px;color:var(--textD);padding:12px 0}

/* Responsive */
@media(max-width:600px){
  nav.tabs{display:none}
  .hdr-title{font-size:30px}
  .mini-stats{grid-template-columns:repeat(2,1fr)}
  .form-row,.form-row.three{grid-template-columns:1fr}
  .pie-row{flex-direction:column;align-items:center}
  .yr-grid{grid-template-columns:1fr}
  .detail-banner-content{padding:16px 20px 20px}
  .detail-banner-top{padding:12px 20px 0}
  .detail-body{padding:0 20px 140px}
  .detail-title{font-size:24px}
  .tl-label{width:120px}
  .tlf-ring svg{width:160px;height:160px}
  .tlf-timer-display{font-size:36px}
  .tl-heatmap{padding:16px}
  .tl-hm-days{display:none}
  .tl-hm-streaks{flex-direction:column;gap:4px}
  .tl-row-label{width:80px;font-size:11px}
  .tl-row-dates{width:100px;font-size:9px}
  .fab{bottom:72px;right:16px;width:50px;height:50px}
}
</style>
</head>
<body>

<div id="app">
<div class="container">
  <header>
    <div class="hdr-row">
      <div>
        <p class="hdr-label">Personal Library</p>
        <h1 class="hdr-title">The Reading Ledger</h1>
        <div class="hdr-pills" id="hdrPills"></div>
      </div>
      <div class="hdr-right">
        <button class="btn-search" id="btnSearch" title="Search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="btn-settings" id="btnSettings" title="Settings">&#9881;</button>
      </div>
    </div>
    <div class="search-bar" id="searchBar" style="display:none">
      <input id="searchInput" placeholder="Search titles, authors, themes, notes, quotes...">
    </div>
    <nav class="tabs" id="navTabs">
      <button class="active" data-tab="shelf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5h16v14H4z"/><path d="M4 15h16"/><path d="M8 5v10"/><path d="M12 5v10"/><path d="M16 5v10"/></svg>
        Shelf
      </button>
      <button data-tab="timeline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Timeline
      </button>
      <button data-tab="analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analytics
      </button>
      <button data-tab="review">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 010-5C7 4 9 8 9 8s2-4 4.5-4a2.5 2.5 0 010 5H12"/><path d="M12 8v13"/><path d="M3 18h18"/></svg>
        Year in Review
      </button>
    </nav>
  </header>
  <div class="content">
    <div class="view active" id="viewShelf"></div>
    <div class="view" id="viewTimeline"></div>
    <div class="view" id="viewAnalytics"></div>
    <div class="view" id="viewReview"></div>
  </div>
</div>
</div>

<div class="detail-view" id="detailView"></div>

<div class="modal-overlay" id="formModal"><div class="modal" id="formPanel"></div></div>
